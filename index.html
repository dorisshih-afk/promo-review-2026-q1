// =========================================================================
// EVENT HANDLERS
// =========================================================================
function attachHandlers() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', handleAction);
  });

  // scoring sliders sync
  document.querySelectorAll('.score-slider').forEach(slider => {
    slider.addEventListener('input', e => {
      const dim = e.target.dataset.dim;
      const val = parseFloat(e.target.value);
      const numInput = document.querySelector(`.score-number[data-dim="${dim}"]`);
      if (numInput) numInput.value = val.toFixed(1);
      updateLiveTotal();
    });
  });
  document.querySelectorAll('.score-number').forEach(input => {
    input.addEventListener('input', e => {
      let val = parseFloat(e.target.value);
      if (isNaN(val)) return;
      if (val < 0.1) val = 0.1;
      if (val > 5.0) val = 5.0;
      const dim = e.target.dataset.dim;
      const slider = document.querySelector(`.score-slider[data-dim="${dim}"]`);
      if (slider) slider.value = val;
      updateLiveTotal();
    });
    input.addEventListener('blur', e => {
      let val = parseFloat(e.target.value);
      if (isNaN(val) || val < 0.1) val = 0.1;
      if (val > 5.0) val = 5.0;
      e.target.value = val.toFixed(1);
      updateLiveTotal();
    });
  });

  updateLiveTotal();

  // 工具函式:針對某個 .detail-multi 容器,整組啟用/停用
  // disable=true 時也順便清空所有 input 的值(保留一列空白,貼合舊行為)
  function toggleDetailGroup(container, disable) {
    if (!container) return;
    // text input(name)、month input(發生年月)、number input(IPP 掛名人數)— 整列所有輸入欄都要同步
    container.querySelectorAll('input[type="text"], input[type="month"], input[type="number"], input[type="date"]').forEach(inp => {
      inp.disabled = disable;
      if (disable) inp.value = '';
    });
    container.querySelectorAll('.detail-row-remove, .detail-row-add').forEach(btn => {
      btn.disabled = disable;
    });
    if (disable) {
      // 只留一列,避免重新啟用時殘留多列空白
      const rows = container.querySelectorAll('.detail-multi-row');
      for (let i = 1; i < rows.length; i++) rows[i].remove();
    }
  }

  // bonus single select 變動時 enable/disable 對應細項群組
  document.querySelectorAll('.bonus-select').forEach(sel => {
    sel.addEventListener('change', e => {
      const empId = e.target.dataset.bonusEmp;
      const itemId = e.target.dataset.item;
      const firstInput = document.querySelector(`.bonus-detail[data-bonus-emp="${empId}"][data-detail-item="${itemId}"]`);
      const container = firstInput ? firstInput.closest('.detail-multi') : null;
      // Bug 1 新語意:只有明確選 'none' 才停用;未選 '' 時保持可編輯
      const disable = e.target.value === 'none';
      toggleDetailGroup(container, disable);
    });
  });

  // bonus multi (cert) checkbox 變動時 enable/disable 對應細項群組
  document.querySelectorAll('.bonus-multi').forEach(cb => {
    cb.addEventListener('change', e => {
      const empId = e.target.dataset.bonusEmp;
      const optId = e.target.value;
      const firstInput = document.querySelector(`.bonus-cert-detail[data-bonus-emp="${empId}"][data-cert-opt="${optId}"]`);
      const container = firstInput ? firstInput.closest('.detail-multi') : null;
      toggleDetailGroup(container, !e.target.checked);
    });
  });

  // 員工端 emp-select 變動 → enable/disable 對應細項群組
  document.querySelectorAll('.emp-select').forEach(sel => {
    sel.addEventListener('change', e => {
      const itemId = e.target.dataset.item;
      const firstInput = document.querySelector(`.emp-detail[data-detail-item="${itemId}"]`);
      const container = firstInput ? firstInput.closest('.detail-multi') : null;
      const disable = e.target.value === 'none';
      toggleDetailGroup(container, disable);
    });
  });

  // 員工端 emp-multi (Certification) 勾選 → enable/disable 對應細項群組
  document.querySelectorAll('.emp-multi').forEach(cb => {
    cb.addEventListener('change', e => {
      const optId = e.target.value;
      const firstInput = document.querySelector(`.emp-cert-detail[data-cert-opt="${optId}"]`);
      const container = firstInput ? firstInput.closest('.detail-multi') : null;
      toggleDetailGroup(container, !e.target.checked);
    });
  });

  // review 調整下拉(select 變動)
  document.querySelectorAll('.review-adjust').forEach(sel => {
    sel.addEventListener('change', async e => {
      const empId = e.target.dataset.empid;
      const itemId = e.target.dataset.itemid;
      const val = e.target.value;
      if (!val) {
        // 切回 pending
        await handleSetReview(empId, itemId, 'pending');
      } else {
        await handleSetReview(empId, itemId, 'adjust:' + val);
      }
    });
  });

  // admin login enter key
  const passInput = document.getElementById('adminPass');
  if (passInput) {
    passInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleAdminSubmit();
    });
  }
  // 主管登入密碼 Enter
  const mgrLoginPass = document.getElementById('mgrLoginPass');
  if (mgrLoginPass) {
    mgrLoginPass.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleManagerLoginSubmit();
    });
  }
  // 主管設定密碼 Enter (在第二格 confirm 框)
  const mgrNewPass2 = document.getElementById('mgrNewPass2');
  if (mgrNewPass2) {
    mgrNewPass2.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleManagerSetPassword();
    });
  }

  // IPP summary 即時重算
  document.querySelectorAll('.detail-multi[data-item-id="ipp"]').forEach(container => {
    container.addEventListener('input', updateIppSummary);
    container.addEventListener('change', updateIppSummary);
  });
  // Travel summary 即時重算
  document.querySelectorAll('.detail-multi[data-item-id="travel"]').forEach(container => {
    container.addEventListener('input', updateTravelSummary);
    container.addEventListener('change', updateTravelSummary);
  });
  // Listing-mode summary 即時重算(STAMP 等)
  document.querySelectorAll('.detail-multi[data-listing="1"]').forEach(container => {
    const handler = () => updateListedSummary(container);
    container.addEventListener('input', handler);
    container.addEventListener('change', handler);
    // 初始同步一次:讓 noneFlag 的 container 隱藏 + summary 正確
    updateListedSummary(container);
  });
  // IPP noneFlag 初始同步
  const ippNoneCb = document.querySelector('input.emp-listed-none[data-item="ipp"]');
  if (ippNoneCb && ippNoneCb.checked) {
    const ippContainer = document.querySelector('.detail-multi[data-item-id="ipp"]');
    if (ippContainer) ippContainer.style.display = 'none';
    updateIppSummary();
  }
  // 「本項無可列舉」checkbox 變動:觸發對應 listing-mode container 的 summary 重算
  document.querySelectorAll('input.emp-listed-none').forEach(cb => {
    cb.addEventListener('change', () => {
      const itemId = cb.dataset.item;
      // IPP 專屬:沒有 listing container,處理 emp-detail inputs 隱藏 + summary 更新
      if (itemId === 'ipp') {
        const ippContainer = document.querySelector('.detail-multi[data-item-id="ipp"]');
        if (ippContainer) {
          ippContainer.style.display = cb.checked ? 'none' : '';
          if (cb.checked) {
            ippContainer.querySelectorAll('input.emp-detail').forEach(i => { i.value = ''; });
            ippContainer.querySelectorAll('input.emp-detail-weight').forEach(i => { i.value = ''; });
            ippContainer.querySelectorAll('input[type="month"]').forEach(i => { i.value = ''; });
          }
        }
        updateIppSummary();
        updateAppliedTotal();
        return;
      }
      const container = document.querySelector(`.detail-multi[data-item-id="${itemId}"][data-listing="1"]`);
      if (container) updateListedSummary(container);
    });
  });
  // TOEIC-style score input 即時重算
  document.querySelectorAll('input.emp-score-input').forEach(inp => {
    const handler = () => updateScoreInputSummary(inp);
    inp.addEventListener('input', handler);
    inp.addEventListener('change', handler);
  });
  // TOEIC test date input 即時重算
  document.querySelectorAll('input.emp-score-testdate').forEach(dateInp => {
    dateInp.addEventListener('change', () => {
      const itemId = dateInp.dataset.scoreItem;
      const scoreInp = document.querySelector(`input.emp-score-input[data-score-item="${itemId}"]`);
      if (scoreInp) updateScoreInputSummary(scoreInp);
      updateAppliedTotal();
    });
  });
  // 主管端「其他證照」分數輸入 — 主管輸入後 change 時寫回 state
  document.querySelectorAll('input.reviewer-score-input').forEach(inp => {
    inp.addEventListener('change', async () => {
      const empId = inp.dataset.empid;
      const itemId = inp.dataset.itemid;
      const rowIdx = parseInt(inp.dataset.rowidx, 10);
      if (!state.empSubmissions?.[empId]) return;
      const sub = state.empSubmissions[empId];
      const item = EXTRA_CONTRIBUTION_ITEMS.find(i => i.id === itemId);
      if (!item) return;
      const arr = migrateListedDetails(item, sub, sub.data || {});
      if (rowIdx < 0 || rowIdx >= arr.length) return;
      const raw = (inp.value || '').trim();
      if (!raw) {
        delete arr[rowIdx].reviewerScore;
      } else {
        const n = parseFloat(raw);
        if (isFinite(n) && n >= 0) arr[rowIdx].reviewerScore = n;
      }
      sub.data.itemDetails[itemId] = arr;
      // 只存 state,不 render(讓 ✓/✗ 按鈕能正常點擊而不被打斷)
      await saveState(state);
    });
  });
  // bandSince 改變也要重算(IPP / Travel / listing-mode 都會被影響)+ 切換提交按鈕
  const bandSinceEl = document.querySelector('.emp-band-since');
  if (bandSinceEl) {
    const syncSubmitBtn = () => {
      const val = (bandSinceEl.value || '').trim();
      const submitBtn = document.querySelector('button[data-action="emp-submit"]');
      if (submitBtn) {
        if (val) {
          submitBtn.removeAttribute('disabled');
          submitBtn.removeAttribute('title');
        } else {
          submitBtn.setAttribute('disabled', '');
          submitBtn.setAttribute('title', '請先填寫「當前 Band 起始年月」');
        }
      }
    };
    bandSinceEl.addEventListener('change', () => {
      updateIppSummary();
      updateTravelSummary();
      document.querySelectorAll('.detail-multi[data-listing="1"]').forEach(c => updateListedSummary(c));
      updateAppliedTotal();
      syncSubmitBtn();
    });
    bandSinceEl.addEventListener('input', syncSubmitBtn);
  }
  // 員工頁頂部「申請總分」即時更新:任何加分相關欄位變動都觸發
  // 用 event delegation 掛在 .form-items 上(所有細項、下拉、checkbox、others 都覆蓋)
  const formItems = document.querySelector('.form-items');
  if (formItems) {
    formItems.addEventListener('input', updateAppliedTotal);
    formItems.addEventListener('change', updateAppliedTotal);
  }
}

// 即時重算員工頁頂部「申請總分」(包含 listing-mode 預估、IPP 自動算、cert 多選等)
function updateAppliedTotal() {  const totalEl = document.querySelector('[data-applied-total]');
  if (!totalEl) return;
  const empId = view.payload?.empId;
  if (!empId) return;
  const emp = state.employees.find(e => e.id === empId);
  if (!emp) return;
  const bandSinceEl = document.querySelector('.emp-band-since');
  const bandSince = bandSinceEl ? normalizeYearMonth(bandSinceEl.value) : (emp.bandSinceYYYYMM || '');

  let total = 0;
  // 1) listing-mode:從 DOM 讀每列 level → 用 summarizeListedItem(preview) 加總
  EXTRA_CONTRIBUTION_ITEMS.forEach(item => {
    if (!item.listingMode) return;
    const container = document.querySelector(`.detail-multi[data-item-id="${item.id}"][data-listing="1"]`);
    if (!container) return;
    const rows = [];
    container.querySelectorAll('.detail-multi-row').forEach(row => {
      const txt = row.querySelector('input.emp-detail');
      const lvl = row.querySelector('select.emp-detail-level');
      const ym = row.querySelector('input[type="month"]');
      if (!txt) return;
      const name = (txt.value || '').trim();
      if (!name) return;
      rows.push({
        name,
        level: lvl ? lvl.value : '',
        occurredAt: ym ? normalizeYearMonth(ym.value) : ''
      });
    });
    const summary = summarizeListedItem(item, rows, { preview: true, bandSince });
    total += summary.totalScore;
  });

  // 2) IPP 自動算等級:從 DOM 收 IPP details → computeIppLevelFromDetails → option.score
  {
    const container = document.querySelector('.detail-multi[data-item-id="ipp"]');
    if (container) {
      const rows = [];
      container.querySelectorAll('.detail-multi-row').forEach(row => {
        const txt = row.querySelector('input.emp-detail');
        if (!txt) return;
        const name = (txt.value || '').trim();
        if (!name) return;
        const ym = row.querySelector('input[type="month"]');
        const winp = row.querySelector('input.emp-detail-weight');
        rows.push({
          name,
          occurredAt: ym ? normalizeYearMonth(ym.value) : '',
          weight: winp ? peopleNToWeight(winp.value) : ''
        });
      });
      const ippItem = EXTRA_CONTRIBUTION_ITEMS.find(i => i.id === 'ipp');
      if (ippItem) {
        const { optionId } = computeIppLevelFromDetails(rows, bandSince);
        const opt = ippItem.options.find(o => o.id === optionId);
        if (opt) total += opt.score;
      }
    }
  }

  // 3) Travel:同 IPP 自動算
  {
    const container = document.querySelector('.detail-multi[data-item-id="travel"]');
    if (container) {
      const rows = [];
      container.querySelectorAll('.travel-multi-row').forEach(row => {
        const nameEl = row.querySelector('input.emp-travel-name');
        const sEl = row.querySelector('input.emp-travel-start');
        const eEl = row.querySelector('input.emp-travel-end');
        const name = nameEl ? (nameEl.value || '').trim() : '';
        const startDate = sEl ? (sEl.value || '').trim() : '';
        const endDate = eEl ? (eEl.value || '').trim() : '';
        if (!name && !startDate && !endDate) return;
        rows.push({ name, startDate, endDate });
      });
      const travelItem = EXTRA_CONTRIBUTION_ITEMS.find(i => i.id === 'travel');
      if (travelItem) {
        const { optionId } = computeTravelLevelFromDetails(rows, bandSince, state.covidPeriod || {});
        const opt = travelItem.options.find(o => o.id === optionId);
        if (opt) total += opt.score;
      }
    }
  }

  // 4) 其他 single 下拉項目(STAMP 已是 listing 不在此)+ multi(cert)+ scoreInputMode(TOEIC)
  EXTRA_CONTRIBUTION_ITEMS.forEach(item => {
    if (item.listingMode) return;
    if (item.id === 'ipp' || item.id === 'travel') return;
    if (item.scoreInputMode) {
      const inp = document.querySelector(`input.emp-score-input[data-score-item="${item.id}"]`);
      if (!inp) return;
      const n = parseFloat(inp.value);
      if (!isFinite(n)) return;
      const dateInp = document.querySelector(`input.emp-score-testdate[data-score-item="${item.id}"]`);
      const testDate = dateInp ? normalizeYearMonth(dateInp.value) : '';
      const expired = item.validityMonths && testDate && isScoreExpired(testDate, item.validityMonths);
      if (expired) return;  // 過期不加分
      const opt = item.options.find(o => typeof o.minScore === 'number' && n >= o.minScore && n <= o.maxScore);
      if (opt) total += opt.score;
      return;
    }
    if (item.type === 'single') {
      const sel = document.querySelector(`.emp-select[data-item="${item.id}"]`);
      if (!sel || !sel.value || sel.value === 'none') return;
      const opt = item.options.find(o => o.id === sel.value);
      if (opt) total += opt.score;
    } else {
      document.querySelectorAll(`.emp-multi[data-item="${item.id}"]:checked`).forEach(cb => {
        const opt = item.options.find(o => o.id === cb.value);
        if (opt) total += opt.score;
      });
    }
  });

  // 5) Others 自填分數
  const othersScore = document.querySelector('.emp-others[data-others="score"]');
  if (othersScore) {
    const v = parseFloat(othersScore.value);
    if (!isNaN(v)) total += v;
  }

  totalEl.textContent = total.toFixed(1);
}

// 從目前 DOM 重新讀 IPP 細項與 bandSince,即時更新 summary box
function updateIppSummary() {
  const summaryEl = document.querySelector('[data-ipp-summary]');
  if (!summaryEl) return;
  const container = document.querySelector('.detail-multi[data-item-id="ipp"]');
  if (!container) return;
  // 檢查「本項無可列舉」
  const noneCb = document.querySelector('input.emp-listed-none[data-item="ipp"]');
  const noneFlag = !!(noneCb && noneCb.checked);
  const lvlEl = summaryEl.querySelector('[data-ipp-level]');
  const scoreEl = summaryEl.querySelector('[data-ipp-score]');
  const statsEl = summaryEl.querySelector('[data-ipp-stats]');
  if (noneFlag) {
    if (lvlEl) lvlEl.textContent = '本項無可列舉';
    if (scoreEl) scoreEl.textContent = '不加分';
    if (statsEl) statsEl.textContent = '員工已確認本項無可加分';
    return;
  }
  const bandSinceEl = document.querySelector('.emp-band-since');
  const bandSince = bandSinceEl ? normalizeYearMonth(bandSinceEl.value) : '';
  const rows = [];
  container.querySelectorAll('.detail-multi-row').forEach(row => {
    const txt = row.querySelector('input.emp-detail');
    if (!txt) return;
    const name = (txt.value || '').trim();
    if (!name) return;
    const ym = row.querySelector('input[type="month"]');
    const winp = row.querySelector('input.emp-detail-weight');
    rows.push({
      name,
      occurredAt: ym ? normalizeYearMonth(ym.value) : '',
      weight: winp ? peopleNToWeight(winp.value) : ''
    });
  });
  const summary = summarizeIpp(rows, bandSince);
  let levelText;
  if (summary.totalCount === 0) levelText = '尚未填寫';
  else if (summary.levelLabel) levelText = summary.levelLabel;
  else levelText = '無 (期間內權重不足 0.1)';
  if (lvlEl) lvlEl.textContent = levelText;
  if (scoreEl) scoreEl.textContent = summary.levelScore > 0 ? '+' + summary.levelScore + ' 分' : '不加分';
  if (statsEl) {
    statsEl.textContent = `期間內 ${summary.inCount} 筆(權重 ${summary.inWeight}) · 期間外 ${summary.outCount} 筆(權重 ${summary.outWeight}) · 總 ${summary.totalCount} 筆`;
  }

  // 順便同步每列下方的「✓ 計入加分 / ⓘ 期間外」tag
  // 那些 tag 在初始 render 時就根據 d.name && month 條件決定要不要插
  // 目前用 textContent 重算就好,不重新插入(初始已經出來的會跟著正確)
  // 注意:剛建立的新空列可能完全沒 tag,使用者填到一半才有(這時 input event 會觸發 — 但 tag 是初始 render 寫死的)
  // 為求即時體驗,直接動態維護 tag:
  container.querySelectorAll('.detail-multi-row').forEach(row => {
    const txt = row.querySelector('input.emp-detail');
    const ym = row.querySelector('input[type="month"]');
    if (!txt || !ym) return;
    const name = (txt.value || '').trim();
    const occurredAt = normalizeYearMonth(ym.value);
    // tag 容器是 row 後緊跟的 .detail-row-tag
    let tagEl = row.nextElementSibling;
    if (!tagEl || !tagEl.classList || !tagEl.classList.contains('detail-row-tag')) {
      // 不存在就插一個
      tagEl = document.createElement('div');
      tagEl.className = 'detail-row-tag';
      row.parentElement.insertBefore(tagEl, row.nextSibling);
    }
    if (name && occurredAt) {
      const isFuture = isFutureYearMonth(occurredAt);
      const inBand = isIppInBandPeriod(occurredAt, bandSince);
      const winp = row.querySelector('input.emp-detail-weight');
      const wStr = winp ? peopleNToWeight(winp.value) : '';
      const w = parseFloat(wStr);
      const hasValidWeight = isFinite(w) && w > 0 && w <= 1;
      if (isFuture) {
        tagEl.innerHTML = '<span class="ipp-row-tag ipp-row-tag-warn">⚠ 未來日期 · 不可提交</span>';
      } else if (!inBand) {
        tagEl.innerHTML = '<span class="ipp-row-tag ipp-row-tag-out">ⓘ 期間外 · 僅統計</span>';
      } else if (hasValidWeight) {
        tagEl.innerHTML = '<span class="ipp-row-tag ipp-row-tag-in">✓ 計入加分</span>';
      } else {
        tagEl.innerHTML = '<span class="ipp-row-tag ipp-row-tag-warn">⚠ 期間內 · 待填掛名人數</span>';
      }
    } else {
      tagEl.innerHTML = '';
    }
  });
}

// 從目前 DOM 重新讀 Travel 細項與 bandSince/covidPeriod,即時更新 Travel summary box
function updateTravelSummary() {
  const summaryEl = document.querySelector('[data-travel-summary]');
  if (!summaryEl) return;
  const container = document.querySelector('.detail-multi[data-item-id="travel"]');
  if (!container) return;
  const bandSinceEl = document.querySelector('.emp-band-since');
  const bandSince = bandSinceEl ? normalizeYearMonth(bandSinceEl.value) : '';
  const cp = state.covidPeriod || {};
  const rows = [];
  container.querySelectorAll('.travel-multi-row').forEach(row => {
    const nameEl = row.querySelector('input.emp-travel-name');
    const sEl = row.querySelector('input.emp-travel-start');
    const eEl = row.querySelector('input.emp-travel-end');
    const name = nameEl ? (nameEl.value || '').trim() : '';
    const startDate = sEl ? (sEl.value || '').trim() : '';
    const endDate = eEl ? (eEl.value || '').trim() : '';
    if (!name && !startDate && !endDate) return;
    rows.push({ name, startDate, endDate });
  });
  const summary = summarizeTravel(rows, bandSince, cp);
  let levelText;
  if (summary.totalCount === 0) levelText = '尚未填寫';
  else if (summary.levelLabel) levelText = summary.levelLabel;
  else levelText = `不足 30 天 (合計 ${summary.eligibleDays} 天)`;

  const lvlEl = summaryEl.querySelector('[data-travel-level]');
  const scoreEl = summaryEl.querySelector('[data-travel-score]');
  const statsEl = summaryEl.querySelector('[data-travel-stats]');
  if (lvlEl) lvlEl.textContent = levelText;
  if (scoreEl) scoreEl.textContent = summary.levelScore > 0 ? '+' + summary.levelScore + ' 分' : '不加分';
  if (statsEl) {
    statsEl.textContent = `計入 ${summary.eligibleCount} 段(${summary.eligibleDays} 天) · 不計入 ${summary.ineligibleCount} 段(${summary.ineligibleDays} 天) · 總 ${summary.totalCount} 段`;
  }

  // 同步維護每段下方的 tag(類似 IPP 做法)
  container.querySelectorAll('.travel-multi-row').forEach(row => {
    const nameEl = row.querySelector('input.emp-travel-name');
    const sEl = row.querySelector('input.emp-travel-start');
    const eEl = row.querySelector('input.emp-travel-end');
    if (!nameEl || !sEl || !eEl) return;
    const name = (nameEl.value || '').trim();
    const startDate = (sEl.value || '').trim();
    const endDate = (eEl.value || '').trim();
    let tagEl = row.nextElementSibling;
    if (!tagEl || !tagEl.classList || !tagEl.classList.contains('detail-row-tag')) {
      tagEl = document.createElement('div');
      tagEl.className = 'detail-row-tag';
      row.parentElement.insertBefore(tagEl, row.nextSibling);
    }
    if (!name && !startDate && !endDate) {
      tagEl.innerHTML = '';
      return;
    }
    if (!startDate || !endDate) {
      tagEl.innerHTML = '<span class="ipp-row-tag ipp-row-tag-warn">⚠ 起訖日期不全</span>';
      return;
    }
    const days = calcTravelDays(startDate, endDate);
    if (days <= 0) {
      tagEl.innerHTML = '<span class="ipp-row-tag ipp-row-tag-warn">⚠ 回台日須 ≥ 出發日</span>';
      return;
    }
    const eligible = isTravelEligible(startDate, endDate, bandSince, cp);
    if (eligible) {
      tagEl.innerHTML = `<span class="ipp-row-tag ipp-row-tag-in">✓ 符合條件 · ${days} 天</span>`;
    } else {
      const sYM = ymdToYearMonth(startDate);
      let reason = '不符計分條件';
      if (isFutureDate(startDate) || isFutureDate(endDate)) reason = '未來日期不可填';
      else if (!bandSince) reason = '請先填寫上方「當前 Band 起始年月」';
      else if (!cp.startYYYYMM || !cp.endYYYYMM) reason = '管理員未設定疫情期間';
      else if (compareYearMonth(sYM, bandSince) < 0) reason = '出發日早於 Band 起始';
      else if (compareYearMonth(sYM, cp.startYYYYMM) < 0) reason = '早於疫情期間';
      else if (compareYearMonth(sYM, cp.endYYYYMM) > 0) reason = '晚於疫情期間';
      tagEl.innerHTML = `<span class="ipp-row-tag ipp-row-tag-warn">⚠ ${escapeHtml(reason)} · 不可提交(${days} 天)</span>`;
    }
  });
}

// TOEIC-style score input:員工打數字時即時更新 level + 分數 label
function updateScoreInputSummary(inp) {
  if (!inp) return;
  const itemId = inp.dataset.scoreItem;
  if (!itemId) return;
  const item = EXTRA_CONTRIBUTION_ITEMS.find(i => i.id === itemId);
  if (!item || !item.scoreInputMode) return;
  const box = document.querySelector(`[data-score-input-summary][data-score-item="${itemId}"]`);
  if (!box) return;
  const lvlEl = box.querySelector('[data-score-level]');
  const bonusEl = box.querySelector('[data-score-bonus]');
  // 跟 score input 同組的 testdate input
  const scoreInput = box.querySelector(`input.emp-score-input[data-score-item="${itemId}"]`);
  const testDateInput = box.querySelector(`input.emp-score-testdate[data-score-item="${itemId}"]`);
  const raw = (scoreInput ? scoreInput.value : '').trim();
  const testDate = testDateInput ? normalizeYearMonth(testDateInput.value) : '';
  if (!raw) {
    if (lvlEl) lvlEl.textContent = '未考 / 不加分';
    if (bonusEl) bonusEl.textContent = '不加分';
    return;
  }
  const n = parseFloat(raw);
  if (!isFinite(n) || n < 0) {
    if (lvlEl) lvlEl.textContent = '無效分數';
    if (bonusEl) bonusEl.textContent = '不加分';
    return;
  }
  const opt = item.options.find(o =>
    typeof o.minScore === 'number' && typeof o.maxScore === 'number' &&
    n >= o.minScore && n <= o.maxScore
  );
  const isFuture = isFutureYearMonth(testDate);
  const expired = item.validityMonths && testDate
    ? isScoreExpired(testDate, item.validityMonths)
    : false;
  if (isFuture) {
    if (lvlEl) lvlEl.textContent = '考試日期不可為未來 · 不加分';
    if (bonusEl) bonusEl.textContent = '不加分';
  } else if (expired) {
    if (lvlEl) lvlEl.textContent = '已過期 · 不加分';
    if (bonusEl) bonusEl.textContent = '不加分';
  } else {
    if (lvlEl) lvlEl.textContent = opt ? opt.label : `${n} 分(超出範圍)`;
    if (bonusEl) bonusEl.textContent = (opt && opt.score > 0) ? '+' + opt.score + ' 分' : '不加分';
  }
}

// Listing-mode summary 即時重算(STAMP 等):從 DOM 收每列的 level + name 算總和
// 因為員工填表階段所有列都還是 pending,我們用 preview = true 顯示「預估」分數
function updateListedSummary(container) {
  if (!container) return;
  const itemId = container.dataset.itemId;
  if (!itemId) return;
  const item = EXTRA_CONTRIBUTION_ITEMS.find(i => i.id === itemId);
  if (!item || !item.listingMode) return;
  const summaryEl = document.querySelector(`[data-listed-summary][data-listed-item="${itemId}"]`);
  if (!summaryEl) return;
  // 檢查「本項無可列舉」checkbox
  const noneCb = document.querySelector(`input.emp-listed-none[data-item="${itemId}"]`);
  const noneFlag = !!(noneCb && noneCb.checked);
  // 勾了 none → 視覺上隱藏列舉區,並清空已填值
  container.style.display = noneFlag ? 'none' : '';
  if (noneFlag) {
    container.querySelectorAll('input.emp-detail').forEach(i => { i.value = ''; });
    container.querySelectorAll('select.emp-detail-level').forEach(s => { s.value = ''; });
    container.querySelectorAll('input[type="month"]').forEach(i => { i.value = ''; });
  }

  // 從 DOM 收 rows(含 occurredAt 跟 level)
  const rows = [];
  if (!noneFlag) {
    container.querySelectorAll('.detail-multi-row').forEach(row => {
      const txt = row.querySelector('input.emp-detail');
      const lvl = row.querySelector('select.emp-detail-level');
      const ym = row.querySelector('input[type="month"]');
      if (!txt) return;
      const name = (txt.value || '').trim();
      if (!name) return;
      rows.push({
        name,
        level: lvl ? lvl.value : '',
        occurredAt: ym ? normalizeYearMonth(ym.value) : ''
      });
    });
  }
  // 讀目前 bandSince(可能員工剛改)
  const bandSinceEl = document.querySelector('.emp-band-since');
  const bandSince = bandSinceEl ? normalizeYearMonth(bandSinceEl.value) : '';
  const summary = summarizeListedItem(item, rows, { preview: true, bandSince });
  const lvlEl = summaryEl.querySelector('[data-listed-level]');
  const scoreEl = summaryEl.querySelector('[data-listed-score]');
  const statsEl = summaryEl.querySelector('[data-listed-stats]');
  if (lvlEl) {
    lvlEl.textContent = noneFlag
      ? '本項無可列舉'
      : (summary.totalCount === 0 ? '尚未列舉' : summary.totalCount + ' 筆已列');
  }
  if (scoreEl) {
    if (noneFlag) {
      scoreEl.textContent = '不加分';
    } else if (item.reviewerScoring && summary.totalCount > 0 && summary.ineligibleCount < summary.totalCount) {
      // reviewerScoring 項目:只要有任一筆 eligible 就顯示「待主管填分」,不預估
      scoreEl.textContent = '待主管填分';
    } else {
      scoreEl.textContent = summary.totalScore > 0 ? '預估 +' + summary.totalScore + ' 分' : '不加分';
    }
  }
  if (statsEl) {
    if (noneFlag) {
      statsEl.textContent = '員工已確認本項無可加分';
    } else if (summary.totalCount === 0) {
      statsEl.textContent = `請列舉每個 ${item.name} 項目,或勾選下方「本項無可列舉」`;
    } else if (summary.ineligibleCount > 0) {
      const parts = [];
      if (summary.futureCount > 0) parts.push(`${summary.futureCount} 筆未來日期`);
      if (summary.earlyCount > 0) parts.push(`${summary.earlyCount} 筆早於 Band 起始`);
      statsEl.innerHTML = `<span style="color:var(--accent);">⚠ ${parts.join('、')},不會計入</span>`;
    } else {
      statsEl.textContent = item.reviewerScoring
        ? '主管審核時會逐筆決定是否接受並填入分數'
        : '主管審核後實際採用「接受」筆數的等級分數加總';
    }
  }
}

function updateLiveTotal() {
  const live = document.getElementById('liveTotal');
  if (!live) return;
  let sum = 0, count = 0;
  document.querySelectorAll('.score-number').forEach(inp => {
    const v = parseFloat(inp.value);
    if (!isNaN(v)) { sum += v; count++; }
  });
  if (count === state.dimensions.length && count > 0) {
    live.innerHTML = sum.toFixed(2) + '<span class="max"> / ' + (state.dimensions.length * 5).toFixed(1) + '</span>';
  }
}

async function handleAction(e) {
  const action = e.currentTarget.dataset.action;
  const id = e.currentTarget.dataset.id;

  switch(action) {
    case 'goto-manager':
      view = { mode: 'manager_select', payload: null };
      render();
      break;
    case 'goto-admin':
      view = { mode: 'admin_login', payload: null };
      render();
      break;
    case 'back-to-picker':
      view = { mode: 'picker', payload: null };
      render();
      break;
    case 'logout':
      view = { mode: 'picker', payload: null };
      render();
      break;
    case 'select-manager': {
      const mgr = state.managers.find(m => m.id === id);
      if (!mgr) break;
      if (!mgr.password) {
        view = { mode: 'manager_set_password', payload: { managerId: id } };
      } else {
        view = { mode: 'manager_login_password', payload: { managerId: id } };
      }
      render();
      break;
    }
    case 'manager-set-password-submit':
      await handleManagerSetPassword();
      break;
    case 'manager-login-submit':
      handleManagerLoginSubmit();
      break;
    case 'manager-change-password':
      await handleManagerChangePassword();
      break;
    case 'reset-mgr-pass':
      await handleResetManagerPassword(id);
      break;
    case 'emp-save-draft':
      await handleEmpSaveDraft();
      break;
    case 'emp-submit':
      await handleEmpSubmit();
      break;
    case 'detail-row-add': {
      // 在此「+ 新增一列」按鈕之前插入一個空列
      const addBtn = e.currentTarget;
      const container = addBtn.parentElement;  // .detail-multi
      if (!container) break;
      const className = addBtn.dataset.class || '';
      const attrs = addBtn.dataset.attrs || '';
      const placeholder = addBtn.dataset.placeholder || '';
      const isIpp = addBtn.dataset.isIpp === '1';
      const isTravel = addBtn.dataset.isTravel === '1';
      const tmp = document.createElement('div');
      if (isTravel) {
        tmp.innerHTML = `
          <div class="detail-multi-row travel-multi-row">
            <input type="text" class="emp-travel-name" value="" placeholder="${escapeHtml(placeholder)}">
            <input type="date" class="emp-travel-start" value="" title="出發日">
            <span style="color:var(--ink-muted);font-family:'JetBrains Mono',monospace;font-size:12px;align-self:center;">→</span>
            <input type="date" class="emp-travel-end" value="" title="回台日">
            <button type="button" class="detail-row-remove" data-action="detail-row-remove" title="刪除此段">✕</button>
          </div>
        `.trim();
      } else {
        const weightField = isIpp ? `
          <input type="number" class="${className}-weight" ${attrs}
                 value="" min="1" step="1" placeholder="掛名人數"
                 title="本筆 IPP 共幾人共掛(獨自 = 1、3 人共掛填 3、13 人填 13)">
        ` : '';
        // listing-mode level 下拉(從 button 的 data-level-options 解析)
        let levelField = '';
        const levelOptionsJson = addBtn.dataset.levelOptions || '';
        if (levelOptionsJson) {
          try {
            const opts = JSON.parse(levelOptionsJson);
            if (Array.isArray(opts) && opts.length > 0) {
              levelField = `<select class="${className}-level" ${attrs} title="本筆等級">
                <option value="" selected>-- 等級 --</option>
                ${opts.map(o => `<option value="${escapeHtml(o.id)}">${escapeHtml(o.label)}</option>`).join('')}
              </select>`;
            }
          } catch {}
        }
        tmp.innerHTML = `
          <div class="detail-multi-row">
            ${levelField}
            <input type="text" class="${className}" ${attrs} value="" placeholder="${escapeHtml(placeholder)}">
            <input type="month" class="${className}-ym" ${attrs} value="" title="發生年月 (YYYY-MM)">
            ${weightField}
            <button type="button" class="detail-row-remove" data-action="detail-row-remove" title="刪除此列">✕</button>
          </div>
        `.trim();
      }
      const newRow = tmp.firstElementChild;
      container.insertBefore(newRow, addBtn);
      // 把新 remove 按鈕掛上監聽器(attachHandlers 下次才會全量重掛,這裡只補新的)
      const rmBtn = newRow.querySelector('[data-action="detail-row-remove"]');
      if (rmBtn) rmBtn.addEventListener('click', handleAction);
      // focus 新輸入框方便立即打字
      const inp = newRow.querySelector('input[type="text"]');
      if (inp) inp.focus();
      break;
    }
    case 'detail-row-remove': {
      const rmBtn = e.currentTarget;
      const row = rmBtn.closest('.detail-multi-row, .travel-multi-row');
      const container = row && row.closest('.detail-multi');
      if (!row || !container) break;
      // 若是 row 後面有 tag 元素(IPP / Travel),一起刪掉
      const nextTag = row.nextElementSibling;
      if (nextTag && nextTag.classList && nextTag.classList.contains('detail-row-tag')) {
        nextTag.remove();
      }
      row.remove();
      // 若刪到一列都不剩,自動插一列空白(讓 UI 仍能繼續列舉)
      if (container.querySelectorAll('.detail-multi-row, .travel-multi-row').length === 0) {
        // 讓使用者可以用「+ 新增一列」自己加;不自動補(UI 最乾淨)
      }
      // 觸發對應 summary 重算
      const itemId = container.dataset.itemId;
      if (itemId === 'ipp') updateIppSummary();
      else if (itemId === 'travel') updateTravelSummary();
      else if (container.dataset.listing === '1') updateListedSummary(container);
      updateAppliedTotal();
      break;
    }
    case 'copy-emp-link':
      await handleCopyEmpLink(id);
      break;
    case 'copy-band-links':
      await handleCopyBandLinks(e.currentTarget.dataset.band);
      break;
    case 'copy-all-links':
      await handleCopyAllLinks();
      break;
    case 'open-review':
      view.payload = { ...(view.payload || {}), reviewingEmp: id };
      render();
      break;
    case 'close-review':
      view.payload = { ...(view.payload || {}), reviewingEmp: null };
      render();
      break;
    case 'set-review':
      await handleSetReview(e.currentTarget.dataset.empid, e.currentTarget.dataset.itemid, e.currentTarget.dataset.decision);
      break;
    case 'set-listed-review':
      await handleSetListedReview(e.currentTarget.dataset.empid, e.currentTarget.dataset.itemid, parseInt(e.currentTarget.dataset.rowidx, 10), e.currentTarget.dataset.decision);
      break;
    case 'bulk-listed-review':
      await handleBulkListedReview(e.currentTarget.dataset.empid, e.currentTarget.dataset.itemid, e.currentTarget.dataset.decision);
      break;
    case 'set-cert-review':
      await handleSetCertReview(e.currentTarget.dataset.empid, e.currentTarget.dataset.optid, e.currentTarget.dataset.decision);
      break;
    case 'bulk-review':
      await handleBulkReview(e.currentTarget.dataset.empid, e.currentTarget.dataset.actionType);
      break;
    case 'finalize-review':
      await handleFinalizeReview(id);
      break;
    case 'reopen-submission':
      await handleReopenSubmission(id);
      break;
    case 'delete-submission':
      await handleDeleteSubmission(id);
      break;
    case 'select-employee':
      view.payload.employeeId = id;
      render();
      break;
    case 'back-to-emp-list':
      view.payload.employeeId = null;
      render();
      break;
    case 'save-scores':
      await handleSaveScores();
      break;
    case 'admin-submit':
      handleAdminSubmit();
      break;
    case 'admin-tab':
      view.payload = {
        tab: e.currentTarget.dataset.tab,
        trimMode: !!view.payload?.trimMode,
        bonusMode: !!view.payload?.bonusMode,
        techSplit: !!view.payload?.techSplit,
      };
      render();
      break;
    case 'toggle-trim-mode':
      view.payload = { ...(view.payload || {}), trimMode: !view.payload?.trimMode };
      render();
      break;
    case 'toggle-bonus-mode':
      view.payload = { ...(view.payload || {}), bonusMode: !view.payload?.bonusMode };
      render();
      break;
    case 'toggle-tech-split':
      view.payload = { ...(view.payload || {}), techSplit: !view.payload?.techSplit };
      render();
      break;
    case 'toggle-bonus-emp':
      view.payload = { ...(view.payload || {}), expandedBonus: view.payload?.expandedBonus === id ? null : id };
      render();
      break;
    case 'save-bonus-emp':
      await handleSaveBonusEmp(id);
      break;
    case 'reset-bonus-emp':
      await handleResetBonusEmp(id);
      break;
    case 'add-employee':
      await handleAddEmployee();
      break;
    case 'del-employee':
      await handleDeleteEmployee(id);
      break;
    case 'save-emp-band-since': {
      const inp = document.querySelector(`.emp-admin-band-since[data-emp-id="${id}"]`);
      if (!inp) break;
      const ym = normalizeYearMonth(inp.value);
      const emp = state.employees.find(x => x.id === id);
      if (!emp) break;
      emp.bandSinceYYYYMM = ym;
      await saveState(state);
      toast(ym ? `已設定 ${emp.name} 的 Band 起始:${ym}` : `已清空 ${emp.name} 的 Band 起始`);
      render();
      break;
    }
    case 'add-manager':
      await handleAddManager();
      break;
    case 'del-manager':
      await handleDeleteManager(id);
      break;
    case 'add-dimension':
      await handleAddDimension();
      break;
    case 'del-dimension':
      await handleDeleteDimension(id);
      break;
    case 'change-password':
      await handleChangePassword();
      break;
    case 'save-covid-period':
      await handleSaveCovidPeriod();
      break;
    case 'clear-scores':
      await handleClearScores();
      break;
    case 'reset-all':
      await handleResetAll();
      break;
    case 'toggle-detail':
      handleToggleDetail(e.currentTarget.dataset.target, e.currentTarget);
      break;
    case 'toggle-hide-unscored': {
      // Flip state and re-render every currently-open detail panel in place,
      // so展開狀態不被重置、使用者不失焦。
      view.payload = { ...(view.payload || {}), hideUnscored: !view.payload?.hideUnscored };
      document.querySelectorAll('tr.detail-row:not(.hidden) .detail-content').forEach(el => {
        // recover the emp id from the parent tr's id like "detail_T150120"
        const trId = el.closest('tr.detail-row')?.id || '';
        const empId = trId.replace(/^detail_/, '');
        const emp = state.employees.find(x => x.id === empId);
        if (emp) el.innerHTML = renderEmpDetail(emp);
      });
      // 新插入的 checkbox 需要重新綁 click handler
      attachHandlers();
      break;
    }
    case 'export-csv':
      handleExportCsv();
      break;
    case 'export-detail-csv':
      handleExportDetailCsv();
      break;
  }
}

async function handleSaveScores() {
  const mgrId = view.payload.managerId;
  const empId = view.payload.employeeId;
  const newScores = {};
  let valid = true;
  document.querySelectorAll('.score-number').forEach(inp => {
    const dim = inp.dataset.dim;
    const v = parseFloat(inp.value);
    if (isNaN(v) || v < 0.1 || v > 5.0) { valid = false; return; }
    newScores[dim] = Math.round(v * 10) / 10;
  });
  if (!valid || Object.keys(newScores).length !== state.dimensions.length) {
    toast('請確認所有維度都已輸入有效分數');
    return;
  }
  if (!state.scores[empId]) state.scores[empId] = {};
  state.scores[empId][mgrId] = newScores;
  await saveState(state);
  toast('評分已儲存');
  view.payload.employeeId = null;
  render();
}

// 只讀 DOM、回傳錯誤訊息陣列。不寫入 state。
function collectAndValidateEmpForm() {
  const empId = view.payload.empId;
  const emp = state.employees.find(e => e.id === empId);
  if (!emp) return ['找不到員工資料'];
  const problems = [];

  const bandSinceEl = document.querySelector('.emp-band-since');
  const bandSince = bandSinceEl ? normalizeYearMonth(bandSinceEl.value) : '';
  if (!bandSince) problems.push('請先填寫「當前 Band 起始年月」');

  // 檢查每列 single 細項(Travel 有獨立 validator 跳過)
  document.querySelectorAll('.form-items .detail-multi').forEach(container => {
    const itemId = container.dataset.itemId || '';
    if (itemId === 'travel') return;  // Travel 由後面專屬 validator 處理
    container.querySelectorAll('.detail-multi-row').forEach(row => {
      const txt = row.querySelector('input[type="text"]');
      const ym = row.querySelector('input[type="month"]');
      const name = txt ? (txt.value || '').trim() : '';
      const occurredAt = ym ? normalizeYearMonth(ym.value) : '';
      // 只驗證「使用者有實際填了名稱」的列,空白列忽略
      if (!name) return;
      const err = validateOccurredAt(itemId, occurredAt, bandSince);
      if (err) {
        const itemDef = EXTRA_CONTRIBUTION_ITEMS.find(i => i.id === itemId);
        const label = itemDef ? itemDef.name : itemId;
        problems.push(`${label}「${name}」: ${err}`);
      }
      // 未來日期統一擋下(所有 detail-multi 項目都適用)
      if (occurredAt && isFutureYearMonth(occurredAt)) {
        const itemDef = EXTRA_CONTRIBUTION_ITEMS.find(i => i.id === itemId);
        const label = itemDef ? itemDef.name : itemId;
        problems.push(`${label}「${name}」: 發生年月「${occurredAt}」不可為未來月份`);
      }
      // IPP 額外:掛名人數必填且須是 ≥ 1 的正整數
      if (itemId === 'ipp') {
        const winp = row.querySelector('input.emp-detail-weight');
        const wval = winp ? (winp.value || '').trim() : '';
        if (!wval) {
          problems.push(`IPP「${name}」: 請填本筆「掛名人數」(獨自完成填 1)`);
        } else {
          const n = parseInt(wval, 10);
          if (!isFinite(n) || n < 1 || String(n) !== wval) {
            problems.push(`IPP「${name}」: 掛名人數「${wval}」無效,須為 ≥ 1 的整數`);
          }
        }
      }
      // listing-mode(STAMP 等):每列必須選等級(countListingMode 除外)
      if (container.dataset.listing === '1') {
        const itemDef = EXTRA_CONTRIBUTION_ITEMS.find(i => i.id === itemId);
        if (itemDef && itemDef.countListingMode) {
          // no level field, skip
        } else {
          const lvlSel = row.querySelector('select.emp-detail-level');
          const lvl = lvlSel ? (lvlSel.value || '').trim() : '';
          if (!lvl) {
            const label = itemDef ? itemDef.name : itemId;
            problems.push(`${label}「${name}」: 請選擇等級`);
          }
        }
      }
    });
  });

  // scoreInputMode(TOEIC):若有填分數,必須是 0-990 的有效數字,且有效期項目須填考試年月
  document.querySelectorAll('input.emp-score-input').forEach(inp => {
    const itemId = inp.dataset.scoreItem;
    const itemDef = EXTRA_CONTRIBUTION_ITEMS.find(i => i.id === itemId);
    if (!itemDef) return;
    const raw = (inp.value || '').trim();
    if (!raw) return;  // 空值允許(等同「未考」)
    const n = parseFloat(raw);
    if (!isFinite(n) || n < 0 || n > 990 || String(n) !== raw) {
      problems.push(`${itemDef.name}: 分數「${raw}」無效,須為 0-990 的整數`);
      return;
    }
    // 若該項有 validityMonths(例如 TOEIC 2 年),且有實際達到加分門檻的分數 → 必須填考試年月
    if (itemDef.validityMonths) {
      const hasValidScore = itemDef.options.some(o =>
        typeof o.minScore === 'number' && n >= o.minScore && n <= o.maxScore &&
        o.id !== 'none' && o.score > 0
      );
      if (hasValidScore) {
        const dateInp = document.querySelector(`input.emp-score-testdate[data-score-item="${itemId}"]`);
        const testDate = dateInp ? normalizeYearMonth(dateInp.value) : '';
        if (!testDate) {
          problems.push(`${itemDef.name}: 填了分數 ${n} 須同時填考試年月(用於判定證照有效期)`);
        } else if (isFutureYearMonth(testDate)) {
          problems.push(`${itemDef.name}: 考試年月「${testDate}」不可為未來月份`);
        }
      }
    }
  });

  // Listing-mode 強制表態:每個 listing-mode 項目必須「有列舉至少一筆有效列」或「勾選本項無可列舉」
  EXTRA_CONTRIBUTION_ITEMS.forEach(item => {
    if (!item.listingMode) return;
    const noneCb = document.querySelector(`input.emp-listed-none[data-item="${item.id}"]`);
    const noneFlag = !!(noneCb && noneCb.checked);
    if (noneFlag) return;  // 勾了「無可列舉」→ OK
    // 否則必須至少列一筆有效(有填 name)
    const container = document.querySelector(`.detail-multi[data-item-id="${item.id}"][data-listing="1"]`);
    let hasAny = false;
    if (container) {
      container.querySelectorAll('.detail-multi-row').forEach(row => {
        const txt = row.querySelector('input.emp-detail');
        const name = txt ? (txt.value || '').trim() : '';
        if (name) hasAny = true;
      });
    }
    if (!hasAny) {
      problems.push(`${item.name}: 請列舉至少一筆,或勾選「本項無可列舉」明確表態`);
    }
  });

  // Travel 驗證:每段「出發日 + 回台日」都需填齊;回台 ≥ 出發;
  // 出發日的「年月」必須在 Band 期間內 ∧ 在疫情期間內(否則擋下提交)
  {
    const empObj = state.employees.find(e => e.id === empId);
    const bandSince = empObj && empObj.bandSinceYYYYMM;
    const cp = state.covidPeriod || {};
    document.querySelectorAll('.travel-multi-row').forEach(row => {
      const nameEl = row.querySelector('input.emp-travel-name');
      const sEl = row.querySelector('input.emp-travel-start');
      const eEl = row.querySelector('input.emp-travel-end');
      const name = nameEl ? (nameEl.value || '').trim() : '';
      const startDate = sEl ? (sEl.value || '').trim() : '';
      const endDate = eEl ? (eEl.value || '').trim() : '';
      if (!name && !startDate && !endDate) return;
      const label = name || '(未命名段)';
      if (!startDate || !endDate) {
        problems.push(`Travel「${label}」: 請填出發日與回台日`);
        return;
      }
      if (calcTravelDays(startDate, endDate) <= 0) {
        problems.push(`Travel「${label}」: 回台日須 ≥ 出發日`);
        return;
      }
      if (isFutureDate(startDate) || isFutureDate(endDate)) {
        problems.push(`Travel「${label}」: 出發日 / 回台日不可為未來日期`);
        return;
      }
      const sYM = ymdToYearMonth(startDate);
      if (bandSince && compareYearMonth(sYM, bandSince) < 0) {
        problems.push(`Travel「${label}」: 出發日 ${startDate} 早於 Band 起始 ${bandSince},不可填`);
        return;
      }
      if (!cp.startYYYYMM || !cp.endYYYYMM) {
        problems.push(`Travel「${label}」: 管理員尚未設定疫情期間,無法提交,請聯繫管理員`);
        return;
      }
      if (compareYearMonth(sYM, cp.startYYYYMM) < 0) {
        problems.push(`Travel「${label}」: 出發日 ${startDate} 早於疫情起 ${cp.startYYYYMM},不可填`);
        return;
      }
      if (compareYearMonth(sYM, cp.endYYYYMM) > 0) {
        problems.push(`Travel「${label}」: 出發日 ${startDate} 晚於疫情迄 ${cp.endYYYYMM},不可填`);
        return;
      }
    });
  }

  return problems;
}

async function collectAndSaveEmpForm(newStatus) {
  const empId = view.payload.empId;
  if (!state.empSubmissions) state.empSubmissions = {};
  if (!state.empSubmissions[empId]) {
    state.empSubmissions[empId] = { status: 'draft', data: { items: {}, itemDetails: {}, certDetails: {}, others: 0, othersNote: '' }, reviewedItems: {}, reviewedCertItems: {}, submittedAt: null };
  }
  const sub = state.empSubmissions[empId];
  if (!sub.data) sub.data = { items: {}, itemDetails: {}, certDetails: {}, others: 0, othersNote: '' };

  // 清空後重新收集
  sub.data.items = {};
  sub.data.itemDetails = {};
  sub.data.certDetails = {};

  // 員工自填的 bandSinceYYYYMM 寫回 employee 物件
  const bandSinceEl = document.querySelector('.emp-band-since');
  if (bandSinceEl) {
    const ym = normalizeYearMonth(bandSinceEl.value);
    const emp = state.employees.find(e => e.id === empId);
    if (emp) emp.bandSinceYYYYMM = ym;  // 空字串也寫回(允許清空)
  }

  // single select(listing-mode 跳過 — 因為它沒下拉)
  document.querySelectorAll('.emp-select').forEach(sel => {
    const itemId = sel.dataset.item;
    const itemDef = EXTRA_CONTRIBUTION_ITEMS.find(i => i.id === itemId);
    if (itemDef && itemDef.listingMode) return;  // listing 項目沒下拉
    if (sel.value && sel.value !== 'none') sub.data.items[itemId] = sel.value;
    else if (sel.value === 'none' || sel.value === '') delete sub.data.items[itemId];
  });

  // scoreInputMode(TOEIC):員工填數字 + 考試年月 → 自動對 level,過期時不寫 items.X 但保留 itemDetails
  document.querySelectorAll('input.emp-score-input').forEach(inp => {
    const itemId = inp.dataset.scoreItem;
    const itemDef = EXTRA_CONTRIBUTION_ITEMS.find(i => i.id === itemId);
    if (!itemDef || !itemDef.scoreInputMode) return;
    const testDateInp = document.querySelector(`input.emp-score-testdate[data-score-item="${itemId}"]`);
    const testDate = testDateInp ? normalizeYearMonth(testDateInp.value) : '';
    const raw = (inp.value || '').trim();
    if (!raw) {
      delete sub.data.items[itemId];
      delete sub.data.itemDetails[itemId];
      return;
    }
    const n = parseFloat(raw);
    if (!isFinite(n) || n < 0) {
      delete sub.data.items[itemId];
      delete sub.data.itemDetails[itemId];
      return;
    }
    const matched = itemDef.options.find(o =>
      typeof o.minScore === 'number' && typeof o.maxScore === 'number' &&
      n >= o.minScore && n <= o.maxScore
    );
    const expired = itemDef.validityMonths && testDate
      ? isScoreExpired(testDate, itemDef.validityMonths)
      : false;
    const isFuture = isFutureYearMonth(testDate);
    if (matched && matched.id !== 'none' && matched.score > 0 && !expired && !isFuture) {
      sub.data.items[itemId] = matched.id;
      sub.data.itemDetails[itemId] = [{ name: 'score', score: n, occurredAt: testDate }];
    } else {
      delete sub.data.items[itemId];
      sub.data.itemDetails[itemId] = [{ name: 'score', score: n, occurredAt: testDate }];
    }
  });

  // 用「列」為單位配對 text + month + (IPP only) weight + (listing-mode) level 收集成物件陣列
  // 每列只屬於一個 itemId 或 optId(視 detail-multi 容器而定)
  document.querySelectorAll('.form-items .detail-multi').forEach(container => {
    const isListing = container.dataset.listing === '1';
    const containerItemId = container.dataset.itemId || '';
    // 為了在 collector 裡能保留每筆 reviewDecision,先讀現有 state 裡的細項以位置-或名稱-索引找回 reviewDecision
    // 簡化策略:依 (name + occurredAt + level-or-weight) 作為 key 找回原 reviewDecision
    const existingByKey = {};
    if (isListing) {
      const arr = normalizeDetail(sub.data.itemDetails?.[containerItemId]);
      arr.forEach(d => {
        const keyPart = d.level || (d.weight ? `w${d.weight}` : '');
        const k = `${d.name}|${d.occurredAt}|${keyPart}`;
        if (d.reviewDecision) existingByKey[k] = d.reviewDecision;
      });
    }
    // countListingMode 項目 ref(無 level 下拉)
    const containerItem = EXTRA_CONTRIBUTION_ITEMS.find(i => i.id === containerItemId);
    const isCountMode = containerItem && containerItem.countListingMode;
    const isIppMode = containerItem && containerItem.ippMode;
    const rows = [];
    container.querySelectorAll('.detail-multi-row').forEach(row => {
      const txt = row.querySelector('input.emp-detail, input.emp-cert-detail');
      if (!txt) return;
      const ym = row.querySelector('input[type="month"]');
      const wsel = row.querySelector('input.emp-detail-weight, input.emp-cert-detail-weight');
      const lvlsel = row.querySelector('select.emp-detail-level, select.emp-cert-detail-level');
      const name = (txt.value || '').trim();
      if (!name) return;
      const obj = { name, occurredAt: ym ? normalizeYearMonth(ym.value) : '' };
      if (wsel && wsel.value) { const w = peopleNToWeight(wsel.value); if (w) obj.weight = w; }
      if (lvlsel && lvlsel.value) {
        obj.level = lvlsel.value;
        const k = `${obj.name}|${obj.occurredAt}|${obj.level}`;
        obj.reviewDecision = existingByKey[k] || 'pending';
      } else if (isCountMode) {
        // 無 level 下拉 → 自動填 'listed'(item 只有一個 option)
        obj.level = 'listed';
        const k = `${obj.name}|${obj.occurredAt}|listed`;
        obj.reviewDecision = existingByKey[k] || 'pending';
      } else if (isIppMode) {
        // IPP listingMode:無 level 但以 weight 作為 key 一部分
        const keyPart = obj.weight ? `w${obj.weight}` : '';
        const k = `${obj.name}|${obj.occurredAt}|${keyPart}`;
        obj.reviewDecision = existingByKey[k] || 'pending';
      }
      rows.push(obj);
    });
    if (rows.length === 0) {
      // listing 模式下空列表也要清掉 detail
      if (isListing) delete sub.data.itemDetails[containerItemId];
      return;
    }
    // 依 text input 的 dataset 判斷屬於 single-item 還是 cert-opt
    const firstTxt = container.querySelector('input.emp-detail, input.emp-cert-detail');
    if (!firstTxt) return;
    if (firstTxt.classList.contains('emp-detail')) {
      const itemId = firstTxt.dataset.detailItem;
      // listing-mode:細項就是計分依據,直接存
      // IPP:即使 sub.data.items.ipp 還沒被設定也要存細項(自動算等級在下面)
      if (isListing || itemId === 'ipp' || sub.data.items[itemId]) {
        sub.data.itemDetails[itemId] = rows;
      }
    } else {
      const optId = firstTxt.dataset.certOpt;
      const cb = document.querySelector(`.emp-multi[value="${optId}"]`);
      if (cb && cb.checked) sub.data.certDetails[optId] = rows;
    }
  });

  // Listing-mode「本項無可列舉」checkbox 收集 → sub.data.itemNoneFlags[itemId]
  if (!sub.data.itemNoneFlags) sub.data.itemNoneFlags = {};
  document.querySelectorAll('input.emp-listed-none').forEach(cb => {
    const itemId = cb.dataset.item;
    if (!itemId) return;
    if (cb.checked) {
      sub.data.itemNoneFlags[itemId] = true;
      // 若勾了「本項無可列舉」但 itemDetails 還有舊值 → 清掉(避免狀態衝突)
      if (sub.data.itemDetails && sub.data.itemDetails[itemId]) {
        delete sub.data.itemDetails[itemId];
      }
    } else {
      delete sub.data.itemNoneFlags[itemId];
    }
  });

  // IPP 自動算等級:從 itemDetails.ipp + bandSinceYYYYMM 推 → 寫入 items.ipp
  // 沒有任何 IPP 細項或加總 < 0.1 → 不設定 items.ipp(等同「無」)
  {
    const empObj = state.employees.find(e => e.id === empId);
    const bandSince = empObj && empObj.bandSinceYYYYMM;
    const ippDetails = sub.data.itemDetails.ipp || [];
    const { optionId } = computeIppLevelFromDetails(ippDetails, bandSince);
    if (optionId && optionId !== 'none') {
      sub.data.items.ipp = optionId;
    } else {
      delete sub.data.items.ipp;  // 沒達 0.1 就不算
    }
  }

  // Travel 收集:.travel-multi-row 三個欄位 → {name, startDate, endDate, reviewDecision?}[]
  // 然後依 covidPeriod + bandSince 自動算 items.travel
  {
    // 先讀舊的 itemDetails.travel 做 by-key lookup,讓同一段的 reviewDecision 保留
    const prevTravel = normalizeTravelDetail(sub.data.itemDetails?.travel);
    const existingByKey = {};
    prevTravel.forEach(d => {
      const k = `${d.name}|${d.startDate}|${d.endDate}`;
      existingByKey[k] = d.reviewDecision || 'pending';
    });
    const travelRows = [];
    document.querySelectorAll('.travel-multi-row').forEach(row => {
      const nameEl = row.querySelector('input.emp-travel-name');
      const sEl = row.querySelector('input.emp-travel-start');
      const eEl = row.querySelector('input.emp-travel-end');
      const name = nameEl ? (nameEl.value || '').trim() : '';
      const startDate = sEl ? (sEl.value || '').trim() : '';
      const endDate = eEl ? (eEl.value || '').trim() : '';
      if (!name && !startDate && !endDate) return;
      const k = `${name}|${startDate}|${endDate}`;
      travelRows.push({
        name, startDate, endDate,
        reviewDecision: existingByKey[k] || 'pending'
      });
    });
    if (travelRows.length > 0) {
      sub.data.itemDetails.travel = travelRows;
    } else {
      delete sub.data.itemDetails.travel;
    }
    // 自動算 items.travel(員工端用所有細項算,主管審核後再用 onlyAccepted 重算)
    const empObj = state.employees.find(e => e.id === empId);
    const bandSince = empObj && empObj.bandSinceYYYYMM;
    const cp = state.covidPeriod || {};
    const { optionId } = computeTravelLevelFromDetails(travelRows, bandSince, cp);
    if (optionId && optionId !== 'none') {
      sub.data.items.travel = optionId;
    } else {
      delete sub.data.items.travel;
    }
  }

  // multi (cert) checkbox — 分組收集
  const multiByItem = {};
  document.querySelectorAll('.emp-multi').forEach(cb => {
    const itemId = cb.dataset.item;
    if (!multiByItem[itemId]) multiByItem[itemId] = [];
    if (cb.checked) multiByItem[itemId].push(cb.value);
  });
  Object.keys(multiByItem).forEach(itemId => {
    if (multiByItem[itemId].length > 0) sub.data.items[itemId] = multiByItem[itemId];
  });

  // others
  const othersScore = document.querySelector('.emp-others[data-others="score"]');
  const othersNote = document.querySelector('.emp-others[data-others="note"]');
  if (othersScore) {
    const v = parseFloat(othersScore.value);
    sub.data.others = isNaN(v) ? 0 : Math.round(v * 10) / 10;
  }
  if (othersNote) sub.data.othersNote = othersNote.value.trim();

  // 狀態變更
  if (newStatus === 'submitted') {
    sub.status = 'submitted';
    sub.submittedAt = Date.now();
    // 把所有有填寫的項目設為 pending
    sub.reviewedItems = {};
    sub.reviewedCertItems = {};
    Object.keys(sub.data.items).forEach(itemId => {
      const item = EXTRA_CONTRIBUTION_ITEMS.find(i => i.id === itemId);
      if (item && item.type === 'single') {
        sub.reviewedItems[itemId] = 'pending';
      } else if (item && item.type === 'multi') {
        sub.data.items[itemId].forEach(optId => {
          sub.reviewedCertItems[optId] = 'pending';
        });
      }
    });
    if (sub.data.others > 0) sub.reviewedItems.others = 'pending';
  } else {
    sub.status = 'draft';
  }

  await saveState(state);
}

async function copyToClipboard(text) {
  try {
    await navigator.clipboard.writeText(text);
    return true;
  } catch (e) {
    // fallback: textarea
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      return true;
    } catch (e2) {
      return false;
    }
  }
}

async function handleCopyAllLinks() {
  if (state.employees.length === 0) return;
  // group by band
  const bandGroups = {};
  state.employees.forEach(e => {
    const b = e.currentBand ?? '未設定';
    if (!bandGroups[b]) bandGroups[b] = [];
    bandGroups[b].push(e);
  });
  const sortedBands = Object.keys(bandGroups).sort((a, b) => {
    if (a === '未設定') return 1;
    if (b === '未設定') return -1;
    return Number(b) - Number(a);
  });
  const sections = sortedBands.map(band => {
    const emps = bandGroups[band];
    const targetBand = band !== '未設定' ? Number(band) + 1 : '—';
    const lines = emps.map(e => `${e.name}(${e.enName || ''})\t${buildEmployeeLink(e.id)}`);
    return `=== Band ${band} → Band ${targetBand}(${emps.length} 人)===\n${lines.join('\n')}`;
  });
  const text = `Extra Contribution 自填連結(共 ${state.employees.length} 人)\n\n` + sections.join('\n\n');
  const ok = await copyToClipboard(text);
  toast(ok ? `已複製全部 ${state.employees.length} 個連結` : '複製失敗');
}

// Listing-mode 逐筆審核:把 sub.data.itemDetails[itemId][rowIdx].reviewDecision 設為 decision
async function handleSetListedReview(empId, itemId, rowIdx, decision) {
  if (!state.empSubmissions || !state.empSubmissions[empId]) return;
  const sub = state.empSubmissions[empId];
  if (!sub.data) sub.data = { items: {}, itemDetails: {}, certDetails: {}, others: 0, othersNote: '' };
  // 先 migrate 一次寫回(把舊資料的 level + decision 補上),確保 rowIdx 對應穩定
  const item = EXTRA_CONTRIBUTION_ITEMS.find(i => i.id === itemId);
  if (!item) return;
  const arr = migrateListedDetails(item, sub, sub.data);
  if (rowIdx < 0 || rowIdx >= arr.length) return;
  arr[rowIdx].reviewDecision = decision;
  sub.data.itemDetails[itemId] = arr;
  await saveState(state);
  render();
}

// Listing-mode 批次:把該 item 所有列設為同一 decision
async function handleBulkListedReview(empId, itemId, decision) {
  if (!state.empSubmissions || !state.empSubmissions[empId]) return;
  const sub = state.empSubmissions[empId];
  if (!sub.data) sub.data = { items: {}, itemDetails: {}, certDetails: {}, others: 0, othersNote: '' };
  const item = EXTRA_CONTRIBUTION_ITEMS.find(i => i.id === itemId);
  if (!item) return;
  const arr = migrateListedDetails(item, sub, sub.data);
  arr.forEach(d => { d.reviewDecision = decision; });
  sub.data.itemDetails[itemId] = arr;
  await saveState(state);
  render();
}

async function handleBulkReview(empId, type) {
  if (!state.empSubmissions || !state.empSubmissions[empId]) return;
  const sub = state.empSubmissions[empId];
  if (!sub.reviewedItems) sub.reviewedItems = {};
  if (!sub.reviewedCertItems) sub.reviewedCertItems = {};
  const decision = type === 'accept-all' ? 'accepted' : 'rejected';

  // 對所有有提交的項目 (包括 cert) 都設成同個決定
  EXTRA_CONTRIBUTION_ITEMS.forEach(item => {
    if (item.listingMode) {
      const arr = migrateListedDetails(item, sub, sub.data || {});
      if (arr.length > 0) {
        arr.forEach(d => { d.reviewDecision = decision; });
        if (!sub.data) sub.data = { items: {}, itemDetails: {}, certDetails: {}, others: 0, othersNote: '' };
        sub.data.itemDetails[item.id] = arr;
      }
      return;
    }
    const sel = sub.data?.items?.[item.id];
    if (item.type === 'single') {
      if (sel && sel !== 'none') sub.reviewedItems[item.id] = decision;
    } else {
      const arr = Array.isArray(sel) ? sel : [];
      arr.forEach(optId => { sub.reviewedCertItems[optId] = decision; });
    }
  });
  if ((Number(sub.data?.others) || 0) > 0) sub.reviewedItems.others = decision;

  await saveState(state);
  render();
}

async function handleFinalizeReview(empId) {
  const sub = state.empSubmissions?.[empId];
  if (!sub) return;
  let pending = 0;
  Object.values(sub.reviewedItems || {}).forEach(v => { if (v === 'pending') pending++; });
  Object.values(sub.reviewedCertItems || {}).forEach(v => { if (v === 'pending') pending++; });
  // listing-mode 待審 + reviewerScoring 「已接受但未填分」的列
  let unscoredAccepted = 0;
  EXTRA_CONTRIBUTION_ITEMS.forEach(item => {
    if (!item.listingMode) return;
    const arr = migrateListedDetails(item, sub, sub.data || {});
    arr.forEach(d => {
      const dec = d.reviewDecision || 'pending';
      if (dec === 'pending') pending++;
      if (item.reviewerScoring && dec === 'accepted') {
        const s = parseFloat(d.reviewerScore);
        if (!isFinite(s) || s <= 0) unscoredAccepted++;
      }
    });
  });
  const warnings = [];
  if (pending > 0) warnings.push(`還有 ${pending} 項尚未決定(待審狀態),這些項目將不會計入加分。`);
  if (unscoredAccepted > 0) warnings.push(`有 ${unscoredAccepted} 筆「其他證照」已接受但未填分,將以 0 分計入。`);
  if (warnings.length > 0) {
    if (!confirm(warnings.join('\n') + '\n\n確定要完成審核?')) return;
  }
  sub.status = 'reviewed';
  applyReviewedSubmission(empId);
  await saveState(state);
  toast('審核完成,加分已套用');
  view.payload.reviewingEmp = null;
  render();
}

async function handleSaveBonusEmp(empId) {
  if (!state.extraBonus) state.extraBonus = {};
  if (!state.extraBonus[empId]) state.extraBonus[empId] = { items: {}, itemDetails: {}, certDetails: {}, others: 0, othersNote: '' };
  const data = state.extraBonus[empId];
  if (!data.items) data.items = {};
  if (!data.itemDetails) data.itemDetails = {};
  if (!data.certDetails) data.certDetails = {};

  // 管理員後台可編輯 bandSinceYYYYMM
  const bandSinceEl = document.querySelector(`.admin-band-since[data-bonus-emp="${empId}"]`);
  if (bandSinceEl) {
    const ym = normalizeYearMonth(bandSinceEl.value);
    const emp = state.employees.find(e => e.id === empId);
    if (emp) emp.bandSinceYYYYMM = ym;
  }

  // single selects
  document.querySelectorAll(`.bonus-select[data-bonus-emp="${empId}"]`).forEach(sel => {
    const itemId = sel.dataset.item;
    const val = sel.value;
    if (val && val !== 'none') {
      data.items[itemId] = val;
    } else {
      delete data.items[itemId];
      delete data.itemDetails[itemId];  // 取消選擇時也清掉細項
    }
  });

  // 用「列」為單位配對 text + month,收集成物件陣列
  // 只挑屬於這個 empId 的 detail-multi 容器
  const cardScope = document.querySelector(`.bonus-emp-card [data-bonus-emp-card="${empId}"]`) || document;
  // 再以 detail-multi 為邊界,透過第一個 text input 的 data-bonus-emp 判斷是否屬於這個 empId
  document.querySelectorAll('.detail-multi').forEach(container => {
    const firstTxt = container.querySelector('input.bonus-detail, input.bonus-cert-detail');
    if (!firstTxt) return;
    if (firstTxt.dataset.bonusEmp !== empId) return;
    const rows = [];
    container.querySelectorAll('.detail-multi-row').forEach(row => {
      const txt = row.querySelector('input.bonus-detail, input.bonus-cert-detail');
      if (!txt) return;
      const ym = row.querySelector('input[type="month"]');
      const wsel = row.querySelector('input.bonus-detail-weight, input.bonus-cert-detail-weight');
      const name = (txt.value || '').trim();
      if (!name) return;
      const obj = { name, occurredAt: ym ? normalizeYearMonth(ym.value) : '' };
      if (wsel && wsel.value) { const w = peopleNToWeight(wsel.value); if (w) obj.weight = w; }
      rows.push(obj);
    });
    if (firstTxt.classList.contains('bonus-detail')) {
      const itemId = firstTxt.dataset.detailItem;
      if (rows.length > 0 && data.items[itemId]) {
        data.itemDetails[itemId] = rows;
      } else {
        delete data.itemDetails[itemId];
      }
    } else {
      const optId = firstTxt.dataset.certOpt;
      const cb = document.querySelector(`.bonus-multi[data-bonus-emp="${empId}"][value="${optId}"]`);
      if (rows.length > 0 && cb && cb.checked) {
        data.certDetails[optId] = rows;
      } else {
        delete data.certDetails[optId];
      }
    }
  });

  // multi checkboxes (group by item id)
  const multiByItem = {};
  document.querySelectorAll(`.bonus-multi[data-bonus-emp="${empId}"]`).forEach(cb => {
    const itemId = cb.dataset.item;
    if (!multiByItem[itemId]) multiByItem[itemId] = [];
    if (cb.checked) multiByItem[itemId].push(cb.value);
  });
  Object.keys(multiByItem).forEach(itemId => {
    if (multiByItem[itemId].length > 0) {
      data.items[itemId] = multiByItem[itemId];
    } else {
      delete data.items[itemId];
    }
  });

  // 一些未勾選但舊資料還存在的 cert opt 要清掉
  const allCertOpts = new Set();
  document.querySelectorAll(`.bonus-multi[data-bonus-emp="${empId}"]`).forEach(cb => allCertOpts.add(cb.value));
  allCertOpts.forEach(optId => {
    const cb = document.querySelector(`.bonus-multi[data-bonus-emp="${empId}"][value="${optId}"]`);
    if (!cb || !cb.checked) delete data.certDetails[optId];
  });

  // others
  const othersScore = document.querySelector(`[data-bonus-emp="${empId}"][data-others="score"]`);
  const othersNote = document.querySelector(`[data-bonus-emp="${empId}"][data-others="note"]`);
  if (othersScore) {
    const v = parseFloat(othersScore.value);
    data.others = isNaN(v) ? 0 : Math.round(v * 10) / 10;
  }
  if (othersNote) data.othersNote = othersNote.value.trim();

  await saveState(state);
  toast('加分已儲存');
  render();
}

function handleExportCsv() {
  const trimMode = !!view.payload?.trimMode;
  const bonusMode = !!view.payload?.bonusMode;
  const techSplit = !!view.payload?.techSplit;
  const rows = [['目前職等', '目標職等', '技術組', '組內名次', 'Employee ID', '員工', '英文名', '技術', 'Email', '單位', '性別', '原始平均總分', '原始平均單項', '調整後平均總分', '調整後平均單項', 'Extra 加分', '加分後總分', '加分備註', 'IPP 總筆數', 'IPP 期間內', 'IPP 期間外', 'Travel 段數', 'Travel 計入天數', '是否觸發排除', '評分人數', '應評人數', '升遷資格']];

  // 同時計算兩種平均
  const bandGroups = {};
  state.employees.forEach(e => {
    const b = e.currentBand ?? '未設定';
    if (!bandGroups[b]) bandGroups[b] = [];
    const raw = computeEmployeeAverage(e.id);
    const trimmed = computeEmployeeAverageTrimmed(e.id);
    const bonus = getEmployeeBonus(e.id);
    bandGroups[b].push({
      emp: e,
      rawAvg: raw.avg,
      trimmedAvg: trimmed.avg,
      bonus: bonus.score || 0,
      bonusNote: bonus.note || '',
      withBonus: trimmed.avg !== null ? trimmed.avg * 0.9 + (bonus.score || 0) * 0.1 : null,
      trimmedAny: trimmed.trimmedAny,
      count: raw.count,
      eligibleMgrCount: eligibleManagers(e).length
    });
  });
  const sortedBands = Object.keys(bandGroups).sort((a, b) => {
    if (a === '未設定') return 1;
    if (b === '未設定') return -1;
    return Number(b) - Number(a);
  });

  const sortFn = (a, b) => {
    const av = computeScoreByMode(a, trimMode, bonusMode);
    const bv = computeScoreByMode(b, trimMode, bonusMode);
    if (av === null && bv === null) return 0;
    if (av === null) return 1;
    if (bv === null) return -1;
    return bv - av;
  };

  sortedBands.forEach(band => {
    const targetBand = band !== '未設定' ? Number(band) + 1 : '—';
    const dimCount = state.dimensions.length;
    // techSplit 下每個 band 拆兩/三組,各自排名;否則整個 band 一個組
    let sections;
    if (techSplit) {
      const buckets = { bios_ec: [], driver: [], other: [] };
      bandGroups[band].forEach(r => { buckets[getEmployeeTechGroup(r.emp)].push(r); });
      sections = ['bios_ec', 'driver', 'other']
        .filter(k => buckets[k].length > 0)
        .map(k => ({ label: TECH_GROUP_LABELS[k], rows: buckets[k].sort(sortFn) }));
    } else {
      sections = [{ label: '全部', rows: bandGroups[band].sort(sortFn) }];
    }
    sections.forEach(sec => {
      sec.rows.forEach((r, i) => {
        const judgeBase = computeJudgeBase(r, trimMode);
        const dimAvgForJudge = judgeBase !== null && dimCount > 0 ? judgeBase / dimCount : null;
        const eligible = dimAvgForJudge === null ? '—' : (dimAvgForJudge < 4 ? '不符資格' : '符合');
        // IPP 統計
        const ippSub = getEmployeeSubmission(r.emp.id);
        const ippDetails = normalizeDetail(ippSub.data?.itemDetails?.ipp);
        const ippSum = ippDetails.length > 0 ? summarizeIpp(ippDetails, r.emp.bandSinceYYYYMM, { onlyAccepted: true }) : null;
        // Travel 統計
        const travelDetails = normalizeTravelDetail(ippSub.data?.itemDetails?.travel);
        const travelSum = travelDetails.length > 0 ? summarizeTravel(travelDetails, r.emp.bandSinceYYYYMM, state.covidPeriod || {}) : null;
        rows.push([
          'Band ' + band,
          'Band ' + targetBand,
          sec.label,
          i + 1,
          r.emp.id,
          r.emp.name,
          r.emp.enName || '',
          getEmployeeTech(r.emp),
          r.emp.email || '',
          r.emp.dept,
          r.emp.gender || '',
          r.rawAvg !== null ? r.rawAvg.toFixed(2) : '',
          r.rawAvg !== null && dimCount > 0 ? (r.rawAvg/dimCount).toFixed(2) : '',
          r.trimmedAvg !== null ? r.trimmedAvg.toFixed(2) : '',
          r.trimmedAvg !== null && dimCount > 0 ? (r.trimmedAvg/dimCount).toFixed(2) : '',
          r.bonus > 0 ? r.bonus.toFixed(1) : '',
          r.withBonus !== null ? r.withBonus.toFixed(2) : '',
          r.bonusNote || '',
          ippSum ? ippSum.totalCount : 0,
          ippSum ? ippSum.inCount : 0,
          ippSum ? ippSum.outCount : 0,
          travelSum ? travelSum.totalCount : 0,
          travelSum ? travelSum.eligibleDays : 0,
          r.trimmedAny ? '是' : '否',
          r.count,
          r.eligibleMgrCount,
          eligible
        ]);
      });
    });
  });
  downloadCsv(rows, '升遷評分總表.csv');
}
