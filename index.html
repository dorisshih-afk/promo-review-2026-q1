                                )}
                              </div>
                            </div>
                          `;
                        } else {
                          // multi
                          const arr = Array.isArray(sel) ? sel : [];
                          return `
                            <div class="bonus-item-row">
                              <div class="bonus-item-name">
                                ${escapeHtml(item.name)}
                                ${item.note ? `<div style="font-size:11px;color:var(--ink-muted);font-weight:400;margin-top:2px;">${escapeHtml(item.note)}</div>` : ''}
                              </div>
                              <div class="bonus-item-control">
                                <div class="bonus-multi-list">
                                  ${item.options.map(o => {
                                    const checked = arr.includes(o.id);
                                    const certDetailArr = normalizeDetail(data.certDetails?.[o.id]);
                                    return `
                                      <div class="bonus-multi-row">
                                        <label class="bonus-check">
                                          <input type="checkbox" class="bonus-multi" data-bonus-emp="${e.id}" data-item="${item.id}" value="${o.id}" ${checked ? 'checked' : ''}>
                                          <span>${escapeHtml(o.label)} <span style="color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:11px;">+${o.score}</span></span>
                                        </label>
                                        ${renderDetailMultiInputs(
                                          'bonus-cert-detail',
                                          `data-bonus-emp="${e.id}" data-cert-opt="${o.id}"`,
                                          certDetailArr,
                                          certHints[o.id] || '證照詳細資料',
                                          !checked,
                                          item.id,
                                          bandSince
                                        )}
                                      </div>
                                    `;
                                  }).join('')}
                                </div>
                              </div>
                            </div>
                          `;
                        }
                      }).join('')}
                      <div class="bonus-item-row" style="background:rgba(176,141,58,0.04);">
                        <div class="bonus-item-name">
                          Others
                          <div style="font-size:11px;color:var(--ink-muted);font-weight:400;margin-top:2px;">由 Promotion Committee 討論後填入</div>
                        </div>
                        <div class="bonus-item-control">
                          <div style="display:flex;gap:10px;align-items:center;">
                            <input type="number" step="0.1" min="0" max="20" value="${data.others || 0}" data-bonus-emp="${e.id}" data-others="score" class="bonus-input" style="width:80px;text-align:center;">
                            <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-muted);">分</span>
                            <input type="text" value="${escapeHtml(data.othersNote || '')}" placeholder="說明(例: 特殊專案貢獻)" data-bonus-emp="${e.id}" data-others="note" class="bonus-input" style="flex:1;font-size:13px;">
                          </div>
                        </div>
                      </div>

                      ${bonus.breakdown.length > 0 ? `
                        <div class="bonus-summary">
                          <div style="font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--ink-muted);margin-bottom:8px;">加分明細</div>
                          ${bonus.breakdown.map(b => `
                            <div style="padding:6px 0;font-size:13px;border-bottom:1px dashed var(--line-soft);">
                              <div style="display:flex;justify-content:space-between;">
                                <span><b>${escapeHtml(b.itemName)}</b>: ${escapeHtml(b.label)}</span>
                                <span style="font-family:'JetBrains Mono',monospace;color:var(--gold);font-weight:600;">+${b.score}</span>
                              </div>
                              ${b.detail ? `<div style="font-size:12px;color:var(--ink-soft);margin-top:2px;padding-left:12px;border-left:2px solid var(--gold);">${escapeHtml(b.detail)}</div>` : ''}
                            </div>
                          `).join('')}
                          <div style="display:flex;justify-content:space-between;padding-top:10px;margin-top:8px;border-top:1px solid var(--line-soft);font-family:'Fraunces',serif;font-size:18px;">
                            <span>合計</span>
                            <span style="color:var(--gold);font-weight:600;">+${bonus.score}</span>
                          </div>
                        </div>
                      ` : ''}

                      <div style="margin-top:16px;display:flex;justify-content:flex-end;gap:10px;">
                        <button class="btn secondary small" data-action="reset-bonus-emp" data-id="${e.id}">清除此員工加分</button>
                        <button class="btn small" data-action="save-bonus-emp" data-id="${e.id}">儲存</button>
                      </div>
                    </div>
                  ` : ''}
                </div>
              `;
            }).join('')}
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function renderReviewTab() {
  // 找出有提交資料的員工
  const submissions = state.empSubmissions || {};
  const reviewingEmpId = view.payload?.reviewingEmp || null;

  // 列出所有員工依狀態分類
  const submitted = [];
  const reviewed = [];
  const draft = [];
  const noSubmission = [];
  state.employees.forEach(e => {
    const sub = submissions[e.id];
    if (!sub || sub.status === 'draft') {
      if (sub && sub.data && Object.keys(sub.data.items || {}).length > 0) {
        draft.push(e);
      } else {
        noSubmission.push(e);
      }
    } else if (sub.status === 'submitted') {
      submitted.push(e);
    } else if (sub.status === 'reviewed') {
      reviewed.push(e);
    }
  });

  // 如果在審核某個員工,顯示審核介面
  if (reviewingEmpId) {
    return renderReviewDetail(reviewingEmpId);
  }

  return `
    <div class="admin-section">
      <h3>員工自填審核</h3>
      <div style="font-size:13px;color:var(--ink-soft);line-height:1.7;margin-bottom:18px;">
        員工從專屬連結提交的 Extra Contribution 申請,在此審核每一項。<br>
        <span style="color:var(--ink-muted);font-size:12px;">審核完成後,系統會自動把通過的項目套用到「評分統計 → 加分後」模式中。</span>
      </div>

      <div class="stats-grid" style="grid-template-columns:repeat(4, 1fr);">
        <div class="stat-card">
          <div class="label">待審核</div>
          <div class="value" style="color:var(--gold);">${submitted.length}</div>
        </div>
        <div class="stat-card">
          <div class="label">已審核</div>
          <div class="value" style="color:var(--green);">${reviewed.length}</div>
        </div>
        <div class="stat-card">
          <div class="label">草稿中</div>
          <div class="value" style="color:var(--ink-muted);">${draft.length}</div>
        </div>
        <div class="stat-card">
          <div class="label">尚未填寫</div>
          <div class="value" style="color:var(--ink-muted);">${noSubmission.length}</div>
        </div>
      </div>

      ${submitted.length > 0 ? `
        <div style="margin-top:24px;">
          <h4 style="font-family:'Fraunces',serif;font-size:18px;margin-bottom:10px;color:var(--gold);">⏳ 待審核(${submitted.length})</h4>
          ${submitted.map(e => renderEmpSubmissionRow(e, 'submitted')).join('')}
        </div>
      ` : ''}

      ${reviewed.length > 0 ? `
        <div style="margin-top:24px;">
          <h4 style="font-family:'Fraunces',serif;font-size:18px;margin-bottom:10px;color:var(--green);">✓ 已審核(${reviewed.length})</h4>
          ${reviewed.map(e => renderEmpSubmissionRow(e, 'reviewed')).join('')}
        </div>
      ` : ''}

      ${draft.length > 0 ? `
        <div style="margin-top:24px;">
          <h4 style="font-family:'Fraunces',serif;font-size:18px;margin-bottom:10px;color:var(--ink-muted);">📝 員工編輯中(${draft.length})</h4>
          ${draft.map(e => renderEmpSubmissionRow(e, 'draft')).join('')}
        </div>
      ` : ''}

      ${noSubmission.length > 0 ? `
        <div style="margin-top:24px;">
          <h4 style="font-family:'Fraunces',serif;font-size:18px;margin-bottom:10px;color:var(--ink-muted);">— 尚未填寫(${noSubmission.length})</h4>
          <div style="font-size:12px;color:var(--ink-muted);margin-bottom:10px;">提醒這些員工填寫,或可在 Extra Contribution 頁直接代填</div>
          ${noSubmission.map(e => `
            <div class="link-row" style="opacity:0.6;">
              <div class="link-info">
                <div style="font-family:'Fraunces',serif;font-size:14px;">${escapeHtml(e.name)} <span style="color:var(--ink-muted);font-size:12px;font-family:'JetBrains Mono',monospace;">${escapeHtml(e.enName || '')}</span></div>
              </div>
            </div>
          `).join('')}
        </div>
      ` : ''}
    </div>
  `;
}

function renderEmpSubmissionRow(emp, status) {
  const sub = getEmployeeSubmission(emp.id);
  // 計算員工提交的總分
  let appliedTotal = 0;
  let itemCount = 0;
  EXTRA_CONTRIBUTION_ITEMS.forEach(item => {
    const sel = sub.data?.items?.[item.id];
    if (item.type === 'single') {
      if (!sel || sel === 'none') return;
      const opt = item.options.find(o => o.id === sel);
      if (opt) { appliedTotal += opt.score; itemCount++; }
    } else {
      const arr = Array.isArray(sel) ? sel : [];
      arr.forEach(optId => {
        const opt = item.options.find(o => o.id === optId);
        if (opt) { appliedTotal += opt.score; itemCount++; }
      });
    }
  });
  if (sub.data?.others > 0) { appliedTotal += sub.data.others; itemCount++; }

  // reviewed 模式:顯示實際加分
  let actualBonus = null;
  if (status === 'reviewed') {
    actualBonus = getEmployeeBonus(emp.id).score;
  }

  return `
    <div class="link-row" style="background:var(--bg);">
      <div class="link-info">
        <div style="font-family:'Fraunces',serif;font-size:15px;font-weight:500;">
          ${escapeHtml(emp.name)}
          <span style="color:var(--ink-muted);font-size:12px;font-family:'JetBrains Mono',monospace;margin-left:6px;">${escapeHtml(emp.enName || '')}</span>
          <span class="tech-tag" style="margin-left:6px;">${escapeHtml(getEmployeeTech(emp))}</span>
          <span style="color:var(--ink-muted);font-size:12px;margin-left:6px;">Band ${emp.currentBand} → ${emp.currentBand + 1}</span>
        </div>
        <div style="font-size:12px;color:var(--ink-muted);margin-top:4px;font-family:'JetBrains Mono',monospace;">
          申請 ${itemCount} 項 · 申請總分 ${appliedTotal.toFixed(1)}
          ${actualBonus !== null ? ` · <span style="color:var(--green);font-weight:600;">實際加分 +${actualBonus}</span>` : ''}
          ${sub.submittedAt ? ` · 提交於 ${new Date(sub.submittedAt).toLocaleString('zh-TW')}` : ''}
        </div>
      </div>
      <div style="display:flex;gap:8px;">
        ${status === 'submitted' ? `<button class="btn small" data-action="open-review" data-id="${emp.id}">開始審核</button>` : ''}
        ${status === 'reviewed' ? `<button class="btn secondary small" data-action="open-review" data-id="${emp.id}">查看 / 重新審核</button>` : ''}
        ${status === 'draft' ? `<button class="btn secondary small" data-action="open-review" data-id="${emp.id}">查看草稿</button>` : ''}
        ${status === 'draft' ? `<button class="btn danger small" data-action="delete-submission" data-id="${emp.id}">刪除草稿</button>` : ''}
        ${status !== 'draft' ? `<button class="btn danger small" data-action="reopen-submission" data-id="${emp.id}">退回給員工</button>` : ''}
      </div>
    </div>
  `;
}

function renderReviewDetail(empId) {
  const emp = state.employees.find(e => e.id === empId);
  if (!emp) return '<div class="empty">找不到員工</div>';
  const sub = getEmployeeSubmission(empId);
  const data = sub.data || {};
  const isDraft = sub.status === 'draft';
  const isReviewed = sub.status === 'reviewed';

  // 計算當下審核狀態下的加分(尚未存入 extraBonus 之前的預覽)
  let previewBonus = 0;
  EXTRA_CONTRIBUTION_ITEMS.forEach(item => {
    const sel = data.items?.[item.id];
    if (item.type === 'single') {
      if (!sel || sel === 'none') return;
      const review = sub.reviewedItems?.[item.id];
      if (review === 'accepted') {
        const opt = item.options.find(o => o.id === sel);
        if (opt) previewBonus += opt.score;
      } else if (review && typeof review === 'object' && review.adjustedTo) {
        const opt = item.options.find(o => o.id === review.adjustedTo);
        if (opt) previewBonus += opt.score;
      }
    } else {
      const arr = Array.isArray(sel) ? sel : [];
      arr.forEach(optId => {
        const review = sub.reviewedCertItems?.[optId];
        if (review === 'accepted') {
          const opt = item.options.find(o => o.id === optId);
          if (opt) previewBonus += opt.score;
        }
      });
    }
  });
  if (sub.reviewedItems?.others === 'accepted') previewBonus += Number(data.others) || 0;

  // 統計待審項目
  let pendingCount = 0;
  Object.values(sub.reviewedItems || {}).forEach(v => { if (v === 'pending') pendingCount++; });
  Object.values(sub.reviewedCertItems || {}).forEach(v => { if (v === 'pending') pendingCount++; });

  return `
    <div style="margin-bottom:18px;">
      <button class="btn secondary small" data-action="close-review">← 回到審核列表</button>
    </div>

    <div class="admin-section">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid var(--line);padding-bottom:14px;margin-bottom:18px;">
        <div>
          <h3 style="margin-bottom:4px;">${escapeHtml(emp.name)} · Extra Contribution 審核</h3>
          <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-muted);letter-spacing:0.06em;">
            ${escapeHtml(emp.enName || '')} · Band ${emp.currentBand} → ${emp.currentBand + 1} · ${escapeHtml(getEmployeeTech(emp))}
          </div>
        </div>
        <div style="text-align:right;">
          <div style="font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--ink-muted);">${isDraft ? '員工申請中(尚未提交)' : '目前累計加分'}</div>
          <div style="font-family:'Fraunces',serif;font-size:28px;font-weight:600;color:${isDraft ? 'var(--ink-muted)' : 'var(--gold)'};">${isDraft ? '—' : '+' + previewBonus.toFixed(1)}</div>
          ${!isDraft && pendingCount > 0 ? `<div style="font-size:11px;color:var(--accent);margin-top:4px;">尚有 ${pendingCount} 項待審</div>` : ''}
        </div>
      </div>

      ${isDraft ? `
        <div style="background:rgba(176,141,58,0.08);border-left:3px solid var(--gold);padding:12px 16px;margin-bottom:18px;font-size:13px;color:var(--ink-soft);line-height:1.6;">
          <b>⚠ 員工尚未提交</b> — 此頁面顯示員工目前的草稿內容(可能還會修改)。<br>
          <span style="color:var(--ink-muted);font-size:12px;">員工提交後狀態會變為「待審核」,屆時才能進行審核操作。</span>
        </div>
      ` : `
        <div style="display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;">
          <button class="btn secondary small" data-action="bulk-review" data-empid="${empId}" data-action-type="accept-all">全部接受</button>
          <button class="btn secondary small" data-action="bulk-review" data-empid="${empId}" data-action-type="reject-all">全部拒絕</button>
          <div style="flex:1;"></div>
          ${isReviewed ? `<span style="font-size:12px;color:var(--green);font-family:'JetBrains Mono',monospace;align-self:center;">✓ 已完成審核</span>` : ''}
          <button class="btn" data-action="finalize-review" data-id="${empId}">完成審核(套用加分)</button>
        </div>
      `}

      <div class="form-items">
        ${EXTRA_CONTRIBUTION_ITEMS.map(item => renderReviewItemRow(emp, item, sub, isDraft)).join('')}

        ${(Number(data.others) || 0) > 0 ? renderReviewOthersRow(emp, sub, isDraft) : ''}
      </div>
    </div>
  `;
}

function renderReviewItemRow(emp, item, sub, isDraft = false) {
  const data = sub.data || {};
  const sel = data.items?.[item.id];

  if (item.type === 'single') {
    if (!sel || sel === 'none') return '';  // 員工沒選
    const opt = item.options.find(o => o.id === sel);
    if (!opt) return '';
    const review = sub.reviewedItems?.[item.id] || 'pending';
    const detailArr = normalizeDetail(data.itemDetails?.[item.id]);
    const isAdjusted = typeof review === 'object' && review.adjustedTo;
    const adjustedToId = isAdjusted ? review.adjustedTo : null;

    return `
      <div class="form-item-row ${!isDraft ? renderItemReviewClass(review) : ''}">
        <div class="form-item-name">
          ${escapeHtml(item.name)}
          <div style="font-size:12px;color:var(--ink-soft);font-weight:400;margin-top:6px;">
            員工申請: <b>${escapeHtml(opt.label)}</b> <span style="color:var(--gold);">(+${opt.score})</span>
          </div>
          ${detailArr.length > 0
            ? `<div style="font-size:11px;color:var(--ink-muted);margin-top:4px;padding-left:10px;border-left:2px solid var(--gold);">${detailArr.map(d => escapeHtml(d.name) + (d.occurredAt ? ` <span style="color:var(--ink-muted);font-family:'JetBrains Mono',monospace;">(${escapeHtml(d.occurredAt)})</span>` : ' <span style="color:var(--accent);">⚠ 未填月份</span>')).join('<br>')}</div>`
            : '<div style="font-size:11px;color:var(--accent);margin-top:4px;">⚠ 員工未填具體說明</div>'}
        </div>
        <div class="form-item-control">
          ${isDraft ? '<div style="font-size:11px;color:var(--ink-muted);font-style:italic;">員工尚未提交,無法審核</div>' : `
            <div style="display:flex;gap:6px;flex-wrap:wrap;">
              <button class="review-btn ${review === 'accepted' ? 'active accept' : ''}" data-action="set-review" data-empid="${emp.id}" data-itemid="${item.id}" data-decision="accepted">✓ 接受</button>
              <button class="review-btn ${review === 'rejected' ? 'active reject' : ''}" data-action="set-review" data-empid="${emp.id}" data-itemid="${item.id}" data-decision="rejected">✗ 拒絕</button>
              <select class="review-adjust ${isAdjusted ? 'active adjusted' : ''}" data-empid="${emp.id}" data-itemid="${item.id}">
                <option value="">↔ 調整為...</option>
                ${item.options.filter(o => o.id !== 'none' && o.id !== sel).map(o => `
                  <option value="${o.id}" ${adjustedToId === o.id ? 'selected' : ''}>${escapeHtml(o.label)} (+${o.score})</option>
                `).join('')}
              </select>
            </div>
            ${review === 'pending' ? '<div style="font-size:11px;color:var(--ink-muted);margin-top:6px;">⋯ 待您決定</div>' : ''}
          `}
        </div>
      </div>
    `;
  } else {
    // multi (Certification)
    const arr = Array.isArray(sel) ? sel : [];
    if (arr.length === 0) return '';
    return `
      <div class="form-item-row">
        <div class="form-item-name">
          ${escapeHtml(item.name)}
          <div style="font-size:11px;color:var(--ink-muted);font-weight:400;margin-top:2px;">員工申請 ${arr.length} 張證照</div>
        </div>
        <div class="form-item-control">
          <div class="bonus-multi-list">
            ${arr.map(optId => {
              const opt = item.options.find(o => o.id === optId);
              if (!opt) return '';
              const review = sub.reviewedCertItems?.[optId] || 'pending';
              const certDetailArr = normalizeDetail(data.certDetails?.[optId]);
              return `
                <div class="bonus-multi-row ${!isDraft ? renderItemReviewClass(review) : ''}" style="grid-template-columns:1fr;gap:6px;padding:8px;border:1px solid var(--line-soft);">
                  <div>
                    <b>${escapeHtml(opt.label)}</b> <span style="color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:11px;">+${opt.score}</span>
                    ${certDetailArr.length > 0
                      ? `<span style="color:var(--ink-soft);margin-left:8px;font-size:12px;">— ${certDetailArr.map(d => escapeHtml(d.name) + (d.occurredAt ? ` (${escapeHtml(d.occurredAt)})` : '')).join(' / ')}</span>`
                      : '<span style="color:var(--accent);margin-left:8px;font-size:11px;">⚠ 無具體說明</span>'}
                  </div>
                  ${isDraft ? '' : `
                    <div style="display:flex;gap:6px;">
                      <button class="review-btn small ${review === 'accepted' ? 'active accept' : ''}" data-action="set-cert-review" data-empid="${emp.id}" data-optid="${optId}" data-decision="accepted">✓ 接受</button>
                      <button class="review-btn small ${review === 'rejected' ? 'active reject' : ''}" data-action="set-cert-review" data-empid="${emp.id}" data-optid="${optId}" data-decision="rejected">✗ 拒絕</button>
                    </div>
                  `}
                </div>
              `;
            }).join('')}
          </div>
        </div>
      </div>
    `;
  }
}

function renderReviewOthersRow(emp, sub, isDraft = false) {
  const data = sub.data || {};
  const review = sub.reviewedItems?.others || 'pending';
  return `
    <div class="form-item-row ${!isDraft ? renderItemReviewClass(review) : ''}" style="background:rgba(176,141,58,0.04);">
      <div class="form-item-name">
        Others
        <div style="font-size:12px;color:var(--ink-soft);font-weight:400;margin-top:6px;">
          員工申請: <b>+${data.others}</b>
        </div>
        ${data.othersNote ? `<div style="font-size:11px;color:var(--ink-muted);margin-top:4px;padding-left:10px;border-left:2px solid var(--gold);">${escapeHtml(data.othersNote)}</div>` : '<div style="font-size:11px;color:var(--accent);margin-top:4px;">⚠ 員工未填具體說明</div>'}
        <div style="font-size:11px;color:var(--ink-muted);margin-top:4px;font-style:italic;">由 Promotion Committee Review 後決定</div>
      </div>
      <div class="form-item-control">
        ${isDraft ? '<div style="font-size:11px;color:var(--ink-muted);font-style:italic;">員工尚未提交,無法審核</div>' : `
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            <button class="review-btn ${review === 'accepted' ? 'active accept' : ''}" data-action="set-review" data-empid="${emp.id}" data-itemid="others" data-decision="accepted">✓ 接受</button>
            <button class="review-btn ${review === 'rejected' ? 'active reject' : ''}" data-action="set-review" data-empid="${emp.id}" data-itemid="others" data-decision="rejected">✗ 拒絕</button>
          </div>
        `}
      </div>
    </div>

// =========================================================================
// EVENT HANDLERS
// =========================================================================
function attachHandlers() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', handleAction);
  });

  // scoring sliders sync
  document.querySelectorAll('.score-slider').forEach(slider => {
    slider.addEventListener('input', e => {
      const dim = e.target.dataset.dim;
      const val = parseFloat(e.target.value);
      const numInput = document.querySelector(`.score-number[data-dim="${dim}"]`);
      if (numInput) numInput.value = val.toFixed(1);
      updateLiveTotal();
    });
  });
  document.querySelectorAll('.score-number').forEach(input => {
    input.addEventListener('input', e => {
      let val = parseFloat(e.target.value);
      if (isNaN(val)) return;
      if (val < 0.1) val = 0.1;
      if (val > 5.0) val = 5.0;
      const dim = e.target.dataset.dim;
      const slider = document.querySelector(`.score-slider[data-dim="${dim}"]`);
      if (slider) slider.value = val;
      updateLiveTotal();
    });
    input.addEventListener('blur', e => {
      let val = parseFloat(e.target.value);
      if (isNaN(val) || val < 0.1) val = 0.1;
      if (val > 5.0) val = 5.0;
      e.target.value = val.toFixed(1);
      updateLiveTotal();
    });
  });

  updateLiveTotal();

  // 工具函式:針對某個 .detail-multi 容器,整組啟用/停用
  // disable=true 時也順便清空所有 input 的值(保留一列空白,貼合舊行為)
  function toggleDetailGroup(container, disable) {
    if (!container) return;
    container.querySelectorAll('input[type="text"]').forEach(inp => {
      inp.disabled = disable;
      if (disable) inp.value = '';
    });
    container.querySelectorAll('.detail-row-remove, .detail-row-add').forEach(btn => {
      btn.disabled = disable;
    });
    if (disable) {
      // 只留一列,避免重新啟用時殘留多列空白
      const rows = container.querySelectorAll('.detail-multi-row');
      for (let i = 1; i < rows.length; i++) rows[i].remove();
    }
  }

  // bonus single select 變動時 enable/disable 對應細項群組
  document.querySelectorAll('.bonus-select').forEach(sel => {
    sel.addEventListener('change', e => {
      const empId = e.target.dataset.bonusEmp;
      const itemId = e.target.dataset.item;
      const firstInput = document.querySelector(`.bonus-detail[data-bonus-emp="${empId}"][data-detail-item="${itemId}"]`);
      const container = firstInput ? firstInput.closest('.detail-multi') : null;
      // Bug 1 新語意:只有明確選 'none' 才停用;未選 '' 時保持可編輯
      const disable = e.target.value === 'none';
      toggleDetailGroup(container, disable);
    });
  });

  // bonus multi (cert) checkbox 變動時 enable/disable 對應細項群組
  document.querySelectorAll('.bonus-multi').forEach(cb => {
    cb.addEventListener('change', e => {
      const empId = e.target.dataset.bonusEmp;
      const optId = e.target.value;
      const firstInput = document.querySelector(`.bonus-cert-detail[data-bonus-emp="${empId}"][data-cert-opt="${optId}"]`);
      const container = firstInput ? firstInput.closest('.detail-multi') : null;
      toggleDetailGroup(container, !e.target.checked);
    });
  });

  // 員工端 emp-select 變動 → enable/disable 對應細項群組
  document.querySelectorAll('.emp-select').forEach(sel => {
    sel.addEventListener('change', e => {
      const itemId = e.target.dataset.item;
      const firstInput = document.querySelector(`.emp-detail[data-detail-item="${itemId}"]`);
      const container = firstInput ? firstInput.closest('.detail-multi') : null;
      const disable = e.target.value === 'none';
      toggleDetailGroup(container, disable);
    });
  });

  // 員工端 emp-multi (Certification) 勾選 → enable/disable 對應細項群組
  document.querySelectorAll('.emp-multi').forEach(cb => {
    cb.addEventListener('change', e => {
      const optId = e.target.value;
      const firstInput = document.querySelector(`.emp-cert-detail[data-cert-opt="${optId}"]`);
      const container = firstInput ? firstInput.closest('.detail-multi') : null;
      toggleDetailGroup(container, !e.target.checked);
    });
  });

  // review 調整下拉(select 變動)
  document.querySelectorAll('.review-adjust').forEach(sel => {
    sel.addEventListener('change', async e => {
      const empId = e.target.dataset.empid;
      const itemId = e.target.dataset.itemid;
      const val = e.target.value;
      if (!val) {
        // 切回 pending
        await handleSetReview(empId, itemId, 'pending');
      } else {
        await handleSetReview(empId, itemId, 'adjust:' + val);
      }
    });
  });

  // admin login enter key
  const passInput = document.getElementById('adminPass');
  if (passInput) {
    passInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleAdminSubmit();
    });
  }
  // 主管登入密碼 Enter
  const mgrLoginPass = document.getElementById('mgrLoginPass');
  if (mgrLoginPass) {
    mgrLoginPass.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleManagerLoginSubmit();
    });
  }
  // 主管設定密碼 Enter (在第二格 confirm 框)
  const mgrNewPass2 = document.getElementById('mgrNewPass2');
  if (mgrNewPass2) {
    mgrNewPass2.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleManagerSetPassword();
    });
  }
}

function updateLiveTotal() {
  const live = document.getElementById('liveTotal');
  if (!live) return;
  let sum = 0, count = 0;
  document.querySelectorAll('.score-number').forEach(inp => {
    const v = parseFloat(inp.value);
    if (!isNaN(v)) { sum += v; count++; }
  });
  if (count === state.dimensions.length && count > 0) {
    live.innerHTML = sum.toFixed(2) + '<span class="max"> / ' + (state.dimensions.length * 5).toFixed(1) + '</span>';
  }
}

async function handleAction(e) {
  const action = e.currentTarget.dataset.action;
  const id = e.currentTarget.dataset.id;

  switch(action) {
    case 'goto-manager':
      view = { mode: 'manager_select', payload: null };
      render();
      break;
    case 'goto-admin':
      view = { mode: 'admin_login', payload: null };
      render();
      break;
    case 'back-to-picker':
      view = { mode: 'picker', payload: null };
      render();
      break;
    case 'logout':
      view = { mode: 'picker', payload: null };
      render();
      break;
    case 'select-manager': {
      const mgr = state.managers.find(m => m.id === id);
      if (!mgr) break;
      if (!mgr.password) {
        view = { mode: 'manager_set_password', payload: { managerId: id } };
      } else {
        view = { mode: 'manager_login_password', payload: { managerId: id } };
      }
      render();
      break;
    }
    case 'manager-set-password-submit':
      await handleManagerSetPassword();
      break;
    case 'manager-login-submit':
      handleManagerLoginSubmit();
      break;
    case 'manager-change-password':
      await handleManagerChangePassword();
      break;
    case 'reset-mgr-pass':
      await handleResetManagerPassword(id);
      break;
    case 'emp-save-draft':
      await handleEmpSaveDraft();
      break;
    case 'emp-submit':
      await handleEmpSubmit();
      break;
    case 'detail-row-add': {
      // 在此「+ 新增一列」按鈕之前插入一個空列
      const addBtn = e.currentTarget;
      const container = addBtn.parentElement;  // .detail-multi
      if (!container) break;
      const className = addBtn.dataset.class || '';
      const attrs = addBtn.dataset.attrs || '';
      const placeholder = addBtn.dataset.placeholder || '';
      const isIpp = addBtn.dataset.isIpp === '1';
      const weightField = isIpp ? `
        <select class="${className}-weight" ${attrs} title="本筆 IPP 權重">
          <option value="" selected>權重</option>
          <option value="0.1">0.1</option>
          <option value="0.5">0.5</option>
          <option value="1">1</option>
        </select>
      ` : '';
      const tmp = document.createElement('div');
      tmp.innerHTML = `
        <div class="detail-multi-row">
          <input type="text" class="${className}" ${attrs} value="" placeholder="${escapeHtml(placeholder)}">
          <input type="month" class="${className}-ym" ${attrs} value="" title="發生年月 (YYYY-MM)">
          ${weightField}
          <button type="button" class="detail-row-remove" data-action="detail-row-remove" title="刪除此列">✕</button>
        </div>
      `.trim();
      const newRow = tmp.firstElementChild;
      container.insertBefore(newRow, addBtn);
      // 把新 remove 按鈕掛上監聽器(attachHandlers 下次才會全量重掛,這裡只補新的)
      const rmBtn = newRow.querySelector('[data-action="detail-row-remove"]');
      if (rmBtn) rmBtn.addEventListener('click', handleAction);
      // focus 新輸入框方便立即打字
      const inp = newRow.querySelector('input[type="text"]');
      if (inp) inp.focus();
      break;
    }
    case 'detail-row-remove': {
      const rmBtn = e.currentTarget;
      const row = rmBtn.closest('.detail-multi-row');
      const container = row && row.parentElement;  // .detail-multi
      if (!row || !container) break;
      // 至少保留一列:如果這是最後一列就清空而不移除
      const rowsLeft = container.querySelectorAll('.detail-multi-row').length;
      if (rowsLeft <= 1) {
        const inp = row.querySelector('input[type="text"]');
        if (inp) inp.value = '';
      } else {
        row.remove();
      }
      break;
    }
    case 'copy-emp-link':
      await handleCopyEmpLink(id);
      break;
    case 'copy-band-links':
      await handleCopyBandLinks(e.currentTarget.dataset.band);
      break;
    case 'copy-all-links':
      await handleCopyAllLinks();
      break;
    case 'open-review':
      view.payload = { ...(view.payload || {}), reviewingEmp: id };
      render();
      break;
    case 'close-review':
      view.payload = { ...(view.payload || {}), reviewingEmp: null };
      render();
      break;
    case 'set-review':
      await handleSetReview(e.currentTarget.dataset.empid, e.currentTarget.dataset.itemid, e.currentTarget.dataset.decision);
      break;
    case 'set-cert-review':
      await handleSetCertReview(e.currentTarget.dataset.empid, e.currentTarget.dataset.optid, e.currentTarget.dataset.decision);
      break;
    case 'bulk-review':
      await handleBulkReview(e.currentTarget.dataset.empid, e.currentTarget.dataset.actionType);
      break;
    case 'finalize-review':
      await handleFinalizeReview(id);
      break;
    case 'reopen-submission':
      await handleReopenSubmission(id);
      break;
    case 'delete-submission':
      await handleDeleteSubmission(id);
      break;
    case 'select-employee':
      view.payload.employeeId = id;
      render();
      break;
    case 'back-to-emp-list':
      view.payload.employeeId = null;
      render();
      break;
    case 'save-scores':
      await handleSaveScores();
      break;
    case 'admin-submit':
      handleAdminSubmit();
      break;
    case 'admin-tab':
      view.payload = {
        tab: e.currentTarget.dataset.tab,
        trimMode: !!view.payload?.trimMode,
        bonusMode: !!view.payload?.bonusMode,
        techSplit: !!view.payload?.techSplit,
      };
      render();
      break;
    case 'toggle-trim-mode':
      view.payload = { ...(view.payload || {}), trimMode: !view.payload?.trimMode };
      render();
      break;
    case 'toggle-bonus-mode':
      view.payload = { ...(view.payload || {}), bonusMode: !view.payload?.bonusMode };
      render();
      break;
    case 'toggle-tech-split':
      view.payload = { ...(view.payload || {}), techSplit: !view.payload?.techSplit };
      render();
      break;
    case 'toggle-bonus-emp':
      view.payload = { ...(view.payload || {}), expandedBonus: view.payload?.expandedBonus === id ? null : id };
      render();
      break;
    case 'save-bonus-emp':
      await handleSaveBonusEmp(id);
      break;
    case 'reset-bonus-emp':
      await handleResetBonusEmp(id);
      break;
    case 'add-employee':
      await handleAddEmployee();
      break;
    case 'del-employee':
      await handleDeleteEmployee(id);
      break;
    case 'save-emp-band-since': {
      const inp = document.querySelector(`.emp-admin-band-since[data-emp-id="${id}"]`);
      if (!inp) break;
      const ym = normalizeYearMonth(inp.value);
      const emp = state.employees.find(x => x.id === id);
      if (!emp) break;
      emp.bandSinceYYYYMM = ym;
      await saveState(state);
      toast(ym ? `已設定 ${emp.name} 的 Band 起始:${ym}` : `已清空 ${emp.name} 的 Band 起始`);
      render();
      break;
    }
    case 'add-manager':
      await handleAddManager();
      break;
    case 'del-manager':
      await handleDeleteManager(id);
      break;
    case 'add-dimension':
      await handleAddDimension();
      break;
    case 'del-dimension':
      await handleDeleteDimension(id);
      break;
    case 'change-password':
      await handleChangePassword();
      break;
    case 'clear-scores':
      await handleClearScores();
      break;
    case 'reset-all':
      await handleResetAll();
      break;
    case 'toggle-detail':
      handleToggleDetail(e.currentTarget.dataset.target, e.currentTarget);
      break;
    case 'toggle-hide-unscored': {
      // Flip state and re-render every currently-open detail panel in place,
      // so展開狀態不被重置、使用者不失焦。
      view.payload = { ...(view.payload || {}), hideUnscored: !view.payload?.hideUnscored };
      document.querySelectorAll('tr.detail-row:not(.hidden) .detail-content').forEach(el => {
        // recover the emp id from the parent tr's id like "detail_T150120"
        const trId = el.closest('tr.detail-row')?.id || '';
        const empId = trId.replace(/^detail_/, '');
        const emp = state.employees.find(x => x.id === empId);
        if (emp) el.innerHTML = renderEmpDetail(emp);
      });
      // 新插入的 checkbox 需要重新綁 click handler
      attachHandlers();
      break;
    }
    case 'export-csv':
      handleExportCsv();
      break;
    case 'export-detail-csv':
      handleExportDetailCsv();
      break;
  }
}

// 只讀 DOM、回傳錯誤訊息陣列。不寫入 state。
function collectAndValidateEmpForm() {
  const empId = view.payload.empId;
  const emp = state.employees.find(e => e.id === empId);
  if (!emp) return ['找不到員工資料'];
  const problems = [];

  const bandSinceEl = document.querySelector('.emp-band-since');
  const bandSince = bandSinceEl ? normalizeYearMonth(bandSinceEl.value) : '';
  if (!bandSince) problems.push('請先填寫「當前 Band 起始年月」');

  // 檢查每列 single 細項
  document.querySelectorAll('.form-items .detail-multi').forEach(container => {
    const itemId = container.dataset.itemId || '';
    container.querySelectorAll('.detail-multi-row').forEach(row => {
      const txt = row.querySelector('input[type="text"]');
      const ym = row.querySelector('input[type="month"]');
      const name = txt ? (txt.value || '').trim() : '';
      const occurredAt = ym ? normalizeYearMonth(ym.value) : '';
      // 只驗證「使用者有實際填了名稱」的列,空白列忽略
      if (!name) return;
      const err = validateOccurredAt(itemId, occurredAt, bandSince);
      if (err) {
        const itemDef = EXTRA_CONTRIBUTION_ITEMS.find(i => i.id === itemId);
        const label = itemDef ? itemDef.name : itemId;
        problems.push(`${label}「${name}」: ${err}`);
      }
      // IPP 額外:weight 必填(0.1 / 0.5 / 1)
      if (itemId === 'ipp') {
        const wsel = row.querySelector('select.emp-detail-weight');
        if (!wsel || !wsel.value) {
          problems.push(`IPP「${name}」: 請選擇本筆權重(0.1 / 0.5 / 1)`);
        }
      }
    });
  });

  return problems;
}

async function collectAndSaveEmpForm(newStatus) {
  const empId = view.payload.empId;
  if (!state.empSubmissions) state.empSubmissions = {};
  if (!state.empSubmissions[empId]) {
    state.empSubmissions[empId] = { status: 'draft', data: { items: {}, itemDetails: {}, certDetails: {}, others: 0, othersNote: '' }, reviewedItems: {}, reviewedCertItems: {}, submittedAt: null };
  }
  const sub = state.empSubmissions[empId];
  if (!sub.data) sub.data = { items: {}, itemDetails: {}, certDetails: {}, others: 0, othersNote: '' };

  // 清空後重新收集
  sub.data.items = {};
  sub.data.itemDetails = {};
  sub.data.certDetails = {};

  // 員工自填的 bandSinceYYYYMM 寫回 employee 物件
  const bandSinceEl = document.querySelector('.emp-band-since');
  if (bandSinceEl) {
    const ym = normalizeYearMonth(bandSinceEl.value);
    const emp = state.employees.find(e => e.id === empId);
    if (emp) emp.bandSinceYYYYMM = ym;  // 空字串也寫回(允許清空)
  }

  // single select
  document.querySelectorAll('.emp-select').forEach(sel => {
    const itemId = sel.dataset.item;
    if (sel.value && sel.value !== 'none') sub.data.items[itemId] = sel.value;
  });

  // 用「列」為單位配對 text + month + (IPP only) weight 收集成物件陣列
  // 每列只屬於一個 itemId 或 optId(視 detail-multi 容器而定)
  document.querySelectorAll('.form-items .detail-multi').forEach(container => {
    const rows = [];
    container.querySelectorAll('.detail-multi-row').forEach(row => {
      const txt = row.querySelector('input.emp-detail, input.emp-cert-detail');
      if (!txt) return;
      const ym = row.querySelector('input[type="month"]');
      const wsel = row.querySelector('select.emp-detail-weight, select.emp-cert-detail-weight');
      const name = (txt.value || '').trim();
      if (!name) return;
      const obj = { name, occurredAt: ym ? normalizeYearMonth(ym.value) : '' };
      if (wsel && wsel.value) obj.weight = wsel.value;
      rows.push(obj);
    });
    if (rows.length === 0) return;
    // 依 text input 的 dataset 判斷屬於 single-item 還是 cert-opt
    const firstTxt = container.querySelector('input.emp-detail, input.emp-cert-detail');
    if (!firstTxt) return;
    if (firstTxt.classList.contains('emp-detail')) {
      const itemId = firstTxt.dataset.detailItem;
      // IPP 例外:即使 sub.data.items.ipp 還沒被設定(沒下拉了),也要存細項
      // 自動算等級會在下面緊接做
      if (itemId === 'ipp' || sub.data.items[itemId]) {
        sub.data.itemDetails[itemId] = rows;
      }
    } else {
      const optId = firstTxt.dataset.certOpt;
      const cb = document.querySelector(`.emp-multi[value="${optId}"]`);
      if (cb && cb.checked) sub.data.certDetails[optId] = rows;
    }
  });

  // IPP 自動算等級:從 itemDetails.ipp + bandSinceYYYYMM 推 → 寫入 items.ipp
  // 沒有任何 IPP 細項或加總 < 0.1 → 不設定 items.ipp(等同「無」)
  {
    const empObj = state.employees.find(e => e.id === empId);
    const bandSince = empObj && empObj.bandSinceYYYYMM;
    const ippDetails = sub.data.itemDetails.ipp || [];
    const { optionId } = computeIppLevelFromDetails(ippDetails, bandSince);
    if (optionId && optionId !== 'none') {
      sub.data.items.ipp = optionId;
    } else {
      delete sub.data.items.ipp;  // 沒達 0.1 就不算
    }
  }

  // multi (cert) checkbox — 分組收集
  const multiByItem = {};
  document.querySelectorAll('.emp-multi').forEach(cb => {
    const itemId = cb.dataset.item;
    if (!multiByItem[itemId]) multiByItem[itemId] = [];
    if (cb.checked) multiByItem[itemId].push(cb.value);
  });
  Object.keys(multiByItem).forEach(itemId => {
    if (multiByItem[itemId].length > 0) sub.data.items[itemId] = multiByItem[itemId];
  });

  // others
  const othersScore = document.querySelector('.emp-others[data-others="score"]');
  const othersNote = document.querySelector('.emp-others[data-others="note"]');
  if (othersScore) {
    const v = parseFloat(othersScore.value);
    sub.data.others = isNaN(v) ? 0 : Math.round(v * 10) / 10;
  }
  if (othersNote) sub.data.othersNote = othersNote.value.trim();

  // 狀態變更
  if (newStatus === 'submitted') {
    sub.status = 'submitted';
    sub.submittedAt = Date.now();
    // 把所有有填寫的項目設為 pending
    sub.reviewedItems = {};
    sub.reviewedCertItems = {};
    Object.keys(sub.data.items).forEach(itemId => {
      const item = EXTRA_CONTRIBUTION_ITEMS.find(i => i.id === itemId);
      if (item && item.type === 'single') {
        sub.reviewedItems[itemId] = 'pending';
      } else if (item && item.type === 'multi') {
        sub.data.items[itemId].forEach(optId => {
          sub.reviewedCertItems[optId] = 'pending';
        });
      }
    });
    if (sub.data.others > 0) sub.reviewedItems.others = 'pending';
  } else {
    sub.status = 'draft';
  }

  await saveState(state);
}

async function copyToClipboard(text) {
  try {
    await navigator.clipboard.writeText(text);
    return true;
  } catch (e) {
    // fallback: textarea
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      return true;
    } catch (e2) {
      return false;
    }
  }
}

async function handleCopyBandLinks(band) {

  if (emps.length === 0) return;
  const lines = emps.map(e => `${e.name}(${e.enName || ''})\t${buildEmployeeLink(e.id)}`);
  const text = `Band ${band} → Band ${Number(band)+1} 自填連結(${emps.length} 人)\n\n` + lines.join('\n');
  const ok = await copyToClipboard(text);
  toast(ok ? `已複製 Band ${band} 共 ${emps.length} 個連結` : '複製失敗');
}

async function handleCopyAllLinks() {
  if (state.employees.length === 0) return;
  // group by band
  const bandGroups = {};
  state.employees.forEach(e => {
    const b = e.currentBand ?? '未設定';
    if (!bandGroups[b]) bandGroups[b] = [];
    bandGroups[b].push(e);
  });
  const sortedBands = Object.keys(bandGroups).sort((a, b) => {
    if (a === '未設定') return 1;
    if (b === '未設定') return -1;
    return Number(b) - Number(a);
  });
  const sections = sortedBands.map(band => {
    const emps = bandGroups[band];
    const targetBand = band !== '未設定' ? Number(band) + 1 : '—';
    const lines = emps.map(e => `${e.name}(${e.enName || ''})\t${buildEmployeeLink(e.id)}`);
    return `=== Band ${band} → Band ${targetBand}(${emps.length} 人)===\n${lines.join('\n')}`;
  });
  const text = `Extra Contribution 自填連結(共 ${state.employees.length} 人)\n\n` + sections.join('\n\n');
  const ok = await copyToClipboard(text);
  toast(ok ? `已複製全部 ${state.employees.length} 個連結` : '複製失敗');
}

async function handleSetReview(empId, itemId, decision) {
  if (!state.empSubmissions || !state.empSubmissions[empId]) return;
  const sub = state.empSubmissions[empId];
  if (!sub.reviewedItems) sub.reviewedItems = {};
  if (decision === 'accepted' || decision === 'rejected' || decision === 'pending') {
    sub.reviewedItems[itemId] = decision;
  } else if (decision.startsWith('adjust:')) {
    const adjustedTo = decision.substring(7);
    sub.reviewedItems[itemId] = { adjustedTo };
  }
  await saveState(state);
  render();
}

async function handleSetCertReview(empId, optId, decision) {
  if (!state.empSubmissions || !state.empSubmissions[empId]) return;
  const sub = state.empSubmissions[empId];
  if (!sub.reviewedCertItems) sub.reviewedCertItems = {};
  sub.reviewedCertItems[optId] = decision;
  await saveState(state);
  render();
}

async function handleBulkReview(empId, type) {
  if (!state.empSubmissions || !state.empSubmissions[empId]) return;
  const sub = state.empSubmissions[empId];
  if (!sub.reviewedItems) sub.reviewedItems = {};
  if (!sub.reviewedCertItems) sub.reviewedCertItems = {};
  const decision = type === 'accept-all' ? 'accepted' : 'rejected';

  // 對所有有提交的項目 (包括 cert) 都設成同個決定
  EXTRA_CONTRIBUTION_ITEMS.forEach(item => {
    const sel = sub.data?.items?.[item.id];
    if (item.type === 'single') {
      if (sel && sel !== 'none') sub.reviewedItems[item.id] = decision;
    } else {
      const arr = Array.isArray(sel) ? sel : [];
      arr.forEach(optId => { sub.reviewedCertItems[optId] = decision; });
    }
  });
  if ((Number(sub.data?.others) || 0) > 0) sub.reviewedItems.others = decision;

  await saveState(state);
  render();
}

async function handleFinalizeReview(empId) {
  const sub = state.empSubmissions?.[empId];
  if (!sub) return;
  // 檢查有沒有還在 pending 的
  let pending = 0;
  Object.values(sub.reviewedItems || {}).forEach(v => { if (v === 'pending') pending++; });
  Object.values(sub.reviewedCertItems || {}).forEach(v => { if (v === 'pending') pending++; });
  if (pending > 0) {
    if (!confirm(`還有 ${pending} 項尚未決定(待審狀態),這些項目將不會計入加分。\n確定要完成審核?`)) return;
  }
  sub.status = 'reviewed';
  applyReviewedSubmission(empId);
  await saveState(state);
  toast('審核完成,加分已套用');
  view.payload.reviewingEmp = null;
  render();
}

async function handleSaveBonusEmp(empId) {
  if (!state.extraBonus) state.extraBonus = {};
  if (!state.extraBonus[empId]) state.extraBonus[empId] = { items: {}, itemDetails: {}, certDetails: {}, others: 0, othersNote: '' };
  const data = state.extraBonus[empId];
  if (!data.items) data.items = {};
  if (!data.itemDetails) data.itemDetails = {};
  if (!data.certDetails) data.certDetails = {};

  // 管理員後台可編輯 bandSinceYYYYMM
  const bandSinceEl = document.querySelector(`.admin-band-since[data-bonus-emp="${empId}"]`);
  if (bandSinceEl) {
    const ym = normalizeYearMonth(bandSinceEl.value);
    const emp = state.employees.find(e => e.id === empId);
    if (emp) emp.bandSinceYYYYMM = ym;
  }

  // single selects
  document.querySelectorAll(`.bonus-select[data-bonus-emp="${empId}"]`).forEach(sel => {
    const itemId = sel.dataset.item;
    const val = sel.value;
    if (val && val !== 'none') {
      data.items[itemId] = val;
    } else {
      delete data.items[itemId];
      delete data.itemDetails[itemId];  // 取消選擇時也清掉細項
    }
  });

  // 用「列」為單位配對 text + month,收集成物件陣列
  // 只挑屬於這個 empId 的 detail-multi 容器
  const cardScope = document.querySelector(`.bonus-emp-card [data-bonus-emp-card="${empId}"]`) || document;
  // 再以 detail-multi 為邊界,透過第一個 text input 的 data-bonus-emp 判斷是否屬於這個 empId
  document.querySelectorAll('.detail-multi').forEach(container => {
    const firstTxt = container.querySelector('input.bonus-detail, input.bonus-cert-detail');
    if (!firstTxt) return;
    if (firstTxt.dataset.bonusEmp !== empId) return;
    const rows = [];
    container.querySelectorAll('.detail-multi-row').forEach(row => {
      const txt = row.querySelector('input.bonus-detail, input.bonus-cert-detail');
      if (!txt) return;
      const ym = row.querySelector('input[type="month"]');
      const wsel = row.querySelector('select.bonus-detail-weight, select.bonus-cert-detail-weight');
      const name = (txt.value || '').trim();
      if (!name) return;
      const obj = { name, occurredAt: ym ? normalizeYearMonth(ym.value) : '' };
      if (wsel && wsel.value) obj.weight = wsel.value;
      rows.push(obj);
    });
    if (firstTxt.classList.contains('bonus-detail')) {
      const itemId = firstTxt.dataset.detailItem;
      if (rows.length > 0 && data.items[itemId]) {
        data.itemDetails[itemId] = rows;
      } else {
        delete data.itemDetails[itemId];
      }
    } else {
      const optId = firstTxt.dataset.certOpt;
      const cb = document.querySelector(`.bonus-multi[data-bonus-emp="${empId}"][value="${optId}"]`);
      if (rows.length > 0 && cb && cb.checked) {
        data.certDetails[optId] = rows;
      } else {
        delete data.certDetails[optId];
      }
    }
  });

  // multi checkboxes (group by item id)
  const multiByItem = {};
  document.querySelectorAll(`.bonus-multi[data-bonus-emp="${empId}"]`).forEach(cb => {
    const itemId = cb.dataset.item;
    if (!multiByItem[itemId]) multiByItem[itemId] = [];
    if (cb.checked) multiByItem[itemId].push(cb.value);
  });
  Object.keys(multiByItem).forEach(itemId => {
    if (multiByItem[itemId].length > 0) {
      data.items[itemId] = multiByItem[itemId];
    } else {
      delete data.items[itemId];
    }
  });

  // 一些未勾選但舊資料還存在的 cert opt 要清掉
  const allCertOpts = new Set();
  document.querySelectorAll(`.bonus-multi[data-bonus-emp="${empId}"]`).forEach(cb => allCertOpts.add(cb.value));
  allCertOpts.forEach(optId => {
    const cb = document.querySelector(`.bonus-multi[data-bonus-emp="${empId}"][value="${optId}"]`);
    if (!cb || !cb.checked) delete data.certDetails[optId];
  });

  // others
  const othersScore = document.querySelector(`[data-bonus-emp="${empId}"][data-others="score"]`);
  const othersNote = document.querySelector(`[data-bonus-emp="${empId}"][data-others="note"]`);
  if (othersScore) {
    const v = parseFloat(othersScore.value);
    data.others = isNaN(v) ? 0 : Math.round(v * 10) / 10;
  }
  if (othersNote) data.othersNote = othersNote.value.trim();

  await saveState(state);
  toast('加分已儲存');
  render();
}

function handleExportCsv() {
  const trimMode = !!view.payload?.trimMode;
  const bonusMode = !!view.payload?.bonusMode;
  const techSplit = !!view.payload?.techSplit;
  const rows = [['目前職等', '目標職等', '技術組', '組內名次', 'Employee ID', '員工', '英文名', '技術', 'Email', '單位', '性別', '原始平均總分', '原始平均單項', '調整後平均總分', '調整後平均單項', 'Extra 加分', '加分後總分', '加分備註', '是否觸發排除', '評分人數', '應評人數', '升遷資格']];

  // 同時計算兩種平均
  const bandGroups = {};
  state.employees.forEach(e => {
    const b = e.currentBand ?? '未設定';
    if (!bandGroups[b]) bandGroups[b] = [];
    const raw = computeEmployeeAverage(e.id);
    const trimmed = computeEmployeeAverageTrimmed(e.id);
    const bonus = getEmployeeBonus(e.id);
    bandGroups[b].push({
      emp: e,
      rawAvg: raw.avg,
      trimmedAvg: trimmed.avg,
      bonus: bonus.score || 0,
      bonusNote: bonus.note || '',
      withBonus: trimmed.avg !== null ? trimmed.avg + (bonus.score || 0) : null,
      trimmedAny: trimmed.trimmedAny,
      count: raw.count,
      eligibleMgrCount: eligibleManagers(e).length
    });
  });
  const sortedBands = Object.keys(bandGroups).sort((a, b) => {
    if (a === '未設定') return 1;
    if (b === '未設定') return -1;
    return Number(b) - Number(a);
  });

  const sortFn = (a, b) => {
    const av = computeScoreByMode(a, trimMode, bonusMode);
    const bv = computeScoreByMode(b, trimMode, bonusMode);
    if (av === null && bv === null) return 0;
    if (av === null) return 1;
    if (bv === null) return -1;
    return bv - av;
  };

  sortedBands.forEach(band => {
    const targetBand = band !== '未設定' ? Number(band) + 1 : '—';
    const dimCount = state.dimensions.length;
    // techSplit 下每個 band 拆兩/三組,各自排名;否則整個 band 一個組
    let sections;
    if (techSplit) {
      const buckets = { bios_ec: [], driver: [], other: [] };
      bandGroups[band].forEach(r => { buckets[getEmployeeTechGroup(r.emp)].push(r); });
      sections = ['bios_ec', 'driver', 'other']
        .filter(k => buckets[k].length > 0)
        .map(k => ({ label: TECH_GROUP_LABELS[k], rows: buckets[k].sort(sortFn) }));
    } else {
      sections = [{ label: '全部', rows: bandGroups[band].sort(sortFn) }];
    }
    sections.forEach(sec => {
      sec.rows.forEach((r, i) => {
        const judgeBase = computeJudgeBase(r, trimMode);
        const dimAvgForJudge = judgeBase !== null && dimCount > 0 ? judgeBase / dimCount : null;
        const eligible = dimAvgForJudge === null ? '—' : (dimAvgForJudge < 4 ? '不符資格' : '符合');
        rows.push([
          'Band ' + band,
          'Band ' + targetBand,
          sec.label,
          i + 1,
          r.emp.id,
          r.emp.name,
          r.emp.enName || '',
          getEmployeeTech(r.emp),
          r.emp.email || '',
          r.emp.dept,
          r.emp.gender || '',
          r.rawAvg !== null ? r.rawAvg.toFixed(2) : '',
          r.rawAvg !== null && dimCount > 0 ? (r.rawAvg/dimCount).toFixed(2) : '',
          r.trimmedAvg !== null ? r.trimmedAvg.toFixed(2) : '',
          r.trimmedAvg !== null && dimCount > 0 ? (r.trimmedAvg/dimCount).toFixed(2) : '',
          r.bonus > 0 ? r.bonus.toFixed(1) : '',
          r.withBonus !== null ? r.withBonus.toFixed(2) : '',
          r.bonusNote || '',
          r.trimmedAny ? '是' : '否',
          r.count,
          r.eligibleMgrCount,
          eligible
        ]);
      });
    });
  });
  downloadCsv(rows, '升遷評分總表.csv');
}

function downloadCsv(rows, filename) {
  // BOM for Excel UTF-8 support
  const bom = '\uFEFF';
  const csv = bom + rows.map(r => r.map(cell => {
    const s = String(cell ?? '');
    if (s.includes(',') || s.includes('"') || s.includes('\n')) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  }).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
  toast('CSV 已下載');
}

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// 細項欄位:把各種舊/新格式一律正規化為 {name, occurredAt}[]
// occurredAt 格式為 'YYYY-MM' 或空字串
// 輸入可能是:
//   - undefined / null / '' → []
//   - 'foo' (最早期舊資料,單字串) → [{name:'foo', occurredAt:''}]
//   - ['foo', 'bar'] (中期舊資料,純字串陣列) → [{name:'foo', occurredAt:''}, ...]
//   - [{name:'foo', occurredAt:'2024-06'}, ...] (新資料) → 原樣
// 任何物件缺欄位會用空字串補上;name 為空的整筆略過
function normalizeDetail(v) {
  if (v === null || v === undefined) return [];
  const toItem = (x) => {
    if (x == null) return null;
    if (typeof x === 'string') {
      const s = x.trim();
      return s ? { name: s, occurredAt: '' } : null;
    }
    if (typeof x === 'object') {
      const name = (x.name == null ? '' : String(x.name)).trim();
      if (!name) return null;
      const occurredAt = normalizeYearMonth(x.occurredAt);
      return { name, occurredAt };
    }
    return null;
  };
  if (Array.isArray(v)) {
    return v.map(toItem).filter(Boolean);
  }
  const one = toItem(v);
  return one ? [one] : [];
}

// 驗證/正規化 YYYY-MM 字串。不合格式一律視為空
function normalizeYearMonth(v) {
  if (v == null) return '';
  const s = String(v).trim();
  if (!/^\d{4}-(0[1-9]|1[0-2])$/.test(s)) return '';
  return s;
}

// 把細項陣列合成一行字用(顯示在主管 / 管理員審核畫面、CSV note)
function joinDetail(v) {
  return normalizeDetail(v).map(d => d.occurredAt ? `${d.name} (${d.occurredAt})` : d.name).join(' / ');
}

// 比對兩個 YYYY-MM 字串,回傳 -1 / 0 / 1;空字串永遠視為 -Infinity(小於任何有效月份)
function compareYearMonth(a, b) {
  if (a === b) return 0;
  if (!a) return -1;
  if (!b) return 1;
  return a < b ? -1 : 1;
}

// 取得「現在月份往前推 N 年」的 YYYY-MM 字串
function yearMonthNYearsAgo(years) {
  const now = new Date();
  const y = now.getFullYear() - years;
  const m = now.getMonth() + 1;  // 0-based → 1-based
  return `${y}-${String(m).padStart(2, '0')}`;
}

// 驗證單一細項的 occurredAt 是否符合規則
// 回傳 null 表示通過,否則回傳錯誤訊息字串
// - cert 類(itemId === 'cert'):必須在現在往前 2 年以內
// - ipp 類:**期間內外都允許**(期間外仍可填,只是不計分),只要月份格式合法即可
// - 其他:必須 >= bandSince
function validateOccurredAt(itemId, occurredAt, bandSince) {
  const ym = normalizeYearMonth(occurredAt);
  if (!ym) return '請填寫發生年月 (YYYY-MM)';
  if (itemId === 'cert') {
    const twoYearsAgo = yearMonthNYearsAgo(2);
    if (compareYearMonth(ym, twoYearsAgo) < 0) {
      return `證照須在最近 2 年內(${twoYearsAgo} 之後)`;
    }
  } else if (itemId === 'ipp') {
    // 不擋:期間內外都可填,只要月份格式合法
  } else {
    if (!bandSince) return '請先填寫當前 Band 起始年月';
    if (compareYearMonth(ym, bandSince) < 0) {
      return `不在當前 Band 期間(須 ≥ ${bandSince})`;
    }
  }
  return null;
}

// IPP 一筆是否在 Band 期間內(true=計加分;false=僅統計、不計分)
function isIppInBandPeriod(occurredAt, bandSince) {
  const ym = normalizeYearMonth(occurredAt);
  if (!ym || !bandSince) return false;
  return compareYearMonth(ym, bandSince) >= 0;
}

// IPP 細項一筆的權重(回傳 number,空值或非數字回 0)
function getIppWeight(detail) {
  const w = parseFloat(detail && detail.weight);
  return isFinite(w) && w > 0 ? w : 0;
}

// 從 detail 陣列(已 normalize)推算 IPP 期間內權重總和 → 對應到 EXTRA_CONTRIBUTION_ITEMS 裡 ipp 的 option id
// sum < 0.1 → 'none';0.1 <= sum < 0.5 → 'lt05';...;sum > 3 → 'gt3'
function computeIppLevelFromDetails(detailArr, bandSince) {
  let sumIn = 0;
  (detailArr || []).forEach(d => {
    if (isIppInBandPeriod(d.occurredAt, bandSince)) {
      sumIn += getIppWeight(d);
    }
  });
  if (sumIn < 0.1) return { optionId: 'none', sum: sumIn };
  if (sumIn < 0.5) return { optionId: 'lt05', sum: sumIn };
  if (sumIn < 1)   return { optionId: 'lt1',  sum: sumIn };
  if (sumIn === 1) return { optionId: 'eq1',  sum: sumIn };
  if (sumIn <= 2)  return { optionId: 'lt2',  sum: sumIn };
  if (sumIn <= 3)  return { optionId: 'lt3',  sum: sumIn };
  return { optionId: 'gt3', sum: sumIn };
}

// IPP 統計用 — 回傳 { inCount, outCount, totalCount, inWeight, outWeight, levelOptionId, levelLabel, levelScore }
function summarizeIpp(detailArr, bandSince) {
  let inCount = 0, outCount = 0, inWeight = 0, outWeight = 0;
  (detailArr || []).forEach(d => {
    const w = getIppWeight(d);
    if (isIppInBandPeriod(d.occurredAt, bandSince)) {
      inCount++;
      inWeight += w;
    } else {
      outCount++;
      outWeight += w;
    }
  });
  // 取 ipp item def
  const ippItem = EXTRA_CONTRIBUTION_ITEMS.find(i => i.id === 'ipp');
  const levelInfo = computeIppLevelFromDetails(detailArr, bandSince);
  const opt = ippItem ? ippItem.options.find(o => o.id === levelInfo.optionId) : null;
  // round to 2 decimals for display
  const r2 = x => Math.round(x * 100) / 100;
  return {
    inCount, outCount, totalCount: inCount + outCount,
    inWeight: r2(inWeight), outWeight: r2(outWeight),
    levelOptionId: levelInfo.optionId,
    levelLabel: opt ? opt.label : '',
    levelScore: opt ? opt.score : 0,
  };
}

// 渲染「可多列」的細項輸入群組 — 每列含名稱 + 發生年月 + 刪除鈕
// className: 每個 name input 的 class(如 'emp-detail' 'bonus-detail' 'emp-cert-detail' 'bonus-cert-detail')
// dataAttrs: 其他要掛的 data-* 屬性字串片段(例:'data-detail-item="stamp"' 等)
// values:    {name, occurredAt}[] (可空)
// placeholder: name 欄位 placeholder 文字
// disabled:  整組是否停用
// itemId:    用於驗證規則('cert' 特例);也會以 data-item-id 存在 add 按鈕上,讓新列的驗證能辨識
// bandSince: 當前 Band 起始年月,用於驗證
// isCert:    是否為 cert 類(只有 placeholder 月份範例會略有差異)
function renderDetailMultiInputs(className, dataAttrs, values, placeholder, disabled, itemId, bandSince) {
  const arr = values && values.length > 0 ? values : [{ name: '', occurredAt: '', weight: '' }];
  const disAttr = disabled ? 'disabled' : '';
  const isIpp = itemId === 'ipp';
  const rows = arr.map(d => {
    const err = disabled ? null : validateOccurredAt(itemId, d.occurredAt, bandSince);
    // 只在「使用者有填 name 但 occurredAt 有問題」時顯示紅字(避免空列也飄紅)
    const showErr = err && (d.name || d.occurredAt);
    // IPP 額外:期間判定 tag(只有當 name 有填、月份合法時才顯示)
    let ippTag = '';
    if (isIpp && d.name && normalizeYearMonth(d.occurredAt)) {
      const inBand = isIppInBandPeriod(d.occurredAt, bandSince);
      ippTag = inBand
        ? '<span class="ipp-row-tag ipp-row-tag-in">✓ 計入加分</span>'
        : '<span class="ipp-row-tag ipp-row-tag-out">ⓘ 期間外 · 僅統計</span>';
    }
    // IPP weight 下拉
    const weightField = isIpp ? `
      <select class="${className}-weight" ${dataAttrs} ${disAttr} title="本筆 IPP 權重">
        <option value=""    ${!d.weight ? 'selected' : ''}>權重</option>
        <option value="0.1" ${String(d.weight) === '0.1' ? 'selected' : ''}>0.1</option>
        <option value="0.5" ${String(d.weight) === '0.5' ? 'selected' : ''}>0.5</option>
        <option value="1"   ${String(d.weight) === '1'   ? 'selected' : ''}>1</option>
      </select>
    ` : '';
    return `
    <div class="detail-multi-row">
      <input type="text" class="${className}" ${dataAttrs} value="${escapeHtml(d.name)}" placeholder="${escapeHtml(placeholder)}" ${disAttr}>
      <input type="month" class="${className}-ym" ${dataAttrs} value="${escapeHtml(d.occurredAt)}" ${disAttr} title="發生年月 (YYYY-MM)">
      ${weightField}
      <button type="button" class="detail-row-remove" data-action="detail-row-remove" title="刪除此列" ${disAttr}>✕</button>
    </div>
    ${ippTag ? `<div class="detail-row-tag">${ippTag}</div>` : ''}
    ${showErr ? `<div class="detail-row-err">⚠ ${escapeHtml(err)}</div>` : ''}
    `;
  }).join('');
  return `
    <div class="detail-multi" data-item-id="${escapeHtml(itemId || '')}">
      ${rows}
      <button type="button" class="detail-row-add" data-action="detail-row-add" data-class="${className}" data-attrs="${escapeHtml(dataAttrs)}" data-placeholder="${escapeHtml(placeholder)}" data-is-ipp="${isIpp ? '1' : ''}" ${disAttr}>+ 新增一列</button>
    </div>
  `;
}

// =========================================================================
// INIT
// =========================================================================
(async function init() {
  try {
    const sdkReady = await waitForFirebaseSDK();
    if (!sdkReady) {
      throw new Error('Firebase SDK 載入逾時 — 請檢查網路或防火牆是否擋住 gstatic.com');
    }
    initFirebase();
  } catch (e) {
    document.getElementById('app').innerHTML = `<div style="padding:60px;text-align:center;color:#8b2e1f;font-family:sans-serif;"><h2>無法連線到 Firebase</h2><p style="font-size:16px;margin:20px 0;">${e.message}</p><p style="color:#888;margin-top:20px;font-size:13px;">請開 F12 主控台看詳細錯誤,或聯繫管理者</p></div>`;
    console.error('Firebase 初始化失敗', e);
    return;
  }
  state = await loadState();
  // 檢查 URL 是否帶 ?emp=員工ID,有的話直接進員工填寫頁
  const params = new URLSearchParams(window.location.search);
  const empId = params.get('emp');
  if (empId) {
    const emp = state.employees.find(e => e.id === empId);
    if (emp) {
      view = { mode: 'employee_form', payload: { empId } };
    }
  }
  render();
  // 啟動即時同步監聽
  startRealtimeSync();
})();
</script>
</body>
</html>
