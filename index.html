<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>升遷評核系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f1ea;
  --bg-paper: #faf7f0;
  --ink: #1a1a1a;
  --ink-soft: #4a4a4a;
  --ink-muted: #8b8378;
  --line: #2c2825;
  --line-soft: #d6cfc1;
  --accent: #8b2e1f;
  --accent-soft: #c2856b;
  --gold: #b08d3a;
  --green: #4a6b3a;
  --shadow: 0 1px 0 rgba(26,26,26,0.06), 0 4px 16px rgba(26,26,26,0.04);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'IBM Plex Sans', 'Noto Sans TC', sans-serif;
  font-size: 15px;
  line-height: 1.55;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

body {
  background-image:
    radial-gradient(circle at 20% 10%, rgba(139,46,31,0.03) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(176,141,58,0.04) 0%, transparent 50%);
  background-attachment: fixed;
}

/* ================== TYPOGRAPHY ================== */
.serif { font-family: 'Fraunces', 'Noto Sans TC', serif; font-optical-sizing: auto; }
.mono { font-family: 'JetBrains Mono', monospace; }

h1, h2, h3 { font-family: 'Fraunces', 'Noto Sans TC', serif; font-weight: 600; letter-spacing: -0.01em; }

/* ================== LAYOUT ================== */
.app {
  max-width: 1180px;
  margin: 0 auto;
  padding: 32px 28px 80px;
}

.masthead {
  border-bottom: 2px solid var(--line);
  padding-bottom: 18px;
  margin-bottom: 32px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 20px;
  flex-wrap: wrap;
}
.masthead-left { display: flex; align-items: baseline; gap: 18px; flex-wrap: wrap; }
.brand {
  font-family: 'Fraunces', serif;
  font-size: 34px;
  font-weight: 600;
  letter-spacing: -0.02em;
  font-style: italic;
}
.brand-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--ink-muted);
  border-left: 1px solid var(--line-soft);
  padding-left: 14px;
}
.session-info {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  display: flex;
  gap: 14px;
  align-items: center;
}
.session-info button {
  background: none;
  border: 1px solid var(--line);
  color: var(--ink);
  font-family: inherit;
  font-size: 10px;
  padding: 6px 12px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  transition: all 0.15s;
}
.session-info button:hover { background: var(--ink); color: var(--bg-paper); }

#syncStatus {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.06em;
  padding: 4px 10px;
  border: 1px solid;
  transition: all 0.2s;
}
#syncStatus.sync-saved { color: var(--green); border-color: var(--green); }
#syncStatus.sync-saving { color: var(--gold); border-color: var(--gold); }
#syncStatus.sync-error { color: var(--accent); border-color: var(--accent); }

/* ================== ROLE PICKER ================== */
.role-picker {
  background: var(--bg-paper);
  border: 1px solid var(--line);
  padding: 56px 48px;
  max-width: 640px;
  margin: 80px auto;
  box-shadow: var(--shadow);
  position: relative;
}
.role-picker::before {
  content: "";
  position: absolute;
  inset: 6px;
  border: 1px solid var(--line-soft);
  pointer-events: none;
}
.role-picker h2 {
  font-size: 32px;
  margin-bottom: 6px;
  text-align: center;
}
.role-picker .sub {
  text-align: center;
  color: var(--ink-muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  margin-bottom: 36px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--line-soft);
}
.role-options { display: grid; gap: 14px; }
.role-card {
  border: 1px solid var(--line-soft);
  padding: 22px 24px;
  cursor: pointer;
  background: transparent;
  text-align: left;
  font-family: inherit;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.role-card:hover {
  border-color: var(--line);
  background: rgba(139,46,31,0.02);
  transform: translateX(2px);
}
.role-card .label {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 500;
}
.role-card .desc {
  font-size: 13px;
  color: var(--ink-muted);
  margin-top: 2px;
}
.role-card .arrow {
  font-family: 'JetBrains Mono', monospace;
  color: var(--ink-muted);
  font-size: 18px;
}

/* ================== FORMS ================== */
.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--ink-muted);
  margin-bottom: 6px;
}
.field input, .field select, .field textarea {
  width: 100%;
  background: var(--bg-paper);
  border: 1px solid var(--line-soft);
  padding: 10px 14px;
  font-family: inherit;
  font-size: 15px;
  color: var(--ink);
  transition: border-color 0.15s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: none;
  border-color: var(--ink);
}

.cat-checkboxes {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.cat-checkbox {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border: 1px solid var(--line-soft);
  background: var(--bg);
  cursor: pointer;
  font-size: 14px;
  transition: all 0.15s;
}
.cat-checkbox:hover { border-color: var(--ink); }
.cat-checkbox input[type="checkbox"] { cursor: pointer; accent-color: var(--accent); }

.btn {
  background: var(--ink);
  color: var(--bg-paper);
  border: none;
  padding: 12px 22px;
  font-family: 'IBM Plex Sans', 'Noto Sans TC', sans-serif;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: background 0.15s;
  text-transform: uppercase;
}
.btn:hover { background: var(--accent); }
.btn.secondary { background: transparent; color: var(--ink); border: 1px solid var(--line); }
.btn.secondary:hover { background: var(--ink); color: var(--bg-paper); }
.btn.danger { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
.btn.danger:hover { background: var(--accent); color: var(--bg-paper); }
.btn.small { padding: 6px 12px; font-size: 11px; }

/* ================== TABS ================== */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--line-soft);
  margin-bottom: 28px;
}
.tab {
  background: none;
  border: none;
  padding: 14px 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--ink-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.15s;
}
.tab:hover { color: var(--ink); }
.tab.active {
  color: var(--ink);
  border-bottom-color: var(--accent);
}

/* ================== EMPLOYEE LIST (manager view) ================== */
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 18px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--line-soft);
}
.section-header h3 {
  font-size: 24px;
}
.section-header .meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
}

.employee-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }

.band-group {
  margin-bottom: 32px;
}
.band-group:last-child { margin-bottom: 0; }
.band-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 10px 14px;
  background: var(--ink);
  color: var(--bg-paper);
  margin-bottom: 14px;
  border-left: 4px solid var(--accent);
}
.band-title {
  display: flex;
  align-items: baseline;
  gap: 10px;
  font-family: 'Fraunces', serif;
}
.band-from {
  font-size: 14px;
  color: var(--line-soft);
  font-style: italic;
}
.band-arrow {
  font-family: 'JetBrains Mono', monospace;
  color: var(--accent-soft);
  font-size: 14px;
}
.band-to {
  font-size: 22px;
  font-weight: 600;
  color: var(--bg-paper);
}
.band-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--line-soft);
}
.emp-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-muted);
  letter-spacing: 0.06em;
  margin-bottom: 10px;
}
.en-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--ink-soft);
  letter-spacing: 0.02em;
  margin-bottom: 2px;
}
.band-tag {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 2px 8px;
  background: var(--accent);
  color: var(--bg-paper);
  letter-spacing: 0.1em;
  margin-left: 8px;
  vertical-align: middle;
}
.tech-tag {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 2px 8px;
  background: var(--gold);
  color: var(--bg-paper);
  letter-spacing: 0.12em;
  font-weight: 500;
  vertical-align: middle;
}
.tech-tag-large {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 3px 10px;
  background: var(--gold);
  color: var(--bg-paper);
  letter-spacing: 0.14em;
  font-weight: 500;
  margin-left: 8px;
  vertical-align: middle;
}

.mode-switcher {
  background: var(--bg-paper);
  border: 1px solid var(--line-soft);
  padding: 14px 18px;
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 18px;
  flex-wrap: wrap;
}
.mode-switcher-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--ink-muted);
}
.mode-switcher-tabs {
  display: flex;
  border: 1px solid var(--line);
}
.mode-tab {
  background: transparent;
  border: none;
  padding: 8px 16px;
  font-family: 'IBM Plex Sans', 'Noto Sans TC', sans-serif;
  font-size: 12px;
  cursor: pointer;
  color: var(--ink-soft);
  letter-spacing: 0.04em;
  transition: all 0.15s;
}
.mode-tab + .mode-tab { border-left: 1px solid var(--line); }
.mode-tab:hover { background: rgba(139,46,31,0.05); }
.mode-tab.active {
  background: var(--ink);
  color: var(--bg-paper);
  font-weight: 500;
}
.mode-switcher-desc {
  flex: 1;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-muted);
  letter-spacing: 0.04em;
  line-height: 1.5;
  min-width: 200px;
}

/* 獨立開關(每個開關 1 顆按鈕,ON/OFF 兩態) */
.mode-toggles { display: flex; gap: 10px; flex-wrap: wrap; }
.mode-toggle {
  background: transparent;
  border: 1px solid var(--line);
  padding: 7px 14px;
  font-family: 'IBM Plex Sans', 'Noto Sans TC', sans-serif;
  font-size: 12px;
  color: var(--ink-soft);
  letter-spacing: 0.04em;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all 0.15s;
}
.mode-toggle:hover { background: rgba(139,46,31,0.05); border-color: var(--ink-soft); }
.mode-toggle .toggle-indicator {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 1px solid var(--line-soft);
  background: transparent;
  font-size: 10px;
  line-height: 12px;
  text-align: center;
  color: transparent;
  font-family: 'JetBrains Mono', monospace;
  transition: all 0.15s;
}
.mode-toggle.on {
  background: var(--ink);
  color: var(--bg-paper);
  border-color: var(--ink);
  font-weight: 500;
}
.mode-toggle.on .toggle-indicator {
  background: var(--bg-paper);
  border-color: var(--bg-paper);
  color: var(--ink);
}

.trim-tag {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  padding: 1px 6px;
  background: var(--gold);
  color: var(--bg-paper);
  letter-spacing: 0.1em;
  margin-left: 4px;
  vertical-align: middle;
}

.disqualified-row td {
  background: rgba(139,46,31,0.06) !important;
}
.disqualified-row:hover td {
  background: rgba(139,46,31,0.10) !important;
}
.disqualified-tag {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  padding: 2px 8px;
  background: var(--accent);
  color: var(--bg-paper);
  letter-spacing: 0.12em;
  margin-left: 8px;
  vertical-align: middle;
  font-weight: 600;
}
.disqualified-num {
  color: var(--accent) !important;
  font-weight: 600;
}

.bonus-tag {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  padding: 1px 6px;
  background: var(--gold);
  color: var(--bg-paper);
  letter-spacing: 0.1em;
  margin-left: 4px;
  vertical-align: middle;
  font-weight: 600;
}

.bonus-table {
  width: 100%;
  border-collapse: collapse;
  background: var(--bg-paper);
  border: 1px solid var(--line-soft);
}
.bonus-table th {
  background: var(--ink);
  color: var(--bg-paper);
  text-align: left;
  padding: 10px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  font-weight: 500;
}
.bonus-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--line-soft);
  font-size: 14px;
  vertical-align: middle;
}
.bonus-table tr:last-child td { border-bottom: none; }
.bonus-input {
  background: var(--bg);
  border: 1px solid var(--line-soft);
  padding: 6px 10px;
  font-family: inherit;
  color: var(--ink);
}
.bonus-input:focus { outline: none; border-color: var(--ink); }
.bonus-input[type="number"] {
  font-family: 'Fraunces', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--gold);
}

.bonus-emp-card {
  background: var(--bg-paper);
  border: 1px solid var(--line-soft);
  margin-bottom: 8px;
  transition: border-color 0.15s;
}
.bonus-emp-card.expanded { border-color: var(--ink); }
.bonus-emp-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 18px;
  cursor: pointer;
  transition: background 0.15s;
}
.bonus-emp-header:hover { background: rgba(139,46,31,0.03); }
.bonus-emp-body {
  padding: 0 18px 18px;
  border-top: 1px solid var(--line-soft);
}
.bonus-item-row {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 18px;
  padding: 12px 4px;
  border-bottom: 1px dashed var(--line-soft);
  align-items: center;
}
.bonus-item-row:last-child { border-bottom: none; }
.bonus-item-name {
  font-family: 'Fraunces', serif;
  font-size: 14px;
  font-weight: 500;
}
.bonus-select {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--line-soft);
  padding: 8px 12px;
  font-family: inherit;
  font-size: 13px;
  color: var(--ink);
}
.bonus-select:focus { outline: none; border-color: var(--ink); }
.bonus-multi-checks {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.bonus-multi-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.bonus-multi-row {
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 10px;
  align-items: center;
}
.bonus-detail, .bonus-cert-detail {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--line-soft);
  padding: 6px 10px;
  font-family: inherit;
  font-size: 12px;
  color: var(--ink);
  margin-top: 6px;
  transition: border-color 0.15s, opacity 0.15s;
}
.bonus-cert-detail { margin-top: 0; }
.bonus-detail:focus, .bonus-cert-detail:focus { outline: none; border-color: var(--ink); }
.bonus-detail:disabled, .bonus-cert-detail:disabled {
  background: transparent;
  border-color: transparent;
  opacity: 0.4;
  cursor: not-allowed;
}

/* Employee Form */
.employee-form-panel {
  background: var(--bg-paper);
  border: 1px solid var(--line);
  padding: 32px 36px;
  position: relative;
  box-shadow: var(--shadow);
}
.employee-form-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  border-bottom: 2px solid var(--line);
  padding-bottom: 16px;
  margin-bottom: 20px;
}
.employee-form-header h2 {
  font-size: 28px;
  font-style: italic;
}
.form-status {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 4px 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.form-status-draft { background: var(--accent); color: var(--bg-paper); }
.form-status-submitted { background: var(--gold); color: var(--bg-paper); }
.form-status-reviewed { background: var(--green); color: var(--bg-paper); }

.form-summary {
  display: flex;
  gap: 24px;
  margin-bottom: 24px;
  padding: 14px 18px;
  background: var(--bg);
  border-left: 3px solid var(--ink);
}
.form-summary-item .label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-muted);
  margin-bottom: 4px;
}
.form-summary-item .value {
  font-family: 'Fraunces', serif;
  font-size: 30px;
  font-weight: 600;
  color: var(--gold);
  line-height: 1;
}

.form-items { margin-bottom: 24px; }
.form-item-row {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 18px;
  padding: 14px 4px;
  border-bottom: 1px dashed var(--line-soft);
  align-items: start;
}
.form-item-row:last-child { border-bottom: none; }
.form-item-name {
  font-family: 'Fraunces', serif;
  font-size: 14px;
  font-weight: 500;
  padding-top: 8px;
}
.form-item-control {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.emp-select, .emp-detail, .emp-cert-detail {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--line-soft);
  padding: 8px 12px;
  font-family: inherit;
  font-size: 13px;
  color: var(--ink);
}
.emp-select:focus, .emp-detail:focus, .emp-cert-detail:focus { outline: none; border-color: var(--ink); }
.emp-select:disabled, .emp-detail:disabled, .emp-cert-detail:disabled, .emp-others:disabled, input[type="checkbox"]:disabled {
  background: transparent;
  opacity: 0.6;
  cursor: not-allowed;
}

/* ================== MULTI-LINE DETAIL (Bug 2: 可多列細項) ================== */
.detail-multi { display: flex; flex-direction: column; gap: 6px; width: 100%; }
.detail-multi-row { display: flex; gap: 6px; align-items: stretch; }
.detail-multi-row > input[type="text"] { flex: 1; min-width: 0; }
.detail-row-remove {
  flex: 0 0 auto;
  width: 32px;
  background: transparent;
  border: 1px solid var(--line-soft);
  color: var(--ink-muted);
  font-size: 14px;
  line-height: 1;
  cursor: pointer;
  padding: 0;
  font-family: inherit;
  transition: all 0.15s;
}
.detail-row-remove:hover:not(:disabled) {
  color: var(--accent);
  border-color: var(--accent);
}
.detail-row-remove:disabled { opacity: 0.3; cursor: not-allowed; }
.detail-row-add {
  align-self: flex-start;
  background: transparent;
  border: 1px dashed var(--line-soft);
  color: var(--ink-muted);
  font-size: 12px;
  padding: 5px 12px;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: 0.02em;
  transition: all 0.15s;
}

let fbApp = null;

function initFirebase() {
  // 用 compat API 從全域 window.firebase 取得
  if (typeof firebase === 'undefined') {
    throw new Error('Firebase SDK 未載入(可能是網路被擋)');
  }
  if (!firebase.initializeApp) {
    throw new Error('Firebase app SDK 沒載入完成');
  }
  if (!firebase.database) {
    throw new Error('Firebase database SDK 沒載入完成');
  }
  try {
    fbApp = firebase.initializeApp(FIREBASE_CONFIG);
  } catch (e) {
    // 已經初始化過(熱重載或重複呼叫)
    fbApp = firebase.app();
  }
  fbDb = firebase.database();
  fbStateRef = fbDb.ref('appState/' + STORE_KEY);
  if (!fbStateRef) {
    throw new Error('無法建立資料庫參照,請檢查 databaseURL');
  }
}

// 等待 Firebase SDK 載入完成(最多 5 秒)
async function waitForFirebaseSDK() {
  const maxWait = 5000;
  const interval = 100;
  let waited = 0;
  while (waited < maxWait) {
    if (typeof firebase !== 'undefined' && firebase.initializeApp && firebase.database) {
      return true;
    }
    await new Promise(r => setTimeout(r, interval));
    waited += interval;
  }
  return false;
}

async function loadState() {
  try {
    const snapshot = await fbStateRef.once('value');
    const val = snapshot.val();
    if (val) {
      return Object.assign(defaultState(), val);
    }
  } catch (e) {
    console.error('讀取失敗', e);
    toast('讀取失敗:' + e.message);
  }
  const ds = defaultState();
  await saveState(ds);
  return ds;
}

// 移除物件中所有 undefined 值(Firebase 不接受 undefined)
function cleanForFirebase(obj) {
  if (obj === null || obj === undefined) return null;
  if (Array.isArray(obj)) return obj.map(cleanForFirebase);
  if (typeof obj !== 'object') return obj;
  const cleaned = {};
  for (const k in obj) {
    if (obj[k] !== undefined) {
      cleaned[k] = cleanForFirebase(obj[k]);
    }
  }
  return cleaned;
}

async function saveState(stateToSave) {
  try {
    setSyncStatus('saving');
    isApplyingRemote = true;
    await fbStateRef.set(cleanForFirebase(stateToSave));
    setTimeout(() => { isApplyingRemote = false; }, 300);
    setSyncStatus('saved');
  } catch (e) {
    console.error('儲存失敗', e);
    isApplyingRemote = false;
    setSyncStatus('error');
    toast('儲存失敗:' + e.message);
  }
}

// 監聽其他使用者對資料的變更,自動更新本機畫面
function startRealtimeSync() {
  fbStateRef.on('value', snapshot => {
    if (isApplyingRemote) return;
    const val = snapshot.val();
    if (!val) return;
    // 與本機 state 比較,如果不同則更新並重畫
    const remoteJson = JSON.stringify(val);
    const localJson = JSON.stringify(state);
    if (remoteJson !== localJson) {
      state = Object.assign(defaultState(), val);
      // 不要在使用者正在打字時打斷 (簡單檢查:active element 是否為 input)
      const ae = document.activeElement;
      const isTyping = ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA' || ae.tagName === 'SELECT');
      if (!isTyping) {
        render();
      }
    }
  });
}

// Sync status indicator
function setSyncStatus(status) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  el.classList.remove('sync-saving', 'sync-saved', 'sync-error');
  if (status === 'saving') {
    el.classList.add('sync-saving');
    el.textContent = '⟳ 儲存中…';
  } else if (status === 'saved') {
    el.classList.add('sync-saved');
    el.textContent = '✓ 已同步';
    setTimeout(() => { if (el.classList.contains('sync-saved')) el.textContent = '● 已連線'; }, 1500);
  } else if (status === 'error') {
    el.classList.add('sync-error');
    el.textContent = '⚠ 同步失敗';
  }
}

// 把舊 cert multi-array 裡的 TOEIC/JLPT 值解析成新單 item 的 level:
//   舊 data.items.cert = ['toeic_gold', 'jlpt_n1', 'pmp'] → 新:items.toeic = 'gold', items.jlpt = 'n1'
//   取「最高」(對 TOEIC 而言 gold > blue > green;JLPT 而言 n1 > n2)
// 若 data.items[itemId] 已有新值,優先用新值;否則從 data.items.cert 推
function resolveSingleItemLevel(itemId, data) {
  if (!data) return null;
  const direct = data.items?.[itemId];
  if (direct && direct !== 'none') return direct;
  const cert = Array.isArray(data.items?.cert) ? data.items.cert : [];
  if (cert.length === 0) return null;
  if (itemId === 'toeic') {
    if (cert.includes('toeic_gold')) return 'gold';
    if (cert.includes('toeic_blue')) return 'blue';
    if (cert.includes('toeic_green')) return 'green';
  } else if (itemId === 'jlpt') {
    if (cert.includes('jlpt_n1')) return 'n1';
    if (cert.includes('jlpt_n2')) return 'n2';
  }
  return null;
}

function getEmployeeSubmission(empId) {
  return state.empSubmissions?.[empId] || {
    status: 'draft',
    data: { items: {}, itemDetails: {}, certDetails: {}, others: 0, othersNote: '' },
    reviewedItems: {},
    reviewedCertItems: {},
    submittedAt: null
  };
}

// 把員工提交 + 管理員 review 結果合併,套用到 state.extraBonus(讓 getEmployeeBonus 直接讀)
function applyReviewedSubmission(empId) {
  const sub = getEmployeeSubmission(empId);
  if (sub.status !== 'reviewed') return;
  if (!state.extraBonus) state.extraBonus = {};
  const result = { items: {}, itemDetails: {}, certDetails: {}, others: 0, othersNote: '' };
  const data = sub.data || {};

  // 遍歷每個 single item
  EXTRA_CONTRIBUTION_ITEMS.forEach(item => {
    // listing-mode:細項各自的 reviewDecision 才是審核結果(整項 review 不適用)
    if (item.listingMode) {
      const arr = normalizeDetail(data.itemDetails?.[item.id]);
      const bandSince = state.employees.find(e => e.id === empId)?.bandSinceYYYYMM;
      const accepted = arr.filter(d => {
        if (d.reviewDecision !== 'accepted') return false;
        if (bandSince && d.occurredAt) {
          const ym = normalizeYearMonth(d.occurredAt);
          if (ym && compareYearMonth(ym, bandSince) < 0) return false;
        }
        return true;
      });
      if (accepted.length > 0) {
        result.itemDetails[item.id] = accepted;
      }
      // IPP 特例:從 accepted 細項的 weight 加總反推 level,寫進 items.ipp
      if (item.id === 'ipp') {
        const { optionId } = computeIppLevelFromDetails(arr, bandSince, { onlyAccepted: true });
        if (optionId && optionId !== 'none') {
          result.items.ipp = optionId;
        }
      }
      // Travel 特例:從 accepted 段的天數加總反推 level,寫進 items.travel
      if (item.id === 'travel') {
        const { optionId } = computeTravelLevelFromDetails(arr, bandSince, state.covidPeriod || {}, { onlyAccepted: true });
        if (optionId && optionId !== 'none') {
          result.items.travel = optionId;
        }
      }
      return;
    }
    if (item.type === 'single') {
      const review = sub.reviewedItems?.[item.id];
      const empSel = data.items?.[item.id];
      if (!empSel || empSel === 'none') return;
      const detArr = normalizeDetail(data.itemDetails?.[item.id]);
      if (review === 'accepted') {
        result.items[item.id] = empSel;
        if (detArr.length > 0) result.itemDetails[item.id] = detArr;
      } else if (review && typeof review === 'object' && review.adjustedTo) {
        result.items[item.id] = review.adjustedTo;
        if (detArr.length > 0) result.itemDetails[item.id] = detArr;
      }
      // rejected / pending 都不計入
    } else if (item.type === 'multi') {
      const empArr = Array.isArray(data.items?.[item.id]) ? data.items[item.id] : [];
      const accepted = [];
      empArr.forEach(optId => {
        const review = sub.reviewedCertItems?.[optId];
        if (review === 'accepted') {
          accepted.push(optId);
          const cdArr = normalizeDetail(data.certDetails?.[optId]);
          if (cdArr.length > 0) result.certDetails[optId] = cdArr;
        }
      });
      if (accepted.length > 0) result.items[item.id] = accepted;
    }
  });

  // Others 也要 review
  const othersReview = sub.reviewedItems?.others;
  if (othersReview === 'accepted' && data.others > 0) {
    result.others = data.others;
    result.othersNote = data.othersNote || '';
  }

  state.extraBonus[empId] = result;
}

// 從選擇的項目計算 extra bonus 總分
function getEmployeeBonus(empId) {
  const data = getEmployeeBonusData(empId);
  let total = 0;
  const breakdown = [];  // [{itemName, label, score, detail}]
  EXTRA_CONTRIBUTION_ITEMS.forEach(item => {
    // listing-mode:用 summarizeListedItem 算分(支援 levelCaps 封頂規則)
    if (item.listingMode) {
      const arr = normalizeDetail(data.itemDetails?.[item.id]);
      // extraBonus 裡的資料已經只剩 accepted 列(由 applyReviewedSubmission 過濾),所以不用再傳 bandSince
      const summary = summarizeListedItem(item, arr);
      if (summary.acceptedScore > 0) {
        total += summary.acceptedScore;
        // breakdown:列出每個 level 的筆數 + 該 level 得分
        Object.keys(summary.byLevel).forEach(lvl => {
          const cnt = summary.byLevel[lvl].acceptedCount;
          if (cnt === 0) return;
          const opt = item.options.find(o => o.id === lvl);
          if (!opt) return;
          // 算這個 level 實際拿多少分(套 cap 規則)
          const caps = item.levelCaps || {};
          let lvlScore;
          if (caps[lvl]) {
            const entries = caps[lvl].slice().sort((a, b) => a.count - b.count);
            lvlScore = 0;
            for (const e of entries) { if (cnt >= e.count) lvlScore = e.score; }
          } else {
            lvlScore = opt.score * cnt;
          }
          breakdown.push({
            itemName: item.name,
            label: `${opt.label} × ${cnt}`,
            score: lvlScore,
            detail: arr.filter(d => d.level === lvl && d.reviewDecision !== 'rejected').map(d => d.name).join(', ')
          });
        });
      }
      return;
    }
    // 對 TOEIC/JLPT 用 resolveSingleItemLevel 自動從舊 cert 資料 fallback
    const sel = (item.id === 'toeic' || item.id === 'jlpt')
      ? resolveSingleItemLevel(item.id, data)
      : data.items?.[item.id];
    if (item.type === 'single') {
      if (!sel || sel === 'none') return;
      // scoreInputMode + validityMonths:檢查考試日期是否過期
      if (item.scoreInputMode && item.validityMonths) {
        const details = normalizeDetail(data.itemDetails?.[item.id]);
        const testDate = details[0]?.occurredAt || '';
        if (testDate && isScoreExpired(testDate, item.validityMonths)) {
          return;  // 過期 → 不加分
        }
      }
      const opt = item.options.find(o => o.id === sel);
      if (opt && opt.score > 0) {
        total += opt.score;
        const detail = joinDetail(data.itemDetails?.[item.id]);
        breakdown.push({ itemName: item.name, label: opt.label, score: opt.score, detail });
      }
    } else if (item.type === 'multi') {
      const arr = Array.isArray(sel) ? sel : [];
      arr.forEach(optId => {
        const opt = item.options.find(o => o.id === optId);
        if (opt && opt.score > 0) {
          total += opt.score;
          const detail = joinDetail(data.certDetails?.[optId]);
          breakdown.push({ itemName: item.name, label: opt.label, score: opt.score, detail });
        }
      });
    }
  });
  // Others 向下相容:若是舊資料(data.others 數字且沒走 listing-mode 路徑)也計入
  // 新 others item 已經在上面 forEach 的 listingMode 分支處理;這裡只處理「extraBonus 裡還留舊形狀」的情況
  // 判定:如果上面沒任何 breakdown 來自 Others,才讀 legacy data.others
  const hasOthersBreakdown = breakdown.some(b => b.itemName === 'Others 其他加分項' || b.itemName === 'Others');
  if (!hasOthersBreakdown) {
    const othersScore = Number(data.others) || 0;
    if (othersScore > 0) {
      total += othersScore;
      breakdown.push({ itemName: 'Others', label: data.othersNote || '(未填說明)', score: othersScore, detail: '' });
    }
  }
  // note 給 CSV 用,把細項也帶進去
  const noteStr = breakdown.map(b => {
    const det = b.detail ? ` [${b.detail}]` : '';
    return `${b.itemName}(${b.label})${det}: +${b.score}`;
  }).join('; ');
  return { score: Math.round(total * 10) / 10, breakdown, note: noteStr };
}

// 根據 trim / bonus 兩個布林,從 row 裡算出要顯示/排序的 avg
// row 預期至少有 { rawAvg, trimmedAvg, bonus } 三個欄位
// 回傳 null 表示該員工尚未有分數(或 base 為 null)
//
// 計分公式:
//   bonus 模式關 → 直接用 base(rawAvg 或 trimmedAvg)
//   bonus 模式開 → base × 0.9 + bonusScore × 0.1(加權平均,降低加分項影響力)
//                  注意:此公式會讓沒加分者的分數也降為 base × 0.9,
//                  但相對排名與「平均單項 < 4 不符資格」的判定都不受影響
//                  (judge base 走 computeJudgeBase,不被加權)
function computeScoreByMode(row, trim, bonus) {
  const base = trim ? row.trimmedAvg : row.rawAvg;
  if (base === null || base === undefined) return null;
  if (!bonus) return base;
  return base * 0.9 + (row.bonus || 0) * 0.1;
}

// 給「資格判斷」用的 base 平均(不含加分、不被加權,但會跟隨 trim 開關)
// 用此 base / dimensions.length 得「平均單項」,< 4 不符升遷資格
function computeJudgeBase(row, trim) {
  return trim ? row.trimmedAvg : row.rawAvg;
}

// 判斷員工屬於哪個部門類別 id(用最長關鍵字匹配,避免「軟體設計」誤判到「軟體應用設計」員工)
function getEmployeeCategory(emp) {
  if (!emp.dept || !state.deptCategories) return null;
  const sorted = [...state.deptCategories].sort((a, b) => b.keyword.length - a.keyword.length);
  for (const cat of sorted) {
    if (emp.dept.includes(cat.keyword)) return cat.id;
  }
  return null;
}

// 取得員工技術領域標籤(BIOS / EC / Driver)
function getEmployeeTech(emp) {
  const catId = getEmployeeCategory(emp);
  if (!catId) return '';
  const cat = state.deptCategories.find(c => c.id === catId);
  return cat ? (cat.tech || cat.name) : '';
}

// 把員工分成兩個技術組(BIOS/EC 合組、Driver 單組)供排名切換用
// 回傳 'bios_ec' | 'driver' | 'other'
function getEmployeeTechGroup(emp) {
  const tech = getEmployeeTech(emp);
  if (tech === 'BIOS' || tech === 'EC') return 'bios_ec';
  if (tech === 'Driver') return 'driver';
  return 'other';
}

// 技術組顯示名
const TECH_GROUP_LABELS = {
  bios_ec: 'BIOS + EC',
  driver: 'Driver (SA)',
  other: '其他',
};

// 顯示用部門名稱:把括號(主管名)拿掉
function displayDept(dept) {
  if (!dept) return '';
  return dept.replace(/[((][^))]*[))]/g, '').trim();
}

// 該員工是否屬於該主管的自己部門
function isOwnDept(emp, mgr) {
  if (!mgr.ownDeptKeyword || !emp.dept) return false;
  return emp.dept.includes('(' + mgr.ownDeptKeyword + ')');
}

// 該主管能否評分此員工
function canManagerReview(mgr, emp) {
  // 規則 1:不能評自己部門的人(避嫌)
  if (isOwnDept(emp, mgr)) return false;
  // 規則 2:canReview 留空陣列 = 可評所有人(扣掉自己部門後)
  if (!mgr.canReview || mgr.canReview.length === 0) return true;
  // 規則 3:技術領域必須在白名單內
  const empCat = getEmployeeCategory(emp);
  if (!empCat) return false;
  return mgr.canReview.includes(empCat);
}

// 該主管可以評分的員工
function eligibleEmployees(mgr) {
  return state.employees.filter(e => canManagerReview(mgr, e));
}

// 該員工會被哪些主管評分
function eligibleManagers(emp) {
  return state.managers.filter(m => canManagerReview(m, emp));
}

function getManagerScoreForEmployee(empId, mgrId) {
  return (state.scores[empId] && state.scores[empId][mgrId]) || {};
}

function computeManagerTotal(empId, mgrId) {
  const s = getManagerScoreForEmployee(empId, mgrId);
  let sum = 0, count = 0;
  state.dimensions.forEach(d => {
    if (typeof s[d.id] === 'number') { sum += s[d.id]; count++; }
  });
  return count === state.dimensions.length ? sum : null;  // null if incomplete
}

function computeEmployeeAverage(empId) {
  const empScores = getEmployeeScores(empId);
  const totals = [];
  Object.keys(empScores).forEach(mgrId => {
    const t = computeManagerTotal(empId, mgrId);
    if (t !== null) totals.push(t);
  });
  if (totals.length === 0) return { avg: null, count: 0 };
  const avg = totals.reduce((a,b) => a+b, 0) / totals.length;
  return { avg, count: totals.length };
}

// 按「每個維度個別」排除最高最低分,然後加總所有維度的調整後平均
// 啟動條件:該維度有效評分 ≥ 5 人(扣掉最高最低後仍有 3 人)
function computeEmployeeAverageTrimmed(empId) {
  const empScores = getEmployeeScores(empId);
  const mgrIdsWithComplete = Object.keys(empScores).filter(mgrId => {
    return computeManagerTotal(empId, mgrId) !== null;
  });
  if (mgrIdsWithComplete.length === 0) return { avg: null, count: 0, trimmedAny: false };

  let sumOfDimAvgs = 0;
  let trimmedAny = false;
  state.dimensions.forEach(d => {
    const vals = mgrIdsWithComplete
      .map(mgrId => empScores[mgrId][d.id])
      .filter(v => typeof v === 'number');
    let useVals = vals;
    if (vals.length >= 5) {
      const sorted = [...vals].sort((a, b) => a - b);
      useVals = sorted.slice(1, -1);  // 去頭去尾
      trimmedAny = true;
    }
    const dimAvg = useVals.reduce((a,b) => a+b, 0) / useVals.length;
    sumOfDimAvgs += dimAvg;
  });
  return { avg: sumOfDimAvgs, count: mgrIdsWithComplete.length, trimmedAny };
}

// 同上但回傳每維度的詳細資訊(供 detail 頁顯示)
function computeDimensionStats(empId) {
  const empScores = getEmployeeScores(empId);
  const mgrIdsWithComplete = Object.keys(empScores).filter(mgrId => {
    return computeManagerTotal(empId, mgrId) !== null;
  });
  const stats = {};
  state.dimensions.forEach(d => {
    const vals = mgrIdsWithComplete
      .map(mgrId => ({ mgrId, val: empScores[mgrId][d.id] }))
      .filter(x => typeof x.val === 'number');
    if (vals.length === 0) {
      stats[d.id] = { rawAvg: null, trimmedAvg: null, trimmed: false, excludedMgrs: [] };
      return;
    }
    const rawAvg = vals.reduce((a, x) => a + x.val, 0) / vals.length;
    let trimmedAvg = rawAvg;
    let trimmed = false;
    let excludedMgrs = [];
    if (vals.length >= 5) {
      const sorted = [...vals].sort((a, b) => a.val - b.val);
      const lowest = sorted[0];
      const highest = sorted[sorted.length - 1];
      excludedMgrs = [lowest.mgrId, highest.mgrId];
      const remaining = sorted.slice(1, -1);
      trimmedAvg = remaining.reduce((a, x) => a + x.val, 0) / remaining.length;
      trimmed = true;
    }
    stats[d.id] = { rawAvg, trimmedAvg, trimmed, excludedMgrs };
  });
  return stats;
}

    html = renderHeader('主管登入', mgr.name + ' / 請輸入密碼') + renderManagerLoginPassword();

          ${sub.status === 'submitted' ? '<span class="form-status form-status-submitted">已提交 · 待審核</span>' : ''}
          ${sub.status === 'reviewed' ? '<span class="form-status form-status-reviewed">已審核完成</span>' : ''}
          ${sub.submittedAt ? `<div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-muted);margin-top:6px;">提交於 ${new Date(sub.submittedAt).toLocaleString('zh-TW')}</div>` : ''}
        </div>
      </div>

      <div style="background:var(--bg);padding:14px 18px;margin-bottom:24px;border-left:3px solid ${isReviewed ? 'var(--green)' : (isLocked ? 'var(--gold)' : 'var(--accent)')};">
        ${sub.status === 'draft' ? `
          <div style="font-size:13px;line-height:1.7;color:var(--ink-soft);">
            請填寫您於本 Band 期間達成的 Extra Contribution 項目,並附上具體說明作為佐證。<br>
            <span style="color:var(--ink-muted);font-size:12px;">填完後可隨時「儲存草稿」(後續可繼續修改);確認無誤後按「提交」送交審核。一旦提交將無法自行修改,需請管理者退回。</span>
          </div>
        ` : ''}
        ${sub.status === 'submitted' ? `
          <div style="font-size:13px;line-height:1.7;color:var(--ink-soft);">
            您的申請已提交,目前等待管理者審核。<br>
            <span style="color:var(--ink-muted);font-size:12px;">如需修改,請聯繫管理者退回您的申請。</span>
          </div>
        ` : ''}
        ${sub.status === 'reviewed' ? `
          <div style="font-size:13px;line-height:1.7;color:var(--ink-soft);">
            您的申請已完成審核。下方顯示每項申請的審核結果。<br>
            <span style="color:var(--ink-muted);font-size:12px;">實際加分 = 被「接受」或「調整」的項目分數總和。</span>
          </div>
        ` : ''}
      </div>

      <div class="band-since-field">
        <label>當前 Band 起始年月</label>
        <input type="month" class="emp-band-since" value="${escapeHtml(bandSince)}" ${isLocked ? 'disabled' : ''} placeholder="YYYY-MM">
        <div class="hint">
          ${bandSince
            ? '此日期作為各加分項目「是否在本 Band 期間」的驗證基準。Certification 類型不受此限,以發生月份起兩年內為準。'
            : '<span class="err">※ 請先填寫此欄位才能提交,且各加分項目的發生年月需 ≥ 此日期。</span>'}
        </div>
      </div>

      <div class="form-summary">
        <div class="form-summary-item">
          <div class="label">申請總分</div>
          <div class="value" data-applied-total>${appliedTotal.toFixed(1)}</div>
        </div>
        ${isReviewed ? `
          <div class="form-summary-item">
            <div class="label">審核後實際加分</div>
            <div class="value" style="color:var(--green);">+${actualBonus}</div>
          </div>
        ` : ''}
      </div>

      <div class="form-items">
        ${EXTRA_CONTRIBUTION_ITEMS.map(item => {
          const sel = data.items?.[item.id];
          if (item.type === 'single') {
            const detailArr = normalizeDetail(data.itemDetails?.[item.id]);
            // Bug 1: 只有當明確選了 'none' 才 disable;未選擇時保持可編輯,讓使用者可先填名稱再挑等級
            const isDisabledByNone = sel === 'none';
            const review = sub.reviewedItems?.[item.id];
            return `
              <div class="form-item-row ${isReviewed ? renderItemReviewClass(review) : ''}">
                <div class="form-item-name">
                  ${escapeHtml(item.name)}
                  ${isReviewed ? renderItemReviewBadge(review, item, sel) : ''}
                </div>
                <div class="form-item-control">
                  ${item.id === 'ipp' ? (() => {
                    const noneFlag = !!data.itemNoneFlags?.ipp;
                    const summary = summarizeIpp(detailArr, bandSince);
                    let levelText;
                    if (noneFlag) levelText = '本項無可列舉';
                    else if (summary.totalCount === 0) levelText = '尚未填寫';
                    else if (summary.levelLabel) levelText = summary.levelLabel;
                    else levelText = '無 (期間內權重不足 0.1)';
                    return `
                      <div class="ipp-auto-summary" data-ipp-summary>
                        <span class="ipp-auto-label">自動判定</span>
                        <span class="ipp-auto-level" data-ipp-level>${escapeHtml(levelText)}</span>
                        <span class="ipp-auto-score" data-ipp-score>${noneFlag ? '不加分' : (summary.levelScore > 0 ? '+' + summary.levelScore + ' 分' : '不加分')}</span>
                        <span class="ipp-auto-stats" data-ipp-stats>
                          ${noneFlag ? '員工已確認本項無可加分' : `期間內 ${summary.inCount} 筆(權重 ${summary.inWeight}) · 期間外 ${summary.outCount} 筆(權重 ${summary.outWeight}) · 總 ${summary.totalCount} 筆`}
                        </span>
                      </div>
                      <label style="display:inline-flex;align-items:center;gap:6px;margin-top:8px;font-size:12px;color:var(--ink-soft);cursor:${isLocked ? 'not-allowed' : 'pointer'};">
                        <input type="checkbox" class="emp-listed-none" data-item="ipp" ${noneFlag ? 'checked' : ''} ${isLocked ? 'disabled' : ''}>
                        <span>本項無可列舉</span>
                      </label>
                      <div style="font-size:11px;color:var(--ink-muted);margin-top:6px;line-height:1.5;">
                        💡 每列「掛名人數」填本筆 IPP 共幾人共掛(獨自 = 1、2 人共掛 = 2、13 人 = 13)。主管會逐筆審核,接受的列權重加總對應等級計分。<br>
                        <span style="color:var(--accent);">📧 請將對應的 IPP 證明圖檔 mail 寄給 doris.shih@lcfuturecenter.com 以供核實。</span>
                      </div>
                    `;
                  })() : item.id === 'travel' ? (() => {
                    const travelDetails = normalizeTravelDetail(data.itemDetails?.travel);
                    const cp = state.covidPeriod || {};
                    const summary = summarizeTravel(travelDetails, bandSince, cp);
                    let levelText;
                    if (summary.totalCount === 0) levelText = '尚未填寫';
                    else if (summary.levelLabel) levelText = summary.levelLabel;
                    else levelText = `不足 30 天 (合計 ${summary.eligibleDays} 天)`;
                    const covidRangeText = (cp.startYYYYMM && cp.endYYYYMM)
                      ? `目前疫情期間設定:<b>${escapeHtml(cp.startYYYYMM)} ~ ${escapeHtml(cp.endYYYYMM)}</b>`
                      : '<span style="color:var(--accent);">⚠ 管理員尚未設定疫情期間,Travel 將無法計入加分。請聯繫管理員。</span>';
                    return `
                      <div class="ipp-auto-summary" data-travel-summary>
                        <span class="ipp-auto-label">自動判定</span>
                        <span class="ipp-auto-level" data-travel-level>${escapeHtml(levelText)}</span>
                        <span class="ipp-auto-score" data-travel-score>${summary.levelScore > 0 ? '+' + summary.levelScore + ' 分' : '不加分'}</span>
                        <span class="ipp-auto-stats" data-travel-stats>
                          計入 ${summary.eligibleCount} 段(${summary.eligibleDays} 天) ·
                          不計入 ${summary.ineligibleCount} 段(${summary.ineligibleDays} 天) ·
                          總 ${summary.totalCount} 段
                        </span>
                      </div>
                      <div style="font-size:11px;color:var(--ink-muted);margin-top:6px;line-height:1.5;">
                        💡 ${covidRangeText}<br>
                        每段出差填「出發日 + 回台日」,系統自動計算總天數(含頭含尾含週末)。<br>
                        加分門檻:合計 30-59 天 +1、60-89 天 +2、90-119 天 +3、120-149 天 +4、150-179 天 +5、≥180 天 +6;<b>不足 30 天不加分</b>。
                      </div>
                    `;
                  })() : item.listingMode ? (() => {
                    const noneFlag = !!data.itemNoneFlags?.[item.id];
                    const listedArr = migrateListedDetails(item, sub, data);
                    const summary = summarizeListedItem(item, listedArr, { preview: true, bandSince });
                    const levelText = noneFlag
                      ? '本項無可列舉'
                      : (summary.totalCount === 0 ? '尚未列舉' : summary.totalCount + ' 筆已列');
                    const scoreText = noneFlag
                      ? '不加分'
                      : (item.reviewerScoring && summary.totalCount > 0 && summary.ineligibleCount < summary.totalCount
                          ? '待主管填分'
                          : (summary.totalScore > 0 ? '預估 +' + summary.totalScore + ' 分' : '不加分'));
                    return `
                      <div class="ipp-auto-summary" data-listed-summary data-listed-item="${item.id}">
                        <span class="ipp-auto-label">自動計算</span>
                        <span class="ipp-auto-level" data-listed-level>${escapeHtml(levelText)}</span>
                        <span class="ipp-auto-score" data-listed-score>${scoreText}</span>
                        <span class="ipp-auto-stats" data-listed-stats>
                          ${noneFlag
                            ? '員工已確認本項無可加分'
                            : (summary.totalCount === 0
                                ? `請列舉每個 ${item.name} 項目,或勾選下方「本項無可列舉」`
                                : (summary.ineligibleCount > 0
                                    ? (() => {
                                        const parts = [];
                                        if (summary.futureCount > 0) parts.push(`${summary.futureCount} 筆未來日期`);
                                        if (summary.earlyCount > 0) parts.push(`${summary.earlyCount} 筆早於 Band 起始`);
                                        return `<span style="color:var(--accent);">⚠ ${parts.join('、')},不會計入</span>`;
                                      })()
                                    : (item.reviewerScoring
                                        ? '主管審核時會逐筆決定是否接受並填入分數'
                                        : '主管審核後實際採用「接受」筆數的等級分數加總')))}
                        </span>
                      </div>
                      <label style="display:inline-flex;align-items:center;gap:6px;margin-top:8px;font-size:12px;color:var(--ink-soft);cursor:${isLocked ? 'not-allowed' : 'pointer'};">
                        <input type="checkbox" class="emp-listed-none" data-item="${item.id}" ${noneFlag ? 'checked' : ''} ${isLocked ? 'disabled' : ''}>
                        <span>本項無可列舉</span>
                      </label>
                      <div style="font-size:11px;color:var(--ink-muted);margin-top:6px;line-height:1.5;">
                        ${item.levelCaps ? (() => {
                          const rules = [];
                          Object.keys(item.levelCaps).forEach(lvl => {
                            const opt = item.options.find(o => o.id === lvl);
                            const isUnnamed = (opt?.id === 'listed');  // countListingMode 的 label 是 "(已列舉)"
                            const lvlName = isUnnamed ? '筆' : (opt?.label || lvl);
                            const caps = item.levelCaps[lvl].slice().sort((a,b)=>a.count-b.count);
                            const parts = caps.map((c, i) => {
                              const next = caps[i+1];
                              if (isUnnamed) {
                                if (next) return `${c.count} 筆 = +${c.score}`;
                                return `≥${c.count} 筆 封頂 +${c.score}`;
                              }
                              if (next) return `${c.count} 個 ${lvlName} = +${c.score}`;
                              return `≥${c.count} 個 ${lvlName} 封頂 +${c.score}`;
                            });
                            rules.push(parts.join('、'));
                          });
                          const uncappedLevels = item.options.filter(o => !item.levelCaps[o.id]);
                          const uncapped = uncappedLevels.map(o => `每個 ${o.label} +${o.score}`).join('、');
                          return `💡 計分規則:${rules.join(';')}${uncapped ? ';' + uncapped : ''}。`;
                        })() : ''}
                        ${item.needsAttachmentHint ? `<br><span style="color:var(--accent);">📧 請拍攝證照證明圖檔 mail 寄給 doris.shih@lcfuturecenter.com。</span>` : ''}
                      </div>
                    `;
                  })() : item.scoreInputMode ? (() => {
                    const curLevel = resolveSingleItemLevel(item.id, data);
                    const curStored = data.itemDetails?.[item.id];
                    const curScoreVal = (curStored && curStored[0] && curStored[0].score) || '';
                    const curTestDate = (curStored && curStored[0] && curStored[0].occurredAt) || '';
                    const curOpt = item.options.find(o => o.id === curLevel);
                    const curLabel = curOpt ? curOpt.label : '';
                    const curBonus = curOpt ? curOpt.score : 0;
                    // 檢查是否過期(TOEIC 有 validityMonths,從考試年月起算)
                    const expired = item.validityMonths && curTestDate
                      ? isScoreExpired(curTestDate, item.validityMonths)
                      : false;
                    const isFuture = isFutureYearMonth(curTestDate);
                    const effectiveBonus = (expired || isFuture) ? 0 : curBonus;
                    const effectiveLabel = isFuture
                      ? '考試日期不可為未來 · 不加分'
                      : (expired ? '已過期 · 不加分' : (curLabel || '未考 / 不加分'));
                    return `
                      <div class="ipp-auto-summary" data-score-input-summary data-score-item="${item.id}">
                        <span class="ipp-auto-label">分數</span>
                        <input type="number" class="emp-score-input" data-score-item="${item.id}" value="${escapeHtml(String(curScoreVal))}" min="0" max="990" step="1" placeholder="未考請留空" style="width:120px;background:var(--bg);border:1px solid var(--line-soft);padding:6px 10px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--ink);" ${isLocked ? 'disabled' : ''}>
                        <span class="ipp-auto-label" style="margin-left:10px;">考試年月</span>
                        <input type="month" class="emp-score-testdate" data-score-item="${item.id}" value="${escapeHtml(curTestDate)}" style="width:130px;background:var(--bg);border:1px solid var(--line-soft);padding:6px 10px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--ink);" ${isLocked ? 'disabled' : ''}>
                        <span class="ipp-auto-level" data-score-level>${escapeHtml(effectiveLabel)}</span>
                        <span class="ipp-auto-score" data-score-bonus>${effectiveBonus > 0 ? '+' + effectiveBonus + ' 分' : '不加分'}</span>
                      </div>
                      <div style="font-size:11px;color:var(--ink-muted);margin-top:6px;line-height:1.5;">
                        💡 計分規則:860-990 = +5、730-855 = +3、470-725 = +1、< 470 不加分。
                        ${item.validityMonths ? `<br><span style="color:var(--accent);">⚠ 有效期 ${Math.floor(item.validityMonths / 12)} 年,考試日期超過即不計入。</span>` : ''}
                        ${item.needsAttachmentHint ? `<br><span style="color:var(--accent);">📧 請拍攝證照證明圖檔 mail 寄給 doris.shih@lcfuturecenter.com。</span>` : ''}
                      </div>
                    `;
                  })() : `
                    <select class="emp-select" data-item="${item.id}" ${isLocked ? 'disabled' : ''}>
                      <option value="" ${!sel ? 'selected' : ''}>-- 請選擇 --</option>
                      ${item.options.map(o => `
                        <option value="${o.id}" ${sel === o.id ? 'selected' : ''}>${escapeHtml(o.label)}</option>
                      `).join('')}
                    </select>
                    ${item.id === 'jlpt' ? `<div style="font-size:11px;color:var(--ink-muted);margin-top:6px;line-height:1.5;">💡 N1 = +5 分、N2 = +3 分;N3/N4/N5 不加分。日文證照永久有效。</div>` : ''}
                    ${item.needsAttachmentHint ? `<div style="font-size:11px;color:var(--accent);margin-top:6px;">📧 請拍攝證照證明圖檔 mail 寄給 doris.shih@lcfuturecenter.com。</div>` : ''}
                  `}
                  ${item.id === 'travel'
                    ? renderTravelDetailInputs(
                        normalizeTravelDetail(data.itemDetails?.travel),
                        isLocked,
                        bandSince,
                        state.covidPeriod || {}
                      )
                    : item.scoreInputMode
                    ? ''
                    : item.id === 'jlpt'
                    ? ''
                    : renderDetailMultiInputs(
                        'emp-detail',
                        `data-detail-item="${item.id}"`,
                        item.listingMode ? migrateListedDetails(item, sub, data) : detailArr,
                        detailHints[item.id] || '具體項目 / 紀錄',
                        (item.id === 'ipp' || item.listingMode ? false : isDisabledByNone) || isLocked,
                        item.id,
                        bandSince,
                        item.listingMode && !item.countListingMode && !item.ippMode ? item.options : null
                      )
                  }
                </div>
              </div>
            `;
          } else {
            const arr = Array.isArray(sel) ? sel : [];
            return `
              <div class="form-item-row">
                <div class="form-item-name">
                  ${escapeHtml(item.name)}
                </div>
                <div class="form-item-control">
                  <div class="bonus-multi-list">
                    ${item.options.map(o => {
                      const checked = arr.includes(o.id);
                      const certDetailArr = normalizeDetail(data.certDetails?.[o.id]);
                      const certReview = sub.reviewedCertItems?.[o.id];
                      return `
                        <div class="bonus-multi-row ${isReviewed && checked ? renderItemReviewClass(certReview) : ''}">
                          <label class="bonus-check">
                            <input type="checkbox" class="emp-multi" data-item="${item.id}" value="${o.id}" ${checked ? 'checked' : ''} ${isLocked ? 'disabled' : ''}>
                            <span>${escapeHtml(o.label)} <span style="color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:11px;">+${o.score}</span></span>
                            ${isReviewed && checked ? renderItemReviewBadge(certReview, null, null) : ''}
                          </label>
                          ${renderDetailMultiInputs(
                            'emp-cert-detail',
                            `data-cert-opt="${o.id}"`,
                            certDetailArr,
                            certHints[o.id] || '證照詳細資料',
                            !checked || isLocked,
                            item.id,
                            bandSince
                          )}
                        </div>
                      `;
                    }).join('')}
                  </div>
                </div>
              </div>
            `;
          }
        }).join('')}
      </div>

      ${!isLocked ? `
        <div class="form-actions">
          <button class="btn secondary" data-action="emp-save-draft">儲存草稿</button>
          <button class="btn" data-action="emp-submit" ${!bandSince ? 'disabled title="請先填寫「當前 Band 起始年月」"' : ''}>提交審核</button>
        </div>
        ${!bandSince ? '<div style="font-size:12px;color:var(--accent);margin-top:8px;text-align:right;">⚠ 請先於最上方填寫「當前 Band 起始年月」才能提交</div>' : ''}
      ` : ''}
    </div>
  `;
}

function renderItemReviewClass(review) {
  if (review === 'accepted') return 'review-accepted';
  if (review === 'rejected') return 'review-rejected';
  if (review && typeof review === 'object' && review.adjustedTo) return 'review-adjusted';
  return 'review-pending';
}

function renderItemReviewBadge(review, item, originalSel) {
  if (review === 'accepted') return '<span class="review-badge review-badge-accepted">✓ 已接受</span>';
  if (review === 'rejected') return '<span class="review-badge review-badge-rejected">✗ 已拒絕</span>';
  if (review && typeof review === 'object' && review.adjustedTo && item) {
    const adjOpt = item.options.find(o => o.id === review.adjustedTo);
    return `<span class="review-badge review-badge-adjusted">↔ 已調整為 ${adjOpt ? escapeHtml(adjOpt.label) : ''}</span>`;
  }
  return '<span class="review-badge review-badge-pending">⋯ 待審</span>';
}

// 主管打分頁參考用的「員工自填加分一覽」— 顯示員工填了什麼、目前狀態,
// 但**不顯示預計分數**(避免主管的維度評分被加分數字干擾)
function renderEmpBonusForReviewer(emp) {
  const sub = getEmployeeSubmission(emp.id);
  const status = sub.status;  // 'draft' | 'submitted' | 'reviewed' (預設值)
  const data = sub.data || {};

  // 沒有任何提交資料 — 員工根本還沒進過自填連結
  // 注意:IPP / Travel / listing-mode 項目可能 items.X 沒設但 itemDetails.X 有資料,也要算「有」
  const hasItems = (data.items && Object.keys(data.items).length > 0)
                 || (data.itemDetails?.ipp && data.itemDetails.ipp.length > 0)
                 || (data.itemDetails?.travel && data.itemDetails.travel.length > 0)
                 || EXTRA_CONTRIBUTION_ITEMS.some(it => it.listingMode && data.itemDetails?.[it.id]?.length > 0)
                 || EXTRA_CONTRIBUTION_ITEMS.some(it => it.listingMode && data.itemNoneFlags?.[it.id] === true);
  const hasOthers = (data.others || 0) > 0 || (data.othersNote || '').trim();
  const isEmpty = !hasItems && !hasOthers;

  // 狀態 badge 樣式
  let badgeBg, badgeColor, badgeText;
  if (isEmpty) {
    badgeBg = 'transparent'; badgeColor = 'var(--ink-muted)'; badgeText = '— 員工尚未填寫';
  } else if (status === 'draft') {
    badgeBg = 'rgba(176,141,58,0.15)'; badgeColor = 'var(--gold)'; badgeText = '草稿 · 員工編輯中';
  } else if (status === 'submitted') {
    badgeBg = 'rgba(139,46,31,0.12)'; badgeColor = 'var(--accent)'; badgeText = '已提交 · 待管理者審核';
  } else if (status === 'reviewed') {
    badgeBg = 'rgba(74,107,58,0.15)'; badgeColor = 'var(--green)'; badgeText = '已完成審核';
  } else {
    badgeBg = 'transparent'; badgeColor = 'var(--ink-muted)'; badgeText = '— 狀態未知';
  }

  // 每筆顯示用 helper:把 review 狀態翻成小 tag
  const reviewTag = (review, item) => {
    if (review === 'accepted') return '<span style="color:var(--green);font-family:\'JetBrains Mono\',monospace;font-size:10px;letter-spacing:0.06em;margin-left:6px;">✓ 接受</span>';
    if (review === 'rejected') return '<span style="color:var(--accent);font-family:\'JetBrains Mono\',monospace;font-size:10px;letter-spacing:0.06em;margin-left:6px;">✗ 拒絕</span>';
    if (review && typeof review === 'object' && review.adjustedTo && item) {
      const adj = item.options.find(o => o.id === review.adjustedTo);
      return `<span style="color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.06em;margin-left:6px;">↔ 已調整為 ${escapeHtml(adj ? adj.label : '')}</span>`;
    }
    if (status === 'submitted' || status === 'reviewed') {
      return '<span style="color:var(--ink-muted);font-family:\'JetBrains Mono\',monospace;font-size:10px;letter-spacing:0.06em;margin-left:6px;">⋯ 待審</span>';
    }
    return '';
  };

  // 把選了的項目整理出來
  const lines = [];
  if (hasItems) {
    EXTRA_CONTRIBUTION_ITEMS.forEach(item => {
      const sel = data.items[item.id];
      // === Listing-mode 特例:每筆細項各自有等級 + 審核狀態 ===
      if (item.listingMode) {
        const noneFlag = !!data.itemNoneFlags?.[item.id];
        const detailArr = migrateListedDetails(item, sub, data);
        // 員工勾了「本項無可列舉」→ 顯示一筆資訊列
        if (noneFlag && detailArr.length === 0) {
          lines.push(`
            <div style="padding:10px 0;border-bottom:1px solid var(--line-soft);">
              <div style="font-size:13px;color:var(--ink);">
                <b>${escapeHtml(item.name)}</b>
                <span style="color:var(--ink-soft);margin-left:6px;">— 員工已確認本項無可加分</span>
                <span style="color:var(--ink-muted);font-family:'JetBrains Mono',monospace;font-size:10px;margin-left:8px;">不加分</span>
              </div>
            </div>
          `);
          return;
        }
        if (detailArr.length === 0) return;
        const summary = summarizeListedItem(item, detailArr, { bandSince: emp.bandSinceYYYYMM });
        const rowsHtml = detailArr.map(d => {
          const opt = item.options.find(o => o.id === d.level);
          const optLabel = item.countListingMode ? '' : (opt ? opt.label : '(未設等級)');
          const dec = d.reviewDecision || 'pending';
          let decBadge;
          if (dec === 'accepted') decBadge = '<span style="color:var(--green);font-family:\'JetBrains Mono\',monospace;font-size:10px;letter-spacing:0.06em;">✓ 已接受</span>';
          else if (dec === 'rejected') decBadge = '<span style="color:var(--accent);font-family:\'JetBrains Mono\',monospace;font-size:10px;letter-spacing:0.06em;">✗ 已拒</span>';
          else decBadge = '<span style="color:var(--ink-muted);font-family:\'JetBrains Mono\',monospace;font-size:10px;letter-spacing:0.06em;">⋯ 待審</span>';
          return `<div style="font-size:11px;color:var(--ink-soft);padding-left:14px;margin-top:2px;">
            • ${escapeHtml(d.name)}
            <span style="color:var(--ink-muted);font-family:'JetBrains Mono',monospace;">${escapeHtml(optLabel)}${d.occurredAt ? ' · ' + escapeHtml(d.occurredAt) : ''}</span>
            <span style="margin-left:6px;">${decBadge}</span>
          </div>`;
        }).join('');
        // reviewer 不看分數,只看接受 / 拒絕 / 待審狀態
        lines.push(`
          <div style="padding:10px 0;border-bottom:1px solid var(--line-soft);">
            <div style="font-size:13px;color:var(--ink);">
              <b>${escapeHtml(item.name)}</b>
              <span style="color:var(--ink-soft);margin-left:6px;">— 列舉 ${detailArr.length} 筆</span>
              <span style="color:var(--ink-muted);font-family:'JetBrains Mono',monospace;font-size:10px;margin-left:8px;">
                ${summary.acceptedCount > 0 ? `已接受 ${summary.acceptedCount}` : ''}${summary.acceptedCount > 0 && summary.pendingCount > 0 ? ' · ' : ''}${summary.pendingCount > 0 ? `待審 ${summary.pendingCount}` : ''}${(summary.acceptedCount + summary.pendingCount > 0) && summary.rejectedCount > 0 ? ' · ' : ''}${summary.rejectedCount > 0 ? `已拒 ${summary.rejectedCount}` : ''}
              </span>
            </div>
            ${rowsHtml}
          </div>
        `);
        return;
      }
      // === IPP 特例:即使 items.ipp 沒設(權重 < 0.1)也要顯示細項供主管參考 ===
      if (item.id === 'ipp') {
        const detailArr = normalizeDetail(data.itemDetails?.ipp);
        if (detailArr.length === 0) return;  // 真的完全沒填 IPP 才跳過
        const summary = summarizeIpp(detailArr, emp.bandSinceYYYYMM, { onlyAccepted: true });
        const review = sub.reviewedItems?.ipp;
        // 每筆細項列 + 期間 tag
        const rowsHtml = detailArr.map(d => {
          const inBand = isIppInBandPeriod(d.occurredAt, emp.bandSinceYYYYMM);
          const tagColor = inBand ? 'var(--green)' : 'var(--gold)';
          const tagText = inBand ? '✓ 期間內' : 'ⓘ 期間外';
          const w = d.weight ? formatIppWeightDisplay(d.weight) : '未填掛名人數';
          return `<div style="font-size:11px;color:var(--ink-soft);padding-left:14px;margin-top:2px;">
            • ${escapeHtml(d.name)}
            ${d.occurredAt ? `<span style="color:var(--ink-muted);font-family:'JetBrains Mono',monospace;">(${escapeHtml(d.occurredAt)})</span>` : ''}
            <span style="color:var(--ink-muted);font-family:'JetBrains Mono',monospace;font-size:10px;">· ${w}</span>
            <span style="color:${tagColor};font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.06em;margin-left:4px;">${tagText}</span>
          </div>`;
        }).join('');
        // 顯示 IPP 自動判定 label(不顯示分數!)
        const levelTextForReviewer = summary.totalCount === 0
          ? '無'
          : (summary.levelLabel || '無 (期間內權重不足 0.1)');
        lines.push(`
          <div style="padding:10px 0;border-bottom:1px solid var(--line-soft);">
            <div style="font-size:13px;color:var(--ink);">
              <b>${escapeHtml(item.name)}</b>
              <span style="color:var(--ink-soft);margin-left:6px;">— 自動判定:${escapeHtml(levelTextForReviewer)}</span>
              ${reviewTag(review, item)}
            </div>
            <div style="font-size:11px;color:var(--ink-muted);padding-left:14px;margin-top:3px;font-family:'JetBrains Mono',monospace;letter-spacing:0.04em;">
              期間內 ${summary.inCount} 筆(權重 ${summary.inWeight}) · 期間外 ${summary.outCount} 筆(權重 ${summary.outWeight}) · 總 ${summary.totalCount} 筆
            </div>
            ${rowsHtml}
          </div>
        `);
        return;
      }
      // === Travel 特例:類似 IPP,顯示每段 + 期間 tag,但不顯示分數 ===
      if (item.id === 'travel') {
        const travelArr = normalizeTravelDetail(data.itemDetails?.travel);
        if (travelArr.length === 0) return;
        const cp = state.covidPeriod || {};
        const summary = summarizeTravel(travelArr, emp.bandSinceYYYYMM, cp);
        const review = sub.reviewedItems?.travel;
        const rowsHtml = travelArr.map(d => {
          const days = calcTravelDays(d.startDate, d.endDate);
          const eligible = days > 0 && isTravelEligible(d.startDate, d.endDate, emp.bandSinceYYYYMM, cp);
          const tagColor = eligible ? 'var(--green)' : 'var(--gold)';
          const tagText = eligible ? `✓ 計入(${days} 天)` : (days > 0 ? `ⓘ 不計入(${days} 天)` : '⚠ 日期不全');
          const dateStr = (d.startDate && d.endDate) ? `${d.startDate} → ${d.endDate}` : '日期未填齊';
          return `<div style="font-size:11px;color:var(--ink-soft);padding-left:14px;margin-top:2px;">
            • ${escapeHtml(d.name || '(未命名段)')}
            <span style="color:var(--ink-muted);font-family:'JetBrains Mono',monospace;">${escapeHtml(dateStr)}</span>
            <span style="color:${tagColor};font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.06em;margin-left:4px;">${tagText}</span>
          </div>`;
        }).join('');
        const levelTextForReviewer = summary.totalCount === 0
          ? '無'
          : (summary.levelLabel || `無 (合計 ${summary.eligibleDays} 天 < 30)`);
        lines.push(`
          <div style="padding:10px 0;border-bottom:1px solid var(--line-soft);">
            <div style="font-size:13px;color:var(--ink);">
              <b>${escapeHtml(item.name)}</b>
              <span style="color:var(--ink-soft);margin-left:6px;">— 自動判定:${escapeHtml(levelTextForReviewer)}</span>
              ${reviewTag(review, item)}
            </div>
            <div style="font-size:11px;color:var(--ink-muted);padding-left:14px;margin-top:3px;font-family:'JetBrains Mono',monospace;letter-spacing:0.04em;">
              計入 ${summary.eligibleCount} 段(${summary.eligibleDays} 天) · 不計入 ${summary.ineligibleCount} 段(${summary.ineligibleDays} 天) · 總 ${summary.totalCount} 段
            </div>
            ${rowsHtml}
          </div>
        `);
        return;
      }
      // === 一般 single 項目 ===
      if (item.type === 'single') {
        if (!sel || sel === 'none') return;
        const opt = item.options.find(o => o.id === sel);
        if (!opt) return;
        const review = sub.reviewedItems?.[item.id];
        const detailArr = normalizeDetail(data.itemDetails?.[item.id]);
        const detailHtml = detailArr.length > 0
          ? detailArr.map(d => `<div style="font-size:11px;color:var(--ink-soft);padding-left:14px;margin-top:2px;">• ${escapeHtml(d.name)}${d.occurredAt ? ` <span style="color:var(--ink-muted);font-family:'JetBrains Mono',monospace;">(${escapeHtml(d.occurredAt)})</span>` : ''}</div>`).join('')
          : '<div style="font-size:11px;color:var(--ink-muted);padding-left:14px;margin-top:2px;font-style:italic;">(未填具體說明)</div>';
        lines.push(`
          <div style="padding:10px 0;border-bottom:1px solid var(--line-soft);">
            <div style="font-size:13px;color:var(--ink);">
              <b>${escapeHtml(item.name)}</b>
              <span style="color:var(--ink-soft);margin-left:6px;">— ${escapeHtml(opt.label)}</span>
              ${reviewTag(review, item)}
            </div>
            ${detailHtml}
          </div>
        `);
      } else {
        // multi (cert)
        const arr = Array.isArray(sel) ? sel : [];
        if (arr.length === 0) return;
        const certHtml = arr.map(optId => {
          const opt = item.options.find(o => o.id === optId);
          if (!opt) return '';
          const review = sub.reviewedCertItems?.[optId];
          const detailArr = normalizeDetail(data.certDetails?.[optId]);
          const detailLine = detailArr.length > 0
            ? detailArr.map(d => `${escapeHtml(d.name)}${d.occurredAt ? ` (${escapeHtml(d.occurredAt)})` : ''}`).join(' / ')
            : '(未填具體說明)';
          return `
            <div style="font-size:12px;color:var(--ink-soft);padding-left:14px;margin-top:3px;">
              • <b>${escapeHtml(opt.label)}</b>
              <span style="color:var(--ink-muted);">— ${escapeHtml(detailLine)}</span>
              ${reviewTag(review, null)}
            </div>
          `;
        }).join('');
        lines.push(`
          <div style="padding:10px 0;border-bottom:1px solid var(--line-soft);">
            <div style="font-size:13px;color:var(--ink);"><b>${escapeHtml(item.name)}</b> <span style="color:var(--ink-muted);">(${arr.length} 項)</span></div>
            ${certHtml}
          </div>
        `);
      }
    });
  }
  // Others
  if (hasOthers) {
    const review = sub.reviewedItems?.others;
    const note = (data.othersNote || '').trim() || '(未填說明)';
    lines.push(`
      <div style="padding:10px 0;border-bottom:1px solid var(--line-soft);">
        <div style="font-size:13px;color:var(--ink);">
          <b>Others</b>
          <span style="color:var(--ink-soft);margin-left:6px;">— 其他特殊貢獻</span>
          ${reviewTag(review, null)}
        </div>
        <div style="font-size:11px;color:var(--ink-soft);padding-left:14px;margin-top:2px;">• ${escapeHtml(note)}</div>
      </div>
    `);
  }

  return `
    <div style="background:var(--bg);border:1px solid var(--line-soft);padding:16px 20px;margin-bottom:24px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:${isEmpty ? '0' : '8px'};flex-wrap:wrap;gap:8px;">
        <div style="font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.16em;color:var(--ink-muted);">
          員工自填 · Extra Contribution
        </div>
        <div style="display:inline-flex;align-items:center;padding:3px 10px;background:${badgeBg};color:${badgeColor};font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.08em;">
          ${badgeText}
        </div>
      </div>
      ${isEmpty
        ? '<div style="font-size:11px;color:var(--ink-muted);font-style:italic;">員工未透過自填連結提交任何加分項目,或管理者尚未發出連結。</div>'
        : `
          <div style="font-size:10px;color:var(--ink-muted);font-family:'JetBrains Mono',monospace;letter-spacing:0.06em;margin-bottom:4px;">
            ※ 此處不顯示預計加分,僅作為您評分時的參考
          </div>
          ${lines.join('')}
        `}
    </div>
  `;
}

function renderManagerScoring() {
  const mgrId = view.payload.managerId;
  const selectedEmpId = view.payload.employeeId || null;

  if (!selectedEmpId) {
    const mgr = state.managers.find(m => m.id === mgrId);
    const eligible = eligibleEmployees(mgr);
    const excludedCount = state.employees.length - eligible.length;

    // group employees by current band (descending)
    const groups = {};
    eligible.forEach(e => {
      const band = e.currentBand ?? '未設定';
      if (!groups[band]) groups[band] = [];
      groups[band].push(e);
    });
    const sortedBands = Object.keys(groups).sort((a, b) => {
      if (a === '未設定') return 1;
      if (b === '未設定') return -1;
      return Number(b) - Number(a);
    });

    return `
      <div class="section-header">
        <h3>選擇要評核的部屬</h3>
        <div class="meta">
          ${eligible.length} 位可評核 · 同職等者一同評比 · 您的評分僅您與管理者可見
          ${excludedCount > 0 ? `<br><span style="color:var(--accent);">⚠ 已自動排除 ${excludedCount} 位非可評範圍內的員工</span>` : ''}
        </div>
      </div>
      ${eligible.length === 0 ? '<div class="empty">沒有可評核的員工</div>' : sortedBands.map(band => {
        const emps = groups[band];
        const targetBand = band !== '未設定' ? Number(band) + 1 : '—';
        const scoredCount = emps.filter(e => computeManagerTotal(e.id, mgrId) !== null).length;
        return `
          <div class="band-group">
            <div class="band-header">
              <div class="band-title">
                <span class="band-from">Band ${band}</span>
                <span class="band-arrow">→</span>
                <span class="band-to">Band ${targetBand}</span>
              </div>
              <div class="band-meta">${emps.length} 位 · 已評 ${scoredCount} / ${emps.length}</div>
            </div>
            <div class="employee-grid">
              ${emps.map(e => {
                const total = computeManagerTotal(e.id, mgrId);
                const scored = total !== null;
                return `
                  <div class="employee-card" data-action="select-employee" data-id="${e.id}">
                    ${scored ? `<div class="quickscore">${fmt(total/state.dimensions.length, 1)}</div>` : ''}
                    <div class="name">${escapeHtml(e.name)} <span class="tech-tag">${escapeHtml(getEmployeeTech(e))}</span></div>
                    <div class="en-name">${escapeHtml(e.enName || '')}</div>
                    <div class="dept">${escapeHtml(displayDept(e.dept))}</div>
                    <div class="emp-meta">${escapeHtml(e.id)}</div>
                    <div class="status ${scored ? 'scored' : 'pending'}">${scored ? '已評分 · 可修改' : '尚未評分'}</div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        `;
      }).join('')}

      <div class="admin-section" style="margin-top:32px;">
        <h3>修改密碼</h3>
        <div style="font-size:13px;color:var(--ink-soft);margin-bottom:14px;">如需更換登入密碼,可在此修改。新密碼至少 4 字元。</div>
        <div class="field">
          <label>新密碼</label>
          <input type="password" id="mgrChangePass1" placeholder="輸入新密碼">
        </div>
        <div class="field">
          <label>確認新密碼</label>
          <input type="password" id="mgrChangePass2" placeholder="再次輸入">
        </div>
        <button class="btn" data-action="manager-change-password">儲存新密碼</button>
      </div>
    `;
  }

  // scoring form
  const emp = state.employees.find(e => e.id === selectedEmpId);
  const existing = getManagerScoreForEmployee(selectedEmpId, mgrId);

  return `
    <div style="margin-bottom:18px;">
      <button class="btn secondary small" data-action="back-to-emp-list">← 回到員工列表</button>
    </div>
    <div class="scoring-panel">
      <div class="scoring-header">
        <div class="who">
          <h2>${escapeHtml(emp.name)}<span class="band-tag">Band ${emp.currentBand} → ${emp.currentBand + 1}</span><span class="tech-tag-large">${escapeHtml(getEmployeeTech(emp))}</span></h2>
          <div class="dept">${escapeHtml(emp.enName || '')} · ${escapeHtml(displayDept(emp.dept))} · ${escapeHtml(emp.id)}</div>
        </div>
        <div class="summary">
          <span class="label">本次總分</span>
          <span class="value" id="liveTotal">—<span class="max"> / ${(state.dimensions.length * 5).toFixed(1)}</span></span>
        </div>
      </div>

      ${renderEmpBonusForReviewer(emp)}

      ${state.dimensions.length === 0 ? `
        <div class="empty">尚未設定評分維度,請通知管理者於後台新增。</div>
      ` : state.dimensions.map(d => {
        const val = typeof existing[d.id] === 'number' ? existing[d.id] : 3.0;
        return `
          <div class="dimension">
            <div class="info">
              <div class="name">${escapeHtml(d.name)}</div>
              <div class="desc">${escapeHtml(d.desc || '')}</div>
            </div>
            <div class="score-control">
              <input type="range" min="0.1" max="5" step="0.1" value="${val}" data-dim="${d.id}" class="score-slider">
              <input type="number" min="0.1" max="5" step="0.1" value="${val.toFixed(1)}" data-dim="${d.id}" class="score-number">
              <span class="of">/ 5.0</span>
            </div>
          </div>
        `;
      }).join('')}

      <div class="scoring-footer">
        <div style="font-size:12px;color:var(--ink-muted);font-family:'JetBrains Mono',monospace;letter-spacing:0.1em;">
          ※ 本評分僅您本人與管理者可見
        </div>
        <div style="display:flex;gap:10px;">
          <button class="btn secondary" data-action="back-to-emp-list">取消</button>
          <button class="btn" data-action="save-scores">儲存評分</button>
        </div>
      </div>
    </div>
  `;
}
