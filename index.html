<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>升遷評核系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f1ea;
  --bg-paper: #faf7f0;
  --ink: #1a1a1a;
  --ink-soft: #4a4a4a;
  --ink-muted: #8b8378;
  --line: #2c2825;
  --line-soft: #d6cfc1;
  --accent: #8b2e1f;
  --accent-soft: #c2856b;
  --gold: #b08d3a;
  --green: #4a6b3a;
  --shadow: 0 1px 0 rgba(26,26,26,0.06), 0 4px 16px rgba(26,26,26,0.04);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'IBM Plex Sans', 'Noto Sans TC', sans-serif;
  font-size: 15px;
  line-height: 1.55;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

body {
  background-image:
    radial-gradient(circle at 20% 10%, rgba(139,46,31,0.03) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(176,141,58,0.04) 0%, transparent 50%);
  background-attachment: fixed;
}

/* ================== TYPOGRAPHY ================== */
.serif { font-family: 'Fraunces', 'Noto Sans TC', serif; font-optical-sizing: auto; }
.mono { font-family: 'JetBrains Mono', monospace; }

h1, h2, h3 { font-family: 'Fraunces', 'Noto Sans TC', serif; font-weight: 600; letter-spacing: -0.01em; }

/* ================== LAYOUT ================== */
.app {
  max-width: 1180px;
  margin: 0 auto;
  padding: 32px 28px 80px;
}

.masthead {
  border-bottom: 2px solid var(--line);
  padding-bottom: 18px;
  margin-bottom: 32px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 20px;
  flex-wrap: wrap;
}
.masthead-left { display: flex; align-items: baseline; gap: 18px; flex-wrap: wrap; }
.brand {
  font-family: 'Fraunces', serif;
  font-size: 34px;
  font-weight: 600;
  letter-spacing: -0.02em;
  font-style: italic;
}
.brand-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--ink-muted);
  border-left: 1px solid var(--line-soft);
  padding-left: 14px;
}
.session-info {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  display: flex;
  gap: 14px;
  align-items: center;
}
.session-info button {
  background: none;
  border: 1px solid var(--line);
  color: var(--ink);
  font-family: inherit;
  font-size: 10px;
  padding: 6px 12px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  transition: all 0.15s;
}
.session-info button:hover { background: var(--ink); color: var(--bg-paper); }

#syncStatus {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.06em;
  padding: 4px 10px;
  border: 1px solid;
  transition: all 0.2s;
}
#syncStatus.sync-saved { color: var(--green); border-color: var(--green); }
#syncStatus.sync-saving { color: var(--gold); border-color: var(--gold); }
#syncStatus.sync-error { color: var(--accent); border-color: var(--accent); }

/* ================== ROLE PICKER ================== */
.role-picker {
  background: var(--bg-paper);
  border: 1px solid var(--line);
  padding: 56px 48px;
  max-width: 640px;
  margin: 80px auto;
  box-shadow: var(--shadow);
  position: relative;
}
.role-picker::before {
  content: "";
  position: absolute;
  inset: 6px;
  border: 1px solid var(--line-soft);
  pointer-events: none;
}
.role-picker h2 {
  font-size: 32px;
  margin-bottom: 6px;
  text-align: center;
}
.role-picker .sub {
  text-align: center;
  color: var(--ink-muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  margin-bottom: 36px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--line-soft);
}
.role-options { display: grid; gap: 14px; }
.role-card {
  border: 1px solid var(--line-soft);
  padding: 22px 24px;
  cursor: pointer;
  background: transparent;
  text-align: left;
  font-family: inherit;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.role-card:hover {
  border-color: var(--line);
  background: rgba(139,46,31,0.02);
  transform: translateX(2px);
}
.role-card .label {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 500;
}
.role-card .desc {
  font-size: 13px;
  color: var(--ink-muted);
  margin-top: 2px;
}
.role-card .arrow {
  font-family: 'JetBrains Mono', monospace;
  color: var(--ink-muted);
  font-size: 18px;
}

/* ================== FORMS ================== */
.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--ink-muted);
  margin-bottom: 6px;
}
.field input, .field select, .field textarea {
  width: 100%;
  background: var(--bg-paper);
  border: 1px solid var(--line-soft);
  padding: 10px 14px;
  font-family: inherit;
  font-size: 15px;
  color: var(--ink);
  transition: border-color 0.15s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: none;
  border-color: var(--ink);
}

.cat-checkboxes {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.cat-checkbox {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border: 1px solid var(--line-soft);
  background: var(--bg);
  cursor: pointer;
  font-size: 14px;
  transition: all 0.15s;
}
.cat-checkbox:hover { border-color: var(--ink); }
.cat-checkbox input[type="checkbox"] { cursor: pointer; accent-color: var(--accent); }

.btn {
  background: var(--ink);
  color: var(--bg-paper);
  border: none;
  padding: 12px 22px;
  font-family: 'IBM Plex Sans', 'Noto Sans TC', sans-serif;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: background 0.15s;
  text-transform: uppercase;
}
.btn:hover { background: var(--accent); }
.btn.secondary { background: transparent; color: var(--ink); border: 1px solid var(--line); }
.btn.secondary:hover { background: var(--ink); color: var(--bg-paper); }
.btn.danger { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
.btn.danger:hover { background: var(--accent); color: var(--bg-paper); }
.btn.small { padding: 6px 12px; font-size: 11px; }

/* ================== TABS ================== */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--line-soft);
  margin-bottom: 28px;
}
.tab {
  background: none;
  border: none;
  padding: 14px 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--ink-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.15s;
}
.tab:hover { color: var(--ink); }
.tab.active {
  color: var(--ink);
  border-bottom-color: var(--accent);
}

/* ================== EMPLOYEE LIST (manager view) ================== */
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 18px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--line-soft);
}
.section-header h3 {
  font-size: 24px;
}
.section-header .meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
}

.employee-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }

.band-group {
  margin-bottom: 32px;
}
.band-group:last-child { margin-bottom: 0; }
.band-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 10px 14px;
  background: var(--ink);
  color: var(--bg-paper);
  margin-bottom: 14px;
  border-left: 4px solid var(--accent);
}
.band-title {
  display: flex;
  align-items: baseline;
  gap: 10px;
  font-family: 'Fraunces', serif;
}
.band-from {
  font-size: 14px;
  color: var(--line-soft);
  font-style: italic;
}
.band-arrow {
  font-family: 'JetBrains Mono', monospace;
  color: var(--accent-soft);
  font-size: 14px;
}
.band-to {
  font-size: 22px;
  font-weight: 600;
  color: var(--bg-paper);
}
.band-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--line-soft);
}
.emp-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-muted);
  letter-spacing: 0.06em;
  margin-bottom: 10px;
}
.en-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--ink-soft);
  letter-spacing: 0.02em;
  margin-bottom: 2px;
}
.band-tag {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 2px 8px;
  background: var(--accent);
  color: var(--bg-paper);
  letter-spacing: 0.1em;
  margin-left: 8px;
  vertical-align: middle;
}
.tech-tag {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 2px 8px;
  background: var(--gold);
  color: var(--bg-paper);
  letter-spacing: 0.12em;
  font-weight: 500;
  vertical-align: middle;
}
.tech-tag-large {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 3px 10px;
  background: var(--gold);
  color: var(--bg-paper);
  letter-spacing: 0.14em;
  font-weight: 500;
  margin-left: 8px;
  vertical-align: middle;
}

.mode-switcher {
  background: var(--bg-paper);
  border: 1px solid var(--line-soft);
  padding: 14px 18px;
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 18px;
  flex-wrap: wrap;
}
.mode-switcher-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--ink-muted);
}
.mode-switcher-tabs {
  display: flex;
  border: 1px solid var(--line);
}
.mode-tab {
  background: transparent;
  border: none;
  padding: 8px 16px;
  font-family: 'IBM Plex Sans', 'Noto Sans TC', sans-serif;
  font-size: 12px;
  cursor: pointer;
  color: var(--ink-soft);
  letter-spacing: 0.04em;
  transition: all 0.15s;
}
.mode-tab + .mode-tab { border-left: 1px solid var(--line); }
.mode-tab:hover { background: rgba(139,46,31,0.05); }
.mode-tab.active {
  background: var(--ink);
  color: var(--bg-paper);
  font-weight: 500;
}
.mode-switcher-desc {
  flex: 1;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-muted);
  letter-spacing: 0.04em;
  line-height: 1.5;
  min-width: 200px;
}

/* 獨立開關(每個開關 1 顆按鈕,ON/OFF 兩態) */
.mode-toggles { display: flex; gap: 10px; flex-wrap: wrap; }
.mode-toggle {
  background: transparent;
  border: 1px solid var(--line);
  padding: 7px 14px;
  font-family: 'IBM Plex Sans', 'Noto Sans TC', sans-serif;
  font-size: 12px;
  color: var(--ink-soft);
  letter-spacing: 0.04em;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all 0.15s;
}
.mode-toggle:hover { background: rgba(139,46,31,0.05); border-color: var(--ink-soft); }
.mode-toggle .toggle-indicator {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 1px solid var(--line-soft);
  background: transparent;
  font-size: 10px;
  line-height: 12px;
  text-align: center;
  color: transparent;
  font-family: 'JetBrains Mono', monospace;
  transition: all 0.15s;
}
.mode-toggle.on {
  background: var(--ink);
  color: var(--bg-paper);
  border-color: var(--ink);
  font-weight: 500;
}
.mode-toggle.on .toggle-indicator {
  background: var(--bg-paper);
  border-color: var(--bg-paper);
  color: var(--ink);
}

.trim-tag {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  padding: 1px 6px;
  background: var(--gold);
  color: var(--bg-paper);
  letter-spacing: 0.1em;
  margin-left: 4px;
  vertical-align: middle;
}

.disqualified-row td {
  background: rgba(139,46,31,0.06) !important;
}
.disqualified-row:hover td {
  background: rgba(139,46,31,0.10) !important;
}
.disqualified-tag {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  padding: 2px 8px;
  background: var(--accent);
  color: var(--bg-paper);
  letter-spacing: 0.12em;
  margin-left: 8px;
  vertical-align: middle;
  font-weight: 600;
}
.disqualified-num {
  color: var(--accent) !important;
  font-weight: 600;
}

.bonus-tag {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  padding: 1px 6px;
  background: var(--gold);
  color: var(--bg-paper);
  letter-spacing: 0.1em;
  margin-left: 4px;
  vertical-align: middle;
  font-weight: 600;
}

.bonus-table {
  width: 100%;
  border-collapse: collapse;
  background: var(--bg-paper);
  border: 1px solid var(--line-soft);
}
.bonus-table th {
  background: var(--ink);
  color: var(--bg-paper);
  text-align: left;
  padding: 10px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  font-weight: 500;
}
.bonus-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--line-soft);
  font-size: 14px;
  vertical-align: middle;
}
.bonus-table tr:last-child td { border-bottom: none; }
.bonus-input {
  background: var(--bg);
  border: 1px solid var(--line-soft);
  padding: 6px 10px;
  font-family: inherit;
  color: var(--ink);
}
.bonus-input:focus { outline: none; border-color: var(--ink); }
.bonus-input[type="number"] {
  font-family: 'Fraunces', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--gold);
}

.bonus-emp-card {
  background: var(--bg-paper);
  border: 1px solid var(--line-soft);
  margin-bottom: 8px;
  transition: border-color 0.15s;
}
.bonus-emp-card.expanded { border-color: var(--ink); }
.bonus-emp-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 18px;
  cursor: pointer;
  transition: background 0.15s;
}
.bonus-emp-header:hover { background: rgba(139,46,31,0.03); }
.bonus-emp-body {
  padding: 0 18px 18px;
  border-top: 1px solid var(--line-soft);
}
.bonus-item-row {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 18px;
  padding: 12px 4px;
  border-bottom: 1px dashed var(--line-soft);
  align-items: center;
}
.bonus-item-row:last-child { border-bottom: none; }
.bonus-item-name {
  font-family: 'Fraunces', serif;
  font-size: 14px;
  font-weight: 500;
}
.bonus-select {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--line-soft);
  padding: 8px 12px;
  font-family: inherit;
  font-size: 13px;
  color: var(--ink);
}
.bonus-select:focus { outline: none; border-color: var(--ink); }
.bonus-multi-checks {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.bonus-multi-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.bonus-multi-row {
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 10px;
  align-items: center;
}
.bonus-detail, .bonus-cert-detail {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--line-soft);
  padding: 6px 10px;
  font-family: inherit;
  font-size: 12px;
  color: var(--ink);
  margin-top: 6px;
  transition: border-color 0.15s, opacity 0.15s;
}
.bonus-cert-detail { margin-top: 0; }
.bonus-detail:focus, .bonus-cert-detail:focus { outline: none; border-color: var(--ink); }
.bonus-detail:disabled, .bonus-cert-detail:disabled {
  background: transparent;
  border-color: transparent;
  opacity: 0.4;
  cursor: not-allowed;
}

/* Employee Form */
.employee-form-panel {
  background: var(--bg-paper);
  border: 1px solid var(--line);
  padding: 32px 36px;
  position: relative;
  box-shadow: var(--shadow);
}
.employee-form-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  border-bottom: 2px solid var(--line);
  padding-bottom: 16px;
  margin-bottom: 20px;
}
.employee-form-header h2 {
  font-size: 28px;
  font-style: italic;
}
.form-status {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 4px 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.form-status-draft { background: var(--accent); color: var(--bg-paper); }
.form-status-submitted { background: var(--gold); color: var(--bg-paper); }
.form-status-reviewed { background: var(--green); color: var(--bg-paper); }

.form-summary {
  display: flex;
  gap: 24px;
  margin-bottom: 24px;
  padding: 14px 18px;
  background: var(--bg);
  border-left: 3px solid var(--ink);
}
.form-summary-item .label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-muted);
  margin-bottom: 4px;
}
.form-summary-item .value {
  font-family: 'Fraunces', serif;
  font-size: 30px;
  font-weight: 600;
  color: var(--gold);
  line-height: 1;
}

.form-items { margin-bottom: 24px; }
.form-item-row {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 18px;
  padding: 14px 4px;
  border-bottom: 1px dashed var(--line-soft);
  align-items: start;
}
.form-item-row:last-child { border-bottom: none; }
.form-item-name {
  font-family: 'Fraunces', serif;
  font-size: 14px;
  font-weight: 500;
  padding-top: 8px;
}
.form-item-control {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.emp-select, .emp-detail, .emp-cert-detail {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--line-soft);
  padding: 8px 12px;
  font-family: inherit;
  font-size: 13px;
  color: var(--ink);
}
.emp-select:focus, .emp-detail:focus, .emp-cert-detail:focus { outline: none; border-color: var(--ink); }
.emp-select:disabled, .emp-detail:disabled, .emp-cert-detail:disabled, .emp-others:disabled, input[type="checkbox"]:disabled {
  background: transparent;
  opacity: 0.6;
  cursor: not-allowed;
}

/* ================== MULTI-LINE DETAIL (Bug 2: 可多列細項) ================== */
.detail-multi { display: flex; flex-direction: column; gap: 6px; width: 100%; }
.detail-multi-row { display: flex; gap: 6px; align-items: stretch; }
.detail-multi-row > input[type="text"] { flex: 1; min-width: 0; }
.detail-row-remove {
  flex: 0 0 auto;
  width: 32px;
  background: transparent;
  border: 1px solid var(--line-soft);
  color: var(--ink-muted);
  font-size: 14px;
  line-height: 1;
  cursor: pointer;
  padding: 0;
  font-family: inherit;
  transition: all 0.15s;
}
.detail-row-remove:hover:not(:disabled) {
  color: var(--accent);
  border-color: var(--accent);
}
.detail-row-remove:disabled { opacity: 0.3; cursor: not-allowed; }
.detail-row-add {
  align-self: flex-start;
  background: transparent;
  border: 1px dashed var(--line-soft);
  color: var(--ink-muted);
  font-size: 12px;
  padding: 5px 12px;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: 0.02em;
  transition: all 0.15s;
}

function initFirebase() {
  // 用 compat API 從全域 window.firebase 取得
  if (typeof firebase === 'undefined') {
    throw new Error('Firebase SDK 未載入(可能是網路被擋)');
  }
  if (!firebase.initializeApp) {
    throw new Error('Firebase app SDK 沒載入完成');
  }
  if (!firebase.database) {
    throw new Error('Firebase database SDK 沒載入完成');
  }
  try {
    fbApp = firebase.initializeApp(FIREBASE_CONFIG);
  } catch (e) {
    // 已經初始化過(熱重載或重複呼叫)
    fbApp = firebase.app();
  }
  fbDb = firebase.database();
  fbStateRef = fbDb.ref('appState/' + STORE_KEY);
  if (!fbStateRef) {
    throw new Error('無法建立資料庫參照,請檢查 databaseURL');
  }
}

// 等待 Firebase SDK 載入完成(最多 5 秒)
async function waitForFirebaseSDK() {
  const maxWait = 5000;
  const interval = 100;
  let waited = 0;
  while (waited < maxWait) {
    if (typeof firebase !== 'undefined' && firebase.initializeApp && firebase.database) {
      return true;
    }
    await new Promise(r => setTimeout(r, interval));
    waited += interval;
  }
  return false;
}

async function loadState() {
  try {
    const snapshot = await fbStateRef.once('value');
    const val = snapshot.val();
    if (val) {
      return Object.assign(defaultState(), val);
    }
  } catch (e) {
    console.error('讀取失敗', e);
    toast('讀取失敗:' + e.message);
  }
  const ds = defaultState();
  await saveState(ds);
  return ds;
}

// 移除物件中所有 undefined 值(Firebase 不接受 undefined)
function cleanForFirebase(obj) {
  if (obj === null || obj === undefined) return null;
  if (Array.isArray(obj)) return obj.map(cleanForFirebase);
  if (typeof obj !== 'object') return obj;
  const cleaned = {};
  for (const k in obj) {
    if (obj[k] !== undefined) {
      cleaned[k] = cleanForFirebase(obj[k]);
    }
  }
  return cleaned;
}

async function saveState(stateToSave) {
  try {
    setSyncStatus('saving');
    isApplyingRemote = true;
    await fbStateRef.set(cleanForFirebase(stateToSave));
    setTimeout(() => { isApplyingRemote = false; }, 300);
    setSyncStatus('saved');
  } catch (e) {
    console.error('儲存失敗', e);
    isApplyingRemote = false;
    setSyncStatus('error');
    toast('儲存失敗:' + e.message);
  }
}

// 監聽其他使用者對資料的變更,自動更新本機畫面
function startRealtimeSync() {
  fbStateRef.on('value', snapshot => {
    if (isApplyingRemote) return;
    const val = snapshot.val();
    if (!val) return;
    // 與本機 state 比較,如果不同則更新並重畫
    const remoteJson = JSON.stringify(val);
    const localJson = JSON.stringify(state);
    if (remoteJson !== localJson) {
      state = Object.assign(defaultState(), val);
      // 不要在使用者正在打字時打斷 (簡單檢查:active element 是否為 input)
      const ae = document.activeElement;
      const isTyping = ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA' || ae.tagName === 'SELECT');
      if (!isTyping) {
        render();
      }
    }
  });
}

// Sync status indicator
function setSyncStatus(status) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  el.classList.remove('sync-saving', 'sync-saved', 'sync-error');
  if (status === 'saving') {
    el.classList.add('sync-saving');
    el.textContent = '⟳ 儲存中…';
  } else if (status === 'saved') {
    el.classList.add('sync-saved');
    el.textContent = '✓ 已同步';
    setTimeout(() => { if (el.classList.contains('sync-saved')) el.textContent = '● 已連線'; }, 1500);
  } else if (status === 'error') {
    el.classList.add('sync-error');
    el.textContent = '⚠ 同步失敗';
  }
}

  return state.empSubmissions?.[empId] || {
    status: 'draft',

    reviewedItems: {},

// 把員工提交 + 管理員 review 結果合併,套用到 state.extraBonus(讓 getEmployeeBonus 直接讀)
function applyReviewedSubmission(empId) {
  const sub = getEmployeeSubmission(empId);
  if (sub.status !== 'reviewed') return;
  if (!state.extraBonus) state.extraBonus = {};
  const result = { items: {}, itemDetails: {}, certDetails: {}, others: 0, othersNote: '' };
  const data = sub.data || {};

  // 遍歷每個 single item
  EXTRA_CONTRIBUTION_ITEMS.forEach(item => {
    if (item.type === 'single') {
      const review = sub.reviewedItems?.[item.id];
      const empSel = data.items?.[item.id];
      if (!empSel || empSel === 'none') return;
      const detArr = normalizeDetail(data.itemDetails?.[item.id]);
      if (review === 'accepted') {
        result.items[item.id] = empSel;
        if (detArr.length > 0) result.itemDetails[item.id] = detArr;
      } else if (review && typeof review === 'object' && review.adjustedTo) {
        result.items[item.id] = review.adjustedTo;
        if (detArr.length > 0) result.itemDetails[item.id] = detArr;
      }
      // rejected / pending 都不計入
    } else if (item.type === 'multi') {
      const empArr = Array.isArray(data.items?.[item.id]) ? data.items[item.id] : [];
      const accepted = [];
      empArr.forEach(optId => {
        const review = sub.reviewedCertItems?.[optId];
        if (review === 'accepted') {
          accepted.push(optId);
          const cdArr = normalizeDetail(data.certDetails?.[optId]);
          if (cdArr.length > 0) result.certDetails[optId] = cdArr;
        }
      });
      if (accepted.length > 0) result.items[item.id] = accepted;
    }
  });

  // Others 也要 review
  const othersReview = sub.reviewedItems?.others;
  if (othersReview === 'accepted' && data.others > 0) {
    result.others = data.others;
    result.othersNote = data.othersNote || '';
  }

  state.extraBonus[empId] = result;
}

// 從選擇的項目計算 extra bonus 總分
function getEmployeeBonus(empId) {
  const data = getEmployeeBonusData(empId);
  let total = 0;
  const breakdown = [];  // [{itemName, label, score, detail}]
  EXTRA_CONTRIBUTION_ITEMS.forEach(item => {
    const sel = data.items?.[item.id];
    if (item.type === 'single') {
      if (!sel || sel === 'none') return;
      const opt = item.options.find(o => o.id === sel);
      if (opt && opt.score > 0) {
        total += opt.score;
        const detail = joinDetail(data.itemDetails?.[item.id]);
        breakdown.push({ itemName: item.name, label: opt.label, score: opt.score, detail });
      }
    } else if (item.type === 'multi') {
      const arr = Array.isArray(sel) ? sel : [];
      arr.forEach(optId => {
        const opt = item.options.find(o => o.id === optId);
        if (opt && opt.score > 0) {
          total += opt.score;
          const detail = joinDetail(data.certDetails?.[optId]);
          breakdown.push({ itemName: item.name, label: opt.label, score: opt.score, detail });
        }
      });
    }
  });
  // Others 自由填的分數
  const othersScore = Number(data.others) || 0;
  if (othersScore > 0) {
    total += othersScore;
    breakdown.push({ itemName: 'Others', label: data.othersNote || '(未填說明)', score: othersScore, detail: '' });
  }
  // note 給 CSV 用,把細項也帶進去
  const noteStr = breakdown.map(b => {
    const det = b.detail ? ` [${b.detail}]` : '';
    return `${b.itemName}(${b.label})${det}: +${b.score}`;
  }).join('; ');
  return { score: Math.round(total * 10) / 10, breakdown, note: noteStr };
}

// 根據 trim / bonus 兩個布林,從 row 裡算出要顯示/排序的 avg
// row 預期至少有 { rawAvg, trimmedAvg, bonus } 三個欄位
// 回傳 null 表示該員工尚未有分數(或 base 為 null)
function computeScoreByMode(row, trim, bonus) {
  const base = trim ? row.trimmedAvg : row.rawAvg;
  if (base === null || base === undefined) return null;
  return bonus ? base + (row.bonus || 0) : base;
}

// 給「資格判斷」用的 base 平均(不含加分,但會跟隨 trim 開關)
function computeJudgeBase(row, trim) {
  return trim ? row.trimmedAvg : row.rawAvg;
}

// 判斷員工屬於哪個部門類別 id(用最長關鍵字匹配,避免「軟體設計」誤判到「軟體應用設計」員工)
function getEmployeeCategory(emp) {
  if (!emp.dept || !state.deptCategories) return null;
  const sorted = [...state.deptCategories].sort((a, b) => b.keyword.length - a.keyword.length);
  for (const cat of sorted) {
    if (emp.dept.includes(cat.keyword)) return cat.id;
  }
  return null;
}

// 取得員工技術領域標籤(BIOS / EC / Driver)
function getEmployeeTech(emp) {
  const catId = getEmployeeCategory(emp);
  if (!catId) return '';
  const cat = state.deptCategories.find(c => c.id === catId);
  return cat ? (cat.tech || cat.name) : '';
}

  const tech = getEmployeeTech(emp);

// 該主管能否評分此員工
function canManagerReview(mgr, emp) {
  // 規則 1:不能評自己部門的人(避嫌)
  if (isOwnDept(emp, mgr)) return false;
  // 規則 2:canReview 留空陣列 = 可評所有人(扣掉自己部門後)
  if (!mgr.canReview || mgr.canReview.length === 0) return true;
  // 規則 3:技術領域必須在白名單內
  const empCat = getEmployeeCategory(emp);
  if (!empCat) return false;
  return mgr.canReview.includes(empCat);
}

// 該主管可以評分的員工
function eligibleEmployees(mgr) {
  return state.employees.filter(e => canManagerReview(mgr, e));
}

// 該員工會被哪些主管評分
function eligibleManagers(emp) {
  return state.managers.filter(m => canManagerReview(m, emp));
}

function getManagerScoreForEmployee(empId, mgrId) {
  return (state.scores[empId] && state.scores[empId][mgrId]) || {};
}

function computeManagerTotal(empId, mgrId) {
  const s = getManagerScoreForEmployee(empId, mgrId);
  let sum = 0, count = 0;
  state.dimensions.forEach(d => {
    if (typeof s[d.id] === 'number') { sum += s[d.id]; count++; }
  });
  return count === state.dimensions.length ? sum : null;  // null if incomplete
}

function computeEmployeeAverage(empId) {
  const empScores = getEmployeeScores(empId);
  const totals = [];
  Object.keys(empScores).forEach(mgrId => {
    const t = computeManagerTotal(empId, mgrId);
    if (t !== null) totals.push(t);
  });
  if (totals.length === 0) return { avg: null, count: 0 };
  const avg = totals.reduce((a,b) => a+b, 0) / totals.length;
  return { avg, count: totals.length };
}

// 按「每個維度個別」排除最高最低分,然後加總所有維度的調整後平均
// 啟動條件:該維度有效評分 ≥ 5 人(扣掉最高最低後仍有 3 人)
function computeEmployeeAverageTrimmed(empId) {
  const empScores = getEmployeeScores(empId);
  const mgrIdsWithComplete = Object.keys(empScores).filter(mgrId => {
    return computeManagerTotal(empId, mgrId) !== null;
  });
  if (mgrIdsWithComplete.length === 0) return { avg: null, count: 0, trimmedAny: false };

  let sumOfDimAvgs = 0;
  let trimmedAny = false;
  state.dimensions.forEach(d => {
    const vals = mgrIdsWithComplete
      .map(mgrId => empScores[mgrId][d.id])
      .filter(v => typeof v === 'number');
    let useVals = vals;
    if (vals.length >= 5) {
      const sorted = [...vals].sort((a, b) => a - b);
      useVals = sorted.slice(1, -1);  // 去頭去尾
      trimmedAny = true;
    }
    const dimAvg = useVals.reduce((a,b) => a+b, 0) / useVals.length;
    sumOfDimAvgs += dimAvg;
  });
  return { avg: sumOfDimAvgs, count: mgrIdsWithComplete.length, trimmedAny };
}

// 同上但回傳每維度的詳細資訊(供 detail 頁顯示)
function computeDimensionStats(empId) {
  const empScores = getEmployeeScores(empId);
  const mgrIdsWithComplete = Object.keys(empScores).filter(mgrId => {
    return computeManagerTotal(empId, mgrId) !== null;
  });
  const stats = {};
  state.dimensions.forEach(d => {
    const vals = mgrIdsWithComplete
      .map(mgrId => ({ mgrId, val: empScores[mgrId][d.id] }))
      .filter(x => typeof x.val === 'number');
    if (vals.length === 0) {
      stats[d.id] = { rawAvg: null, trimmedAvg: null, trimmed: false, excludedMgrs: [] };
      return;
    }
    const rawAvg = vals.reduce((a, x) => a + x.val, 0) / vals.length;
    let trimmedAvg = rawAvg;
    let trimmed = false;
    let excludedMgrs = [];
    if (vals.length >= 5) {
      const sorted = [...vals].sort((a, b) => a.val - b.val);
      const lowest = sorted[0];
      const highest = sorted[sorted.length - 1];
      excludedMgrs = [lowest.mgrId, highest.mgrId];
      const remaining = sorted.slice(1, -1);
      trimmedAvg = remaining.reduce((a, x) => a + x.val, 0) / remaining.length;
      trimmed = true;
    }
    stats[d.id] = { rawAvg, trimmedAvg, trimmed, excludedMgrs };
  });
  return stats;
}

function fmt(n, d=2) { return n === null || n === undefined ? '—' : Number(n).toFixed(d); }

// RENDER ROOT
// =========================================================================
function render() {
  const app = document.getElementById('app');
  let html = '';

  if (view.mode === 'picker') {
    html = renderRolePicker();
  } else if (view.mode === 'employee_form') {
    const emp = state.employees.find(e => e.id === view.payload.empId);
    html = renderHeader('Extra Contribution 申請', emp ? emp.name + ' / 自評加分' : '錯誤') + renderEmployeeForm();
  } else if (view.mode === 'manager_select') {
    html = renderHeader('主管登入', '請選擇您的姓名') + renderManagerSelect();
  } else if (view.mode === 'manager_set_password') {
    const mgr = state.managers.find(m => m.id === view.payload.managerId);
    html = renderHeader('首次登入', mgr.name + ' / 設定密碼') + renderManagerSetPassword();
  } else if (view.mode === 'manager_login_password') {
    const mgr = state.managers.find(m => m.id === view.payload.managerId);
    html = renderHeader('主管登入', mgr.name + ' / 請輸入密碼') + renderManagerLoginPassword();
  } else if (view.mode === 'manager_score') {
    const mgr = state.managers.find(m => m.id === view.payload.managerId);
    html = renderHeader('主管評核', mgr.name + ' / 評分作業', true) + renderManagerScoring();
  } else if (view.mode === 'admin_login') {
    html = renderHeader('管理者登入', '請輸入密碼') + renderAdminLogin();
  } else if (view.mode === 'admin') {
    html = renderHeader('管理後台', '完整數據與設定', true) + renderAdmin();
  }

  app.innerHTML = html;
  attachHandlers();
}

function renderItemReviewClass(review) {
  if (review === 'accepted') return 'review-accepted';
  if (review === 'rejected') return 'review-rejected';
  if (review && typeof review === 'object' && review.adjustedTo) return 'review-adjusted';
  return 'review-pending';
}

function renderItemReviewBadge(review, item, originalSel) {
  if (review === 'accepted') return '<span class="review-badge review-badge-accepted">✓ 已接受</span>';
  if (review === 'rejected') return '<span class="review-badge review-badge-rejected">✗ 已拒絕</span>';
  if (review && typeof review === 'object' && review.adjustedTo && item) {
    const adjOpt = item.options.find(o => o.id === review.adjustedTo);
    return `<span class="review-badge review-badge-adjusted">↔ 已調整為 ${adjOpt ? escapeHtml(adjOpt.label) : ''}</span>`;
  }
  return '<span class="review-badge review-badge-pending">⋯ 待審</span>';
}

// 主管打分頁參考用的「員工自填加分一覽」— 顯示員工填了什麼、目前狀態,
// 但**不顯示預計分數**(避免主管的維度評分被加分數字干擾)
function renderEmpBonusForReviewer(emp) {
  const sub = getEmployeeSubmission(emp.id);
  const status = sub.status;  // 'draft' | 'submitted' | 'reviewed' (預設值)
  const data = sub.data || {};

  // 沒有任何提交資料 — 員工根本還沒進過自填連結
  // 注意:IPP 可能 items.ipp 沒設(權重 < 0.1)但 itemDetails.ipp 有資料,也要算「有」
  const hasItems = (data.items && Object.keys(data.items).length > 0)
                 || (data.itemDetails?.ipp && data.itemDetails.ipp.length > 0);
  const hasOthers = (data.others || 0) > 0 || (data.othersNote || '').trim();
  const isEmpty = !hasItems && !hasOthers;

  // 狀態 badge 樣式
  let badgeBg, badgeColor, badgeText;
  if (isEmpty) {
    badgeBg = 'transparent'; badgeColor = 'var(--ink-muted)'; badgeText = '— 員工尚未填寫';
  } else if (status === 'draft') {
    badgeBg = 'rgba(176,141,58,0.15)'; badgeColor = 'var(--gold)'; badgeText = '草稿 · 員工編輯中';
  } else if (status === 'submitted') {
    badgeBg = 'rgba(139,46,31,0.12)'; badgeColor = 'var(--accent)'; badgeText = '已提交 · 待管理者審核';
  } else if (status === 'reviewed') {
    badgeBg = 'rgba(74,107,58,0.15)'; badgeColor = 'var(--green)'; badgeText = '已完成審核';
  } else {
    badgeBg = 'transparent'; badgeColor = 'var(--ink-muted)'; badgeText = '— 狀態未知';
  }

  // 每筆顯示用 helper:把 review 狀態翻成小 tag
  const reviewTag = (review, item) => {
    if (review === 'accepted') return '<span style="color:var(--green);font-family:\'JetBrains Mono\',monospace;font-size:10px;letter-spacing:0.06em;margin-left:6px;">✓ 接受</span>';
    if (review === 'rejected') return '<span style="color:var(--accent);font-family:\'JetBrains Mono\',monospace;font-size:10px;letter-spacing:0.06em;margin-left:6px;">✗ 拒絕</span>';
    if (review && typeof review === 'object' && review.adjustedTo && item) {
      const adj = item.options.find(o => o.id === review.adjustedTo);
      return `<span style="color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.06em;margin-left:6px;">↔ 已調整為 ${escapeHtml(adj ? adj.label : '')}</span>`;
    }
    if (status === 'submitted' || status === 'reviewed') {
      return '<span style="color:var(--ink-muted);font-family:\'JetBrains Mono\',monospace;font-size:10px;letter-spacing:0.06em;margin-left:6px;">⋯ 待審</span>';
    }
    return '';
  };

  // 把選了的項目整理出來
  const lines = [];
  if (hasItems) {
    EXTRA_CONTRIBUTION_ITEMS.forEach(item => {
      const sel = data.items[item.id];
      // === IPP 特例:即使 items.ipp 沒設(權重 < 0.1)也要顯示細項供主管參考 ===
      if (item.id === 'ipp') {
        const detailArr = normalizeDetail(data.itemDetails?.ipp);
        if (detailArr.length === 0) return;  // 真的完全沒填 IPP 才跳過
        const summary = summarizeIpp(detailArr, emp.bandSinceYYYYMM);
        const review = sub.reviewedItems?.ipp;
        // 每筆細項列 + 期間 tag
        const rowsHtml = detailArr.map(d => {
          const inBand = isIppInBandPeriod(d.occurredAt, emp.bandSinceYYYYMM);
          const tagColor = inBand ? 'var(--green)' : 'var(--gold)';
          const tagText = inBand ? '✓ 期間內' : 'ⓘ 期間外';
          const w = d.weight ? `權重 ${escapeHtml(String(d.weight))}` : '未填權重';
          return `<div style="font-size:11px;color:var(--ink-soft);padding-left:14px;margin-top:2px;">
            • ${escapeHtml(d.name)}
            ${d.occurredAt ? `<span style="color:var(--ink-muted);font-family:'JetBrains Mono',monospace;">(${escapeHtml(d.occurredAt)})</span>` : ''}
            <span style="color:var(--ink-muted);font-family:'JetBrains Mono',monospace;font-size:10px;">· ${w}</span>
            <span style="color:${tagColor};font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.06em;margin-left:4px;">${tagText}</span>
          </div>`;
        }).join('');
        // 顯示 IPP 自動判定 label(不顯示分數!)
        const levelTextForReviewer = summary.totalCount === 0
          ? '無'
          : (summary.levelLabel || '無 (期間內權重不足 0.1)');
        lines.push(`
          <div style="padding:10px 0;border-bottom:1px solid var(--line-soft);">
            <div style="font-size:13px;color:var(--ink);">
              <b>${escapeHtml(item.name)}</b>
              <span style="color:var(--ink-soft);margin-left:6px;">— 自動判定:${escapeHtml(levelTextForReviewer)}</span>
              ${reviewTag(review, item)}
            </div>
            <div style="font-size:11px;color:var(--ink-muted);padding-left:14px;margin-top:3px;font-family:'JetBrains Mono',monospace;letter-spacing:0.04em;">
              期間內 ${summary.inCount} 筆(權重 ${summary.inWeight}) · 期間外 ${summary.outCount} 筆(權重 ${summary.outWeight}) · 總 ${summary.totalCount} 筆
            </div>
            ${rowsHtml}
          </div>
        `);
        return;
      }
      // === 一般 single 項目 ===
      if (item.type === 'single') {
        if (!sel || sel === 'none') return;
        const opt = item.options.find(o => o.id === sel);
        if (!opt) return;
        const review = sub.reviewedItems?.[item.id];
        const detailArr = normalizeDetail(data.itemDetails?.[item.id]);
        const detailHtml = detailArr.length > 0
          ? detailArr.map(d => `<div style="font-size:11px;color:var(--ink-soft);padding-left:14px;margin-top:2px;">• ${escapeHtml(d.name)}${d.occurredAt ? ` <span style="color:var(--ink-muted);font-family:'JetBrains Mono',monospace;">(${escapeHtml(d.occurredAt)})</span>` : ''}</div>`).join('')
          : '<div style="font-size:11px;color:var(--ink-muted);padding-left:14px;margin-top:2px;font-style:italic;">(未填具體說明)</div>';
        lines.push(`
          <div style="padding:10px 0;border-bottom:1px solid var(--line-soft);">
            <div style="font-size:13px;color:var(--ink);">
              <b>${escapeHtml(item.name)}</b>
              <span style="color:var(--ink-soft);margin-left:6px;">— ${escapeHtml(opt.label)}</span>
              ${reviewTag(review, item)}
            </div>
            ${detailHtml}
          </div>
        `);
      } else {
        // multi (cert)
        const arr = Array.isArray(sel) ? sel : [];
        if (arr.length === 0) return;
        const certHtml = arr.map(optId => {
          const opt = item.options.find(o => o.id === optId);
          if (!opt) return '';
          const review = sub.reviewedCertItems?.[optId];
          const detailArr = normalizeDetail(data.certDetails?.[optId]);
          const detailLine = detailArr.length > 0
            ? detailArr.map(d => `${escapeHtml(d.name)}${d.occurredAt ? ` (${escapeHtml(d.occurredAt)})` : ''}`).join(' / ')
            : '(未填具體說明)';
          return `
            <div style="font-size:12px;color:var(--ink-soft);padding-left:14px;margin-top:3px;">
              • <b>${escapeHtml(opt.label)}</b>
              <span style="color:var(--ink-muted);">— ${escapeHtml(detailLine)}</span>
              ${reviewTag(review, null)}
            </div>
          `;
        }).join('');
        lines.push(`
          <div style="padding:10px 0;border-bottom:1px solid var(--line-soft);">
            <div style="font-size:13px;color:var(--ink);"><b>${escapeHtml(item.name)}</b> <span style="color:var(--ink-muted);">(${arr.length} 項)</span></div>
            ${certHtml}
          </div>
        `);
      }
    });
  }
  // Others
  if (hasOthers) {
    const review = sub.reviewedItems?.others;
    const note = (data.othersNote || '').trim() || '(未填說明)';
    lines.push(`
      <div style="padding:10px 0;border-bottom:1px solid var(--line-soft);">
        <div style="font-size:13px;color:var(--ink);">
          <b>Others</b>
          <span style="color:var(--ink-soft);margin-left:6px;">— 其他特殊貢獻</span>
          ${reviewTag(review, null)}
        </div>
        <div style="font-size:11px;color:var(--ink-soft);padding-left:14px;margin-top:2px;">• ${escapeHtml(note)}</div>
      </div>
    `);
  }

  return `
    <div style="background:var(--bg);border:1px solid var(--line-soft);padding:16px 20px;margin-bottom:24px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:${isEmpty ? '0' : '8px'};flex-wrap:wrap;gap:8px;">
        <div style="font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.16em;color:var(--ink-muted);">
          員工自填 · Extra Contribution
        </div>
        <div style="display:inline-flex;align-items:center;padding:3px 10px;background:${badgeBg};color:${badgeColor};font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.08em;">
          ${badgeText}
        </div>
      </div>
      ${isEmpty
        ? '<div style="font-size:11px;color:var(--ink-muted);font-style:italic;">員工未透過自填連結提交任何加分項目,或管理者尚未發出連結。</div>'
        : `
          <div style="font-size:10px;color:var(--ink-muted);font-family:'JetBrains Mono',monospace;letter-spacing:0.06em;margin-bottom:4px;">
            ※ 此處不顯示預計加分,僅作為您評分時的參考
          </div>
          ${lines.join('')}
        `}
    </div>
  `;
}

function renderManagerScoring() {
  const mgrId = view.payload.managerId;
  const selectedEmpId = view.payload.employeeId || null;

  if (!selectedEmpId) {
    const mgr = state.managers.find(m => m.id === mgrId);
    const eligible = eligibleEmployees(mgr);
    const excludedCount = state.employees.length - eligible.length;

    // group employees by current band (descending)
    const groups = {};
    eligible.forEach(e => {
      const band = e.currentBand ?? '未設定';
      if (!groups[band]) groups[band] = [];
      groups[band].push(e);
    });
    const sortedBands = Object.keys(groups).sort((a, b) => {
      if (a === '未設定') return 1;
      if (b === '未設定') return -1;
      return Number(b) - Number(a);
    });

    return `
      <div class="section-header">
        <h3>選擇要評核的部屬</h3>
        <div class="meta">
          ${eligible.length} 位可評核 · 同職等者一同評比 · 您的評分僅您與管理者可見
          ${excludedCount > 0 ? `<br><span style="color:var(--accent);">⚠ 已自動排除 ${excludedCount} 位非可評範圍內的員工</span>` : ''}
        </div>
      </div>
      ${eligible.length === 0 ? '<div class="empty">沒有可評核的員工</div>' : sortedBands.map(band => {
        const emps = groups[band];
        const targetBand = band !== '未設定' ? Number(band) + 1 : '—';
        const scoredCount = emps.filter(e => computeManagerTotal(e.id, mgrId) !== null).length;
        return `
          <div class="band-group">
            <div class="band-header">
              <div class="band-title">
                <span class="band-from">Band ${band}</span>
                <span class="band-arrow">→</span>
                <span class="band-to">Band ${targetBand}</span>
              </div>
              <div class="band-meta">${emps.length} 位 · 已評 ${scoredCount} / ${emps.length}</div>
            </div>
            <div class="employee-grid">
              ${emps.map(e => {
                const total = computeManagerTotal(e.id, mgrId);
                const scored = total !== null;
                return `
                  <div class="employee-card" data-action="select-employee" data-id="${e.id}">
                    ${scored ? `<div class="quickscore">${fmt(total/state.dimensions.length, 1)}</div>` : ''}
                    <div class="name">${escapeHtml(e.name)} <span class="tech-tag">${escapeHtml(getEmployeeTech(e))}</span></div>
                    <div class="en-name">${escapeHtml(e.enName || '')}</div>
                    <div class="dept">${escapeHtml(displayDept(e.dept))}</div>
                    <div class="emp-meta">${escapeHtml(e.id)}</div>
                    <div class="status ${scored ? 'scored' : 'pending'}">${scored ? '已評分 · 可修改' : '尚未評分'}</div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        `;
      }).join('')}

      <div class="admin-section" style="margin-top:32px;">
        <h3>修改密碼</h3>
        <div style="font-size:13px;color:var(--ink-soft);margin-bottom:14px;">如需更換登入密碼,可在此修改。新密碼至少 4 字元。</div>
        <div class="field">
          <label>新密碼</label>
          <input type="password" id="mgrChangePass1" placeholder="輸入新密碼">
        </div>
        <div class="field">
          <label>確認新密碼</label>
          <input type="password" id="mgrChangePass2" placeholder="再次輸入">
        </div>
        <button class="btn" data-action="manager-change-password">儲存新密碼</button>
      </div>
    `;
  }

  // scoring form
  const emp = state.employees.find(e => e.id === selectedEmpId);
  const existing = getManagerScoreForEmployee(selectedEmpId, mgrId);

  return `
    <div style="margin-bottom:18px;">
      <button class="btn secondary small" data-action="back-to-emp-list">← 回到員工列表</button>
    </div>
    <div class="scoring-panel">
      <div class="scoring-header">
        <div class="who">
          <h2>${escapeHtml(emp.name)}<span class="band-tag">Band ${emp.currentBand} → ${emp.currentBand + 1}</span><span class="tech-tag-large">${escapeHtml(getEmployeeTech(emp))}</span></h2>
          <div class="dept">${escapeHtml(emp.enName || '')} · ${escapeHtml(displayDept(emp.dept))} · ${escapeHtml(emp.id)}</div>
        </div>
        <div class="summary">
          <span class="label">本次總分</span>
          <span class="value" id="liveTotal">—<span class="max"> / ${(state.dimensions.length * 5).toFixed(1)}</span></span>
        </div>
      </div>

      ${renderEmpBonusForReviewer(emp)}

      ${state.dimensions.length === 0 ? `
        <div class="empty">尚未設定評分維度,請通知管理者於後台新增。</div>
      ` : state.dimensions.map(d => {
        const val = typeof existing[d.id] === 'number' ? existing[d.id] : 3.0;
        return `
          <div class="dimension">
            <div class="info">
              <div class="name">${escapeHtml(d.name)}</div>
              <div class="desc">${escapeHtml(d.desc || '')}</div>
            </div>
            <div class="score-control">
              <input type="range" min="0.1" max="5" step="0.1" value="${val}" data-dim="${d.id}" class="score-slider">
              <input type="number" min="0.1" max="5" step="0.1" value="${val.toFixed(1)}" data-dim="${d.id}" class="score-number">
              <span class="of">/ 5.0</span>
            </div>
          </div>
        `;
      }).join('')}

      <div class="scoring-footer">
        <div style="font-size:12px;color:var(--ink-muted);font-family:'JetBrains Mono',monospace;letter-spacing:0.1em;">
          ※ 本評分僅您本人與管理者可見
        </div>
        <div style="display:flex;gap:10px;">
          <button class="btn secondary" data-action="back-to-emp-list">取消</button>
          <button class="btn" data-action="save-scores">儲存評分</button>
        </div>
      </div>
    </div>
  `;
}

function renderStatsTab() {
  const totalEmps = state.employees.length;
  const totalMgrs = state.managers.length;
  // 兩個獨立開關,預設皆關(= 原本的 'raw' 模式)
  const trimMode = !!view.payload?.trimMode;
  const bonusMode = !!view.payload?.bonusMode;
  const techSplit = !!view.payload?.techSplit;

  // 應評分數 = 每位員工 × 該員工的可評主管數
  let expectedReviews = 0;
  state.employees.forEach(e => {
    expectedReviews += eligibleManagers(e).length;
  });
  let completedReviews = 0;
  state.employees.forEach(e => {
    eligibleManagers(e).forEach(m => {
      if (computeManagerTotal(e.id, m.id) !== null) completedReviews++;
    });
  });
  const completion = expectedReviews > 0 ? (completedReviews / expectedReviews * 100) : 0;

  // ranking
  const rows = state.employees.map(e => {
    const raw = computeEmployeeAverage(e.id);
    const trimmed = computeEmployeeAverageTrimmed(e.id);
    const bonus = getEmployeeBonus(e.id).score || 0;
    const eligibleMgrCount = eligibleManagers(e).length;
    const row = {
      emp: e,
      rawAvg: raw.avg,
      trimmedAvg: trimmed.avg,
      bonus,
      count: trimMode ? trimmed.count : raw.count,
      trimmedAny: trimMode ? trimmed.trimmedAny : false,
      eligibleMgrCount,
    };
    row.avg = computeScoreByMode(row, trimMode, bonusMode);
    return row;
  }).sort((a, b) => {
    if (a.avg === null && b.avg === null) return 0;
    if (a.avg === null) return 1;
    if (b.avg === null) return -1;
    return b.avg - a.avg;
  });

  // 升遷資格統計(一律用「不含加分」的 base,和 table row 的 disqualified 判斷一致)
  let qualifiedCount = 0;
  let disqualifiedCount = 0;
  let unscoredCount = 0;
  rows.forEach(r => {
    const judgeBase = computeJudgeBase(r, trimMode);
    const dimAvg = judgeBase !== null && state.dimensions.length > 0 ? judgeBase / state.dimensions.length : null;
    if (dimAvg === null) unscoredCount++;
    else if (dimAvg < 4) disqualifiedCount++;
    else qualifiedCount++;
  });

  return `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">員工人數</div>
        <div class="value">${totalEmps}</div>
      </div>
      <div class="stat-card">
        <div class="label">完成評分</div>
        <div class="value accent">${completedReviews}<span style="font-size:18px;color:var(--ink-muted);"> / ${expectedReviews}</span></div>
        <div class="delta">完成率 ${completion.toFixed(1)}%</div>
      </div>
      <div class="stat-card">
        <div class="label">符合升遷資格</div>
        <div class="value" style="color:var(--green);">${qualifiedCount}<span style="font-size:18px;color:var(--ink-muted);"> / ${totalEmps}</span></div>
        <div class="delta">單項平均 ≥ 4.0</div>
      </div>
      <div class="stat-card">
        <div class="label">不符資格</div>
        <div class="value" style="color:var(--accent);">${disqualifiedCount}</div>
        <div class="delta">${unscoredCount > 0 ? `(另有 ${unscoredCount} 位尚未完成評分)` : '單項平均 < 4.0'}</div>
      </div>
    </div>

    <div class="section-header">
      <h3>員工評分排名</h3>
      <div class="meta">同職等分組排名 · 可展開查看各主管詳細評分</div>
    </div>

    <div class="mode-switcher">
      <div class="mode-switcher-label">排名模式</div>
      <div class="mode-toggles">
        <button class="mode-toggle ${trimMode ? 'on' : ''}" data-action="toggle-trim-mode" title="對每個維度,當該維度評分人數 ≥ 5 時,自動去除最高與最低分後再平均">
          <span class="toggle-indicator">${trimMode ? '✓' : ''}</span>去頭去尾
        </button>
        <button class="mode-toggle ${bonusMode ? 'on' : ''}" data-action="toggle-bonus-mode" title="加上 Extra Contribution 加分(管理者於後台設定)">
          <span class="toggle-indicator">${bonusMode ? '✓' : ''}</span>含加分
        </button>
        <button class="mode-toggle ${techSplit ? 'on' : ''}" data-action="toggle-tech-split" title="將 BIOS+EC 與 Driver(SA) 分開排名,仍按 Band 分組">
          <span class="toggle-indicator">${techSplit ? '✓' : ''}</span>技術分組
        </button>
      </div>
      <div class="mode-switcher-desc">
        ${(!trimMode && !bonusMode) ? '※ 原始平均:各主管的所有評分皆計入,未做任何排除、未含加分' : ''}
        ${( trimMode && !bonusMode) ? '※ 去頭去尾:對每個維度,當該維度評分人數 ≥ 5 時,自動去除最高與最低分後再平均' : ''}
        ${(!trimMode &&  bonusMode) ? '※ 原始 + 加分:以原始平均為基底,再加上 Extra Contribution 加分' : ''}
        ${( trimMode &&  bonusMode) ? '※ 去頭去尾 + 加分:先去除最高最低再平均,然後加上 Extra Contribution 加分' : ''}
      </div>
    </div>

    ${rows.length === 0 ? '<div class="empty">尚無員工資料</div>' : (() => {
      // 子渲染:一張排名表(給定一組 rows 和標題)
      const renderRankTable = (tableRows, subtitle) => {
        const sorted = [...tableRows].sort((a, b) => {
          if (a.avg === null && b.avg === null) return 0;
          if (a.avg === null) return 1;
          if (b.avg === null) return -1;
          return b.avg - a.avg;
        });
        return `
          ${subtitle ? `<div style="font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:var(--ink-soft);margin:14px 0 6px;padding:4px 8px;background:rgba(139,46,31,0.04);border-left:2px solid var(--accent-soft);">${escapeHtml(subtitle)} · ${sorted.length} 位</div>` : ''}
          <table class="results">
            <thead>
              <tr>
                <th style="width:40px;">名次</th>
                <th>員工</th>
                <th>英文名</th>
                <th style="width:70px;">技術</th>
                <th>單位</th>
                <th class="num">${bonusMode ? '加分後總分' : '平均總分'}</th>
                <th class="num">平均單項</th>
                <th class="num" style="width:60px;">加分</th>
                <th class="num">評分人數</th>
                <th style="width:90px;"></th>
              </tr>
            </thead>
            <tbody>
              ${sorted.map((r, i) => {
                const detailId = 'detail_' + r.emp.id;
                const judgeBase = computeJudgeBase(r, trimMode);
                const dimAvgForJudge = judgeBase !== null && state.dimensions.length > 0 ? judgeBase / state.dimensions.length : null;
                const disqualified = dimAvgForJudge !== null && dimAvgForJudge < 4;
                return `
                  <tr class="${disqualified ? 'disqualified-row' : ''}">
                    <td class="mono" style="color:var(--ink-muted);">${(i+1).toString().padStart(2,'0')}</td>
                    <td class="name">${escapeHtml(r.emp.name)}${disqualified ? '<span class="disqualified-tag">不符資格</span>' : ''}</td>
                    <td style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft);">${escapeHtml(r.emp.enName || '')}</td>
                    <td><span class="tech-tag">${escapeHtml(getEmployeeTech(r.emp))}</span></td>
                    <td style="color:var(--ink-muted);">${escapeHtml(displayDept(r.emp.dept))}</td>
                    <td class="num score-cell">${fmt(r.avg, 2)}${r.trimmedAny && trimMode ? '<span class="trim-tag">已排除</span>' : ''}${bonusMode && r.bonus > 0 ? '<span class="bonus-tag">+' + r.bonus + '</span>' : ''}</td>
                    <td class="num ${disqualified ? 'disqualified-num' : ''}">${fmt(dimAvgForJudge, 2)}</td>
                    <td class="num" style="color:${r.bonus > 0 ? 'var(--gold)' : 'var(--ink-muted)'};font-weight:${r.bonus > 0 ? '600' : '400'};">${r.bonus > 0 ? '+' + r.bonus : '—'}</td>
                    <td class="num">${r.count} / ${r.eligibleMgrCount}</td>
                    <td><button class="detail-toggle" data-action="toggle-detail" data-target="${detailId}">展開</button></td>
                  </tr>
                  <tr class="detail-row hidden" id="${detailId}">
                    <td colspan="10"><div class="detail-content">${renderEmpDetail(r.emp)}</div></td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        `;
      };

      // group by current band
      const bandGroups = {};
      rows.forEach(r => {
        const b = r.emp.currentBand ?? '未設定';
        if (!bandGroups[b]) bandGroups[b] = [];
        bandGroups[b].push(r);
      });
      const sortedBands = Object.keys(bandGroups).sort((a, b) => {
        if (a === '未設定') return 1;
        if (b === '未設定') return -1;
        return Number(b) - Number(a);
      });
      return sortedBands.map(band => {
        const groupRows = bandGroups[band];
        const targetBand = band !== '未設定' ? Number(band) + 1 : '—';
        let tablesHtml;
        if (!techSplit) {
          tablesHtml = renderRankTable(groupRows, null);
        } else {
          // 按技術組切:bios_ec → driver → other(other 只有在有員工時才顯示)
          const buckets = { bios_ec: [], driver: [], other: [] };
          groupRows.forEach(r => { buckets[getEmployeeTechGroup(r.emp)].push(r); });
          const order = ['bios_ec', 'driver', 'other'];
          tablesHtml = order
            .filter(key => buckets[key].length > 0)
            .map(key => renderRankTable(buckets[key], TECH_GROUP_LABELS[key]))
            .join('');
        }
        return `
          <div class="band-group">
            <div class="band-header">
              <div class="band-title">
                <span class="band-from">Band ${band}</span>
                <span class="band-arrow">→</span>
                <span class="band-to">Band ${targetBand}</span>
              </div>
              <div class="band-meta">${groupRows.length} 位候選人${techSplit ? ' · 已依技術分組' : ''}</div>
            </div>
            ${tablesHtml}
          </div>
        `;
      }).join('');
    })()}

    <div style="margin-top:24px;display:flex;gap:10px;">
      <button class="btn secondary" data-action="export-csv">匯出 CSV</button>
      <button class="btn secondary" data-action="export-detail-csv">匯出明細 CSV</button>
    </div>
  `;
}

function renderEmpDetail(emp) {
  const trimMode = view.payload?.trimMode || false;
  const hideUnscored = !!view.payload?.hideUnscored;

  const totalsByMgr = state.managers.map(m => {
    const scores = getManagerScoreForEmployee(emp.id, m.id);
    const total = computeManagerTotal(emp.id, m.id);
    const cannotReview = !canManagerReview(m, emp);
    return { mgr: m, scores, total, cannotReview };
  });

  // 取得每維度的詳細統計(含排除資訊)
  const dimStats = computeDimensionStats(emp.id);

  // 哪些主管在哪些維度被排除(依模式決定是否顯示排除)
  const isExcluded = (mgrId, dimId) => {
    if (!trimMode) return false;
    return dimStats[dimId]?.excludedMgrs?.includes(mgrId);
  };

  if (state.dimensions.length === 0) return '<div class="empty" style="padding:20px;">尚未設定評分維度</div>';

  // 對每個有效主管計算「按目前模式」的總分
  const computeMgrDisplayTotal = (t) => {
    if (t.cannotReview || t.total === null) return null;
    if (!trimMode) return t.total;
    // trim mode: 只計入未被排除的維度
    let sum = 0, count = 0;
    state.dimensions.forEach(d => {
      if (isExcluded(t.mgr.id, d.id)) return;
      if (typeof t.scores[d.id] === 'number') { sum += t.scores[d.id]; count++; }
    });
    return count > 0 ? sum : null;  // 在 trim 模式下,若該主管所有維度都被排除則為 null
  };

  // 加總所有調整後維度平均 = 員工總分
  const summaryTotal = trimMode
    ? state.dimensions.reduce((acc, d) => acc + (dimStats[d.id]?.trimmedAvg || 0), 0)
    : state.dimensions.reduce((acc, d) => acc + (dimStats[d.id]?.rawAvg || 0), 0);

  // group dimensions
  const groups = {};
  state.dimensions.forEach(d => {
    const g = d.group || '其他';
    if (!groups[g]) groups[g] = [];
    groups[g].push(d);
  });
  const groupNames = Object.keys(groups);

  // 「無評分權」的主管一律不顯示(沒資格評、沒資訊價值,只占版面)
  const reviewable = totalsByMgr.filter(t => !t.cannotReview);
  // 依開關過濾「有權但還沒評」的主管列
  const hiddenCount = hideUnscored
    ? reviewable.filter(t => t.total === null).length
    : 0;
  const visibleMgrs = hideUnscored
    ? reviewable.filter(t => t.total !== null)
    : reviewable;

  return `
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:8px;">
      <h4 style="margin:0;">${escapeHtml(emp.name)} · 各主管評分明細 ${trimMode ? '<span class="trim-tag">排除最高最低模式</span>' : ''}</h4>
      <label style="display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);cursor:pointer;letter-spacing:0.04em;">
        <input type="checkbox" data-action="toggle-hide-unscored" ${hideUnscored ? 'checked' : ''} style="cursor:pointer;">
        隱藏未評分主管${hideUnscored && hiddenCount > 0 ? ` <span style="color:var(--ink-muted);">(已隱藏 ${hiddenCount} 位)</span>` : ''}
      </label>
    </div>
    <table class="detail-table">
      <thead>
        <tr>
          <th rowspan="2" style="vertical-align:bottom;">主管</th>
          ${groupNames.map(g => `<th colspan="${groups[g].length}" style="text-align:center;border-bottom:1px solid var(--line-soft);">${escapeHtml(g)}</th>`).join('')}
          <th rowspan="2" class="num" style="vertical-align:bottom;">總分</th>
        </tr>
        <tr>
          ${groupNames.map(g => groups[g].map(d => `<th class="num" style="font-size:9px;">${escapeHtml(d.name)}</th>`).join('')).join('')}
        </tr>
      </thead>
      <tbody>
        ${visibleMgrs.map(t => {
          if (t.cannotReview) {
            return `
              <tr style="opacity:0.45;">
                <td>${escapeHtml(t.mgr.name)} <span style="font-family:'JetBrains Mono',monospace;font-size:9px;background:var(--ink-muted);color:var(--bg-paper);padding:1px 6px;letter-spacing:0.1em;">無評分權</span></td>
                ${state.dimensions.map(() => `<td class="num">—</td>`).join('')}
                <td class="num">—</td>
              </tr>
            `;
          }
          const displayTotal = computeMgrDisplayTotal(t);
          return `
            <tr>
              <td>${escapeHtml(t.mgr.name)}</td>
              ${state.dimensions.map(d => {
                const v = t.scores[d.id];
                if (typeof v !== 'number') return `<td class="num">—</td>`;
                if (isExcluded(t.mgr.id, d.id)) {
                  return `<td class="num" style="color:var(--ink-muted);text-decoration:line-through;background:rgba(176,141,58,0.08);" title="本維度最高/最低分,已排除">${fmt(v, 1)}</td>`;
                }
                return `<td class="num">${fmt(v, 1)}</td>`;
              }).join('')}
              <td class="num">${fmt(displayTotal, 2)}</td>
            </tr>
          `;
        }).join('')}
        <tr class="summary-row">
          <td>${trimMode ? '調整後平均' : '原始平均'}</td>
          ${state.dimensions.map(d => {
            const stat = dimStats[d.id];
            if (!stat || stat.rawAvg === null) return `<td class="num">—</td>`;
            return `<td class="num">${fmt(trimMode ? stat.trimmedAvg : stat.rawAvg, 2)}</td>`;
          }).join('')}
          <td class="num">${fmt(summaryTotal, 2)}</td>
        </tr>
        ${trimMode ? `
          <tr style="opacity:0.6;">
            <td style="font-size:11px;color:var(--ink-muted);">原始平均(對照)</td>
            ${state.dimensions.map(d => {
              const stat = dimStats[d.id];
              if (!stat || stat.rawAvg === null) return `<td class="num" style="font-size:11px;">—</td>`;
              return `<td class="num" style="font-size:11px;color:var(--ink-muted);">${fmt(stat.rawAvg, 2)}</td>`;
            }).join('')}
            <td class="num" style="font-size:11px;color:var(--ink-muted);">${fmt(state.dimensions.reduce((acc, d) => acc + (dimStats[d.id]?.rawAvg || 0), 0), 2)}</td>
          </tr>
        ` : ''}
      </tbody>
    </table>
  `;
}
