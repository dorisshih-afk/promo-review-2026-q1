function downloadCsv(rows, filename) {
  // BOM for Excel UTF-8 support
  const bom = '\uFEFF';
  const csv = bom + rows.map(r => r.map(cell => {
    const s = String(cell ?? '');
    if (s.includes(',') || s.includes('"') || s.includes('\n')) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  }).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
  toast('CSV 已下載');
}

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// 細項欄位:把各種舊/新格式一律正規化為 {name, occurredAt}[]
// occurredAt 格式為 'YYYY-MM' 或空字串
// 輸入可能是:
//   - undefined / null / '' → []
//   - 'foo' (最早期舊資料,單字串) → [{name:'foo', occurredAt:''}]
//   - ['foo', 'bar'] (中期舊資料,純字串陣列) → [{name:'foo', occurredAt:''}, ...]
//   - [{name:'foo', occurredAt:'2024-06'}, ...] (新資料) → 原樣
// 任何物件缺欄位會用空字串補上;name 為空的整筆略過
// Travel 細項專用 normalizer:形狀為 {name, startDate, endDate}
// startDate/endDate 是 'YYYY-MM-DD' 字串,空字串可接受
function normalizeTravelDetail(v) {
  if (!Array.isArray(v)) return [];
  return v.map(x => {
    if (x == null || typeof x !== 'object') return null;
    const name = (x.name == null ? '' : String(x.name)).trim();
    const startDate = (typeof x.startDate === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(x.startDate)) ? x.startDate : '';
    const endDate = (typeof x.endDate === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(x.endDate)) ? x.endDate : '';
    if (!name && !startDate && !endDate) return null;
    const out = { name, startDate, endDate };
    // 保留每段的 reviewDecision(Travel listingMode 後主管逐段審核)
    if (x.reviewDecision === 'accepted' || x.reviewDecision === 'rejected' || x.reviewDecision === 'pending') {
      out.reviewDecision = x.reviewDecision;
    }
    return out;
  }).filter(Boolean);
}

function normalizeDetail(v) {
  if (v === null || v === undefined) return [];
  const toItem = (x) => {
    if (x == null) return null;
    if (typeof x === 'string') {
      const s = x.trim();
      return s ? { name: s, occurredAt: '' } : null;
    }
    if (typeof x === 'object') {
      const name = (x.name == null ? '' : String(x.name)).trim();
      if (!name) return null;
      const occurredAt = normalizeYearMonth(x.occurredAt);
      const out = { name, occurredAt };
      // 保留 weight(IPP 用)
      if (x.weight !== undefined && x.weight !== null && x.weight !== '') {
        out.weight = String(x.weight);
      }
      // 保留 level(列舉式項目用,e.g. STAMP 't1'/'t2'/'ceo')
      if (x.level !== undefined && x.level !== null && x.level !== '') {
        out.level = String(x.level);
      }
      // 保留 reviewDecision(每筆獨立 'pending'/'accepted'/'rejected')
      if (x.reviewDecision === 'accepted' || x.reviewDecision === 'rejected' || x.reviewDecision === 'pending') {
        out.reviewDecision = x.reviewDecision;
      }
      // 保留 reviewerScore(主管填分項用,例如其他證照 — number 或可轉 number 字串)
      if (x.reviewerScore !== undefined && x.reviewerScore !== null && x.reviewerScore !== '') {
        const n = parseFloat(x.reviewerScore);
        if (isFinite(n)) out.reviewerScore = n;
      }
      // 保留 score(TOEIC scoreInputMode 用,員工填的原始分數)
      if (x.score !== undefined && x.score !== null && x.score !== '') {
        const n = parseFloat(x.score);
        if (isFinite(n)) out.score = n;
      }
      // 保留 startDate / endDate(Travel listingMode 用,格式 YYYY-MM-DD)
      if (typeof x.startDate === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(x.startDate)) {
        out.startDate = x.startDate;
      }
      if (typeof x.endDate === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(x.endDate)) {
        out.endDate = x.endDate;
      }
      return out;
    }
    return null;
  };
  if (Array.isArray(v)) {
    return v.map(toItem).filter(Boolean);
  }
  const one = toItem(v);
  return one ? [one] : [];
}

// 驗證/正規化 YYYY-MM 字串。不合格式一律視為空
function normalizeYearMonth(v) {
  if (v == null) return '';
  const s = String(v).trim();
  if (!/^\d{4}-(0[1-9]|1[0-2])$/.test(s)) return '';
  return s;
}

// 把細項陣列合成一行字用(顯示在主管 / 管理員審核畫面、CSV note)
function joinDetail(v) {
  return normalizeDetail(v).map(d => d.occurredAt ? `${d.name} (${d.occurredAt})` : d.name).join(' / ');
}

// 比對兩個 YYYY-MM 字串,回傳 -1 / 0 / 1;空字串永遠視為 -Infinity(小於任何有效月份)
function compareYearMonth(a, b) {
  if (a === b) return 0;
  if (!a) return -1;
  if (!b) return 1;
  return a < b ? -1 : 1;
}

// 考試年月是否已過有效期(以當前時間為基準)
// testYM: 'YYYY-MM';validityMonths: 例如 24(兩年)
// 回傳 true 表示已過期、false 表示仍有效
// 判斷 YYYY-MM 是否為未來月份(與當前月份比對,含當月不算未來)
function isFutureYearMonth(ym) {
  if (!ym) return false;
  const normalized = normalizeYearMonth(ym);
  if (!normalized) return false;
  const now = new Date();
  const nowYM = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
  return compareYearMonth(normalized, nowYM) > 0;
}

// 判斷 YYYY-MM-DD 是否為未來日期(與今天比對,含今天不算未來)
function isFutureDate(ymd) {
  if (!ymd) return false;
  const [y, m, d] = String(ymd).split('-').map(Number);
  if (!isFinite(y) || !isFinite(m) || !isFinite(d)) return false;
  const input = new Date(y, m - 1, d);
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return input > today;
}

function isScoreExpired(testYM, validityMonths) {  if (!testYM || !validityMonths) return false;
  const normalized = normalizeYearMonth(testYM);
  if (!normalized) return false;
  const [y, m] = normalized.split('-').map(Number);
  // 加上 validityMonths 得到「失效月份」
  const expireDate = new Date(y, m - 1 + validityMonths, 1);
  const now = new Date();
  // 簡單比對:expire 月若 ≤ 現在月就過期
  return expireDate <= new Date(now.getFullYear(), now.getMonth(), 1);
}

// 取得「現在月份往前推 N 年」的 YYYY-MM 字串
function yearMonthNYearsAgo(years) {
  const now = new Date();
  const y = now.getFullYear() - years;
  const m = now.getMonth() + 1;  // 0-based → 1-based
  return `${y}-${String(m).padStart(2, '0')}`;
}

// 驗證單一細項的 occurredAt 是否符合規則
// 回傳 null 表示通過,否則回傳錯誤訊息字串
// - cert 類(itemId === 'cert'):必須在現在往前 2 年以內
// - ipp 類:**期間內外都允許**(期間外仍可填,只是不計分),只要月份格式合法即可
// - 其他:必須 >= bandSince
function validateOccurredAt(itemId, occurredAt, bandSince) {
  const ym = normalizeYearMonth(occurredAt);
  if (!ym) return '請填寫發生年月 (YYYY-MM)';
  if (itemId === 'cert') {
    const twoYearsAgo = yearMonthNYearsAgo(2);
    if (compareYearMonth(ym, twoYearsAgo) < 0) {
      return `證照須在最近 2 年內(${twoYearsAgo} 之後)`;
    }
  } else if (itemId === 'ipp') {
    // 不擋:期間內外都可填,只要月份格式合法
  } else {
    if (!bandSince) return '請先填寫當前 Band 起始年月';
    if (compareYearMonth(ym, bandSince) < 0) {
      return `不在當前 Band 期間(須 ≥ ${bandSince})`;
    }
  }
  return null;
}

// IPP 一筆是否在 Band 期間內(true=計加分;false=僅統計、不計分)
function isIppInBandPeriod(occurredAt, bandSince) {
  const ym = normalizeYearMonth(occurredAt);
  if (!ym || !bandSince) return false;
  if (isFutureYearMonth(ym)) return false;  // 未來日期不算期間內
  return compareYearMonth(ym, bandSince) >= 0;
}

// 把 stored weight 反算成顯示字串,例如 weight=0.5 → "2 人(權重 0.50)"、weight=1 → "1 人(獨自)"
// 給審核頁、reviewer panel、admin detail 三處共用
function formatIppWeightDisplay(weight) {
  const w = parseFloat(weight);
  if (!isFinite(w) || w <= 0) return '—';
  const n = Math.max(1, Math.round(1 / w));
  if (n === 1) return '1 人(獨自)';
  return `${n} 人(權重 ${w.toFixed(2)})`;
}

// IPP UI 用「掛名人數」(整數),內部存 weight = 1/N。
// 把 input 字串轉成 weight 字串(無效輸入 → 空字串)
// 例:'1' → '1', '2' → '0.5', '3' → '0.333333' (儲存時保留高精度;顯示用 round)
function peopleNToWeight(input) {
  if (input === undefined || input === null) return '';
  const s = String(input).trim();
  if (!s) return '';
  const n = parseInt(s, 10);
  if (!isFinite(n) || n < 1) return '';
  // 保留小數,讓計算精準;display 端再 format
  return String(1 / n);
}

// IPP 細項一筆的權重(回傳 number,空值或非數字回 0)
function getIppWeight(detail) {
  const w = parseFloat(detail && detail.weight);
  return isFinite(w) && w > 0 ? w : 0;
}

// 從 detail 陣列(已 normalize)推算 IPP 期間內權重總和 → 對應到 EXTRA_CONTRIBUTION_ITEMS 裡 ipp 的 option id
// 規則:
//   1) 完全沒期間內 IPP → 'none'(不加分)
//   2) 期間內有「至少 1 筆有效權重」但加總 < 0.1 → **保底** 'lt05' (+1) — 多人共掛保護
//   3) 加總 ≥ 0.1 → 依區間對應(0.1 / 0.5 / 1 / 2 / 3 / >3)
function computeIppLevelFromDetails(detailArr, bandSince, options = {}) {
  const onlyAccepted = !!options.onlyAccepted;
  let sumIn = 0;
  let inWithWeightCount = 0;
  (detailArr || []).forEach(d => {
    if (onlyAccepted && (d.reviewDecision || 'pending') !== 'accepted') return;
    if (isIppInBandPeriod(d.occurredAt, bandSince)) {
      const w = getIppWeight(d);
      sumIn += w;
      if (w > 0) inWithWeightCount++;
    }
  });
  if (inWithWeightCount === 0) return { optionId: 'none', sum: sumIn };
  if (sumIn < 0.1) return { optionId: 'lt05', sum: sumIn };
  if (sumIn < 0.5) return { optionId: 'lt05', sum: sumIn };
  if (sumIn < 1)   return { optionId: 'lt1',  sum: sumIn };
  if (sumIn === 1) return { optionId: 'eq1',  sum: sumIn };
  if (sumIn <= 2)  return { optionId: 'lt2',  sum: sumIn };
  if (sumIn <= 3)  return { optionId: 'lt3',  sum: sumIn };
  return { optionId: 'gt3', sum: sumIn };
}

// IPP 統計用 — 回傳 { inCount, outCount, totalCount, inWeight, outWeight, acceptedCount, pendingCount, rejectedCount, levelOptionId, levelLabel, levelScore }
function summarizeIpp(detailArr, bandSince, options = {}) {
  const onlyAccepted = !!options.onlyAccepted;
  let inCount = 0, outCount = 0, inWeight = 0, outWeight = 0;
  let acceptedCount = 0, pendingCount = 0, rejectedCount = 0;
  (detailArr || []).forEach(d => {
    const dec = d.reviewDecision || 'pending';
    if (dec === 'accepted') acceptedCount++;
    else if (dec === 'rejected') rejectedCount++;
    else pendingCount++;
    // rejected 不計入 weight / count
    if (dec === 'rejected') return;
    // onlyAccepted mode:pending 不算
    if (onlyAccepted && dec !== 'accepted') return;
    const w = getIppWeight(d);
    if (isIppInBandPeriod(d.occurredAt, bandSince)) {
      inCount++;
      inWeight += w;
    } else {
      outCount++;
      outWeight += w;
    }
  });
  const ippItem = EXTRA_CONTRIBUTION_ITEMS.find(i => i.id === 'ipp');
  const levelInfo = computeIppLevelFromDetails(detailArr, bandSince, { onlyAccepted });
  const opt = ippItem ? ippItem.options.find(o => o.id === levelInfo.optionId) : null;
  const r2 = x => Math.round(x * 100) / 100;
  return {
    inCount, outCount, totalCount: inCount + outCount,
    inWeight: r2(inWeight), outWeight: r2(outWeight),
    acceptedCount, pendingCount, rejectedCount,
    levelOptionId: levelInfo.optionId,
    levelLabel: opt ? opt.label : '',
    levelScore: opt ? opt.score : 0,
  };
}

// ─────────────────────── 列舉式加分項通用計算 ───────────────────────
// 適用於 STAMP / Conference / Award / 講師 / Linc 等「每筆細項各有等級 + 逐筆審核」的項目
//
// 細項資料形狀:{ name, occurredAt, level, reviewDecision? }
//   - level: option id (e.g. 't1', 't2', 'ceo')
//   - reviewDecision: 'pending' | 'accepted' | 'rejected'(預設 'pending';舊資料無此欄位視為 pending)

// Lazy migration:若舊資料的細項沒 level,從 sub.data.items[itemId] 補一個全項 level
// 且若該項目舊狀態為 'accepted'(整項審核已通過),所有細項視為 accepted
// 回傳 normalized + migrated 的 detail array(不修改原物件)
function migrateListedDetails(item, sub, data) {
  // === 舊 cert 資料 → 新 other_cert migration(TOEIC/JLPT 不走 listing,另外 migrate) ===
  // 舊形狀:data.items.cert = ['pmp', 'toeic_gold', 'jlpt_n1', ...]
  //         data.certDetails.pmp = [{name, occurredAt}]
  //         sub.reviewedCertItems.pmp = 'accepted' | 'rejected' | 'pending'
  if (item.id === 'other_cert') {
    const existing = normalizeDetail(data.itemDetails?.[item.id]);
    const legacyCerts = Array.isArray(data.items?.cert) ? data.items.cert : [];
    if (existing.length === 0 && legacyCerts.length > 0) {
      // 舊資料中,除了 TOEIC/JLPT 以外的都視為「其他證照」
      const OLD_TOEIC = new Set(['toeic_gold', 'toeic_blue', 'toeic_green']);
      const OLD_JLPT = new Set(['jlpt_n1', 'jlpt_n2']);
      const OLD_CERT_DEFAULTS = { pmp: 3 };
      const migrated = [];
      legacyCerts.forEach(oldOptId => {
        if (OLD_TOEIC.has(oldOptId) || OLD_JLPT.has(oldOptId)) return;
        const decLegacy = sub.reviewedCertItems?.[oldOptId] || 'pending';
        const legacyDetails = normalizeDetail(data.certDetails?.[oldOptId]);
        const origName = legacyDetails[0]?.name || oldOptId;
        const occurredAt = legacyDetails[0]?.occurredAt || '';
        const reviewerScore = (decLegacy === 'accepted') ? (OLD_CERT_DEFAULTS[oldOptId] || 0) : 0;
        migrated.push({
          name: origName, occurredAt, level: 'listed',
          reviewDecision: decLegacy,
          ...(reviewerScore > 0 ? { reviewerScore } : {})
        });
      });
      if (migrated.length > 0) return migrated;
    }
  }
  // === 舊 Others 資料 → 新 others listing migration ===
  // 舊形狀:data.others = 1.5, data.othersNote = "xxx", sub.reviewedItems.others = 'accepted'
  if (item.id === 'others') {
    const existing = normalizeDetail(data.itemDetails?.others);
    const legacyScore = Number(data.others) || 0;
    const legacyNote = (data.othersNote || '').trim();
    if (existing.length === 0 && (legacyScore > 0 || legacyNote)) {
      const decLegacy = sub.reviewedItems?.others || 'pending';
      return [{
        name: legacyNote || '(舊資料未填描述)',
        occurredAt: '',
        level: 'listed',
        reviewDecision: decLegacy,
        ...(legacyScore > 0 && decLegacy === 'accepted' ? { reviewerScore: legacyScore } : {})
      }];
    }
  }
  // === 一般 listing-mode migration(既有邏輯) ===
  const raw = data.itemDetails?.[item.id];
  const arr = normalizeDetail(raw);
  if (arr.length === 0) return arr;
  const itemLevel = data.items?.[item.id];
  const itemReview = sub.reviewedItems?.[item.id];
  // 舊 option id → 新 option id remap(各項目改版時用)
  // Award: i1 → internal, i2plus → internal(兩者都代表「內部獎項」,舊的 i2plus 是「計數封頂」概念在新制廢止)
  const LEGACY_OPT_REMAP = {
    award: { i1: 'internal', i2plus: 'internal' },
    innovation: { '1': 'listed', '2': 'listed', '3plus': 'listed' },
    nfi: { '1': 'listed', '2': 'listed', '3plus': 'listed' }
  };
  const remap = (lvl) => {
    if (!lvl) return lvl;
    const table = LEGACY_OPT_REMAP[item.id] || {};
    return table[lvl] || lvl;
  };
  const anyHasLevel = arr.some(d => d.level);
  // IPP / Travel 特例:細項不該有 level,只保留每筆 reviewDecision
  if (item.id === 'ipp' || item.id === 'travel') {
    let fallbackReview = 'pending';
    if (itemReview === 'accepted') fallbackReview = 'accepted';
    else if (itemReview === 'rejected') fallbackReview = 'rejected';
    else if (itemReview && typeof itemReview === 'object' && itemReview.adjustedTo) fallbackReview = 'accepted';
    return arr.map(d => ({
      ...d,
      reviewDecision: d.reviewDecision || fallbackReview
    }));
  }
  if (anyHasLevel) {
    return arr.map(d => ({
      ...d,
      level: remap(d.level || itemLevel || ''),
      reviewDecision: d.reviewDecision || 'pending'
    }));
  }
  let migratedReview = 'pending';
  if (itemReview === 'accepted') migratedReview = 'accepted';
  else if (itemReview === 'rejected') migratedReview = 'rejected';
  let migratedLevel = itemLevel || '';
  if (itemReview && typeof itemReview === 'object' && itemReview.adjustedTo) {
    migratedReview = 'accepted';
    migratedLevel = itemReview.adjustedTo;
  }
  return arr.map(d => ({
    ...d,
    level: remap(migratedLevel),
    reviewDecision: migratedReview
  }));
}

// 加總列舉項目分數
// isPreview = true → 視所有 pending 為 accepted(讓員工看潛在最高分)
// item.levelCaps 可選:{level_id: [{count, score}]} 表示該 level 按計數封頂計分
//   e.g. Award internal: [{count:1,score:1},{count:2,score:1.2}] 表示 1 個 1 分、≥2 個 1.2 分
//   未列 level 的走「每筆各自加總」預設行為
function summarizeListedItem(item, detailArr, options = {}) {
  const isPreview = !!options.preview;
  const bandSince = options.bandSince || '';
  let acceptedCount = 0;
  let pendingCount = 0;
  let rejectedCount = 0;
  let ineligibleCount = 0;
  let futureCount = 0;
  let earlyCount = 0;
  const byLevel = {};
  const classified = [];
  (detailArr || []).forEach(d => {
    const ym = normalizeYearMonth(d.occurredAt);
    // 未來日期 → 不計分(獨立計數)
    if (ym && isFutureYearMonth(ym)) {
      ineligibleCount++;
      futureCount++;
      return;
    }
    if (bandSince && ym && compareYearMonth(ym, bandSince) < 0) {
      ineligibleCount++;
      earlyCount++;
      return;
    }
    const opt = item.options.find(o => o.id === d.level);
    const dec = d.reviewDecision || 'pending';
    const lvl = d.level || 'unknown';
    if (!byLevel[lvl]) byLevel[lvl] = { acceptedCount: 0, pendingCount: 0, rejectedCount: 0 };
    if (dec === 'accepted') { acceptedCount++; byLevel[lvl].acceptedCount++; }
    else if (dec === 'rejected') { rejectedCount++; byLevel[lvl].rejectedCount++; }
    else { pendingCount++; byLevel[lvl].pendingCount++; }
    classified.push({ d, opt, dec, lvl });
  });

  // 計分:三種模式
  // A) item.pickHighestMode = true → 從接受列中挑 score 最高那筆(TOEIC / 日文)
  // B) item.reviewerScoring = true → 每筆用 d.reviewerScore(主管填的)加總(其他證照)
  // C) 預設(含 levelCaps):每 level 按 cap 表或 per-row 加總
  let acceptedScore = 0;
  let previewScore = 0;

  if (item.pickHighestMode) {
    // 從 classified 裡挑出:accepted 的最高 score、accepted+pending 的最高 score
    let maxAccepted = 0, maxWithPending = 0;
    classified.forEach(({ opt, dec }) => {
      const s = opt ? opt.score : 0;
      if (dec === 'accepted') {
        if (s > maxAccepted) maxAccepted = s;
        if (s > maxWithPending) maxWithPending = s;
      } else if (dec !== 'rejected') {
        if (s > maxWithPending) maxWithPending = s;
      }
    });
    acceptedScore = maxAccepted;
    previewScore = maxWithPending;
  } else if (item.reviewerScoring) {
    // 主管填的 reviewerScore:只算 accepted 列
    // preview mode 下 pending 列用 0(員工看不到預估分數,等主管填)
    let sumAccepted = 0;
    classified.forEach(({ d, dec }) => {
      if (dec !== 'accepted') return;
      const s = parseFloat(d.reviewerScore);
      if (isFinite(s) && s > 0) sumAccepted += s;
    });
    acceptedScore = sumAccepted;
    previewScore = sumAccepted;  // pending 列預估值為 0
  } else {
    // 預設:levelCaps 或每筆加總
    const caps = item.levelCaps || {};
    const countByLevel = {};
    classified.forEach(({ lvl, dec }) => {
      if (!countByLevel[lvl]) countByLevel[lvl] = { accepted: 0, pending: 0 };
      if (dec === 'accepted') countByLevel[lvl].accepted++;
      else if (dec !== 'rejected') countByLevel[lvl].pending++;
    });
    const scoreFromCount = (lvl, cnt) => {
      if (cnt <= 0) return 0;
      if (caps[lvl]) {
        const entries = caps[lvl].slice().sort((a, b) => a.count - b.count);
        let s = 0;
        for (const e of entries) { if (cnt >= e.count) s = e.score; }
        return s;
      }
      const opt = item.options.find(o => o.id === lvl);
      return (opt ? opt.score : 0) * cnt;
    };
    Object.keys(countByLevel).forEach(lvl => {
      const { accepted, pending } = countByLevel[lvl];
      acceptedScore += scoreFromCount(lvl, accepted);
      previewScore += scoreFromCount(lvl, accepted + pending);
    });
  }

  const totalScore = isPreview ? previewScore : acceptedScore;
  return {
    totalScore,
    acceptedScore, acceptedCount,
    pendingScore: previewScore - acceptedScore, pendingCount,
    rejectedCount,
    ineligibleCount,
    futureCount,
    earlyCount,
    totalCount: acceptedCount + pendingCount + rejectedCount + ineligibleCount,
    byLevel,
  };
}

// ─────────────────────── Travel Support 出差計算 ───────────────────────
// 細項資料形狀:{ name, startDate, endDate }
//   - startDate / endDate 是 'YYYY-MM-DD' 字串(date input)
//   - name 是該段出差的描述/出差地

// 把 'YYYY-MM-DD' 字串解析成 Date 物件(無效回 null)
function parseYMD(s) {
  if (!s || typeof s !== 'string') return null;
  const m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (!m) return null;
  const d = new Date(`${m[1]}-${m[2]}-${m[3]}T00:00:00`);
  return isNaN(d.getTime()) ? null : d;
}

// 'YYYY-MM-DD' → 'YYYY-MM'(用於跟 bandSince/covidPeriod 比較,因為它們是 month 粒度)
function ymdToYearMonth(s) {
  const m = (s || '').match(/^(\d{4})-(\d{2})/);
  return m ? `${m[1]}-${m[2]}` : '';
}

// 計算兩日期之間的天數(含頭含尾;含週末)
// e.g. 2024-03-01 → 2024-03-01 = 1 天;2024-03-01 → 2024-03-03 = 3 天
// 無效輸入回 0
function calcTravelDays(startDate, endDate) {
  const a = parseYMD(startDate);
  const b = parseYMD(endDate);
  if (!a || !b) return 0;
  if (b < a) return 0;
  const ms = b.getTime() - a.getTime();
  return Math.floor(ms / 86400000) + 1;
}

// 一段出差是否合法計入加分(只看「出發日」):
//   - 出發日有效 + 回台日有效 + 回台日 >= 出發日
//   - 出發日的「年月」>= bandSince(在 Band 期間內)
//   - **出發日的「年月」**在疫情期間內(回台日不檢查 — 跨邊界整段計入)
function isTravelEligible(startDate, endDate, bandSince, covidPeriod) {
  if (!startDate || !endDate) return false;
  if (calcTravelDays(startDate, endDate) <= 0) return false;
  if (isFutureDate(startDate) || isFutureDate(endDate)) return false;  // 未來日期不計入
  if (!bandSince) return false;
  if (compareYearMonth(ymdToYearMonth(startDate), bandSince) < 0) return false;
  const cp = covidPeriod || {};
  if (!cp.startYYYYMM || !cp.endYYYYMM) return false;
  const sYM = ymdToYearMonth(startDate);
  if (compareYearMonth(sYM, cp.startYYYYMM) < 0) return false;
  if (compareYearMonth(sYM, cp.endYYYYMM) > 0) return false;
  return true;
}

// 從細項陣列推算 Travel 等級 → 對應到 EXTRA_CONTRIBUTION_ITEMS 裡 travel 的 option id
// 規則:加總所有「合法出差」的天數 → 對應區間
//   < 30 → 'none'
//   30-59 → '30_59'
//   60-89 → '60_89'
//   90-119 → '90_119'
//   120-149 → '120_149'
//   150-179 → '150_179'
//   ≥180 → '180plus'
function computeTravelLevelFromDetails(detailArr, bandSince, covidPeriod, options = {}) {
  const onlyAccepted = !!options.onlyAccepted;
  let totalDays = 0;
  (detailArr || []).forEach(d => {
    if (onlyAccepted && (d.reviewDecision || 'pending') !== 'accepted') return;
    if (isTravelEligible(d.startDate, d.endDate, bandSince, covidPeriod)) {
      totalDays += calcTravelDays(d.startDate, d.endDate);
    }
  });
  if (totalDays < 30)  return { optionId: 'none',    days: totalDays };
  if (totalDays < 60)  return { optionId: '30_59',   days: totalDays };
  if (totalDays < 90)  return { optionId: '60_89',   days: totalDays };
  if (totalDays < 120) return { optionId: '90_119',  days: totalDays };
  if (totalDays < 150) return { optionId: '120_149', days: totalDays };
  if (totalDays < 180) return { optionId: '150_179', days: totalDays };
  return { optionId: '180plus', days: totalDays };
}

function summarizeTravel(detailArr, bandSince, covidPeriod, options = {}) {
  const onlyAccepted = !!options.onlyAccepted;
  let eligibleCount = 0, ineligibleCount = 0, eligibleDays = 0, ineligibleDays = 0;
  let acceptedCount = 0, pendingCount = 0, rejectedCount = 0;
  (detailArr || []).forEach(d => {
    const dec = d.reviewDecision || 'pending';
    if (dec === 'accepted') acceptedCount++;
    else if (dec === 'rejected') rejectedCount++;
    else pendingCount++;
    if (dec === 'rejected') return;
    if (onlyAccepted && dec !== 'accepted') return;
    const days = calcTravelDays(d.startDate, d.endDate);
    if (days <= 0) return;
    if (isTravelEligible(d.startDate, d.endDate, bandSince, covidPeriod)) {
      eligibleCount++;
      eligibleDays += days;
    } else {
      ineligibleCount++;
      ineligibleDays += days;
    }
  });
  const travelItem = EXTRA_CONTRIBUTION_ITEMS.find(i => i.id === 'travel');
  const levelInfo = computeTravelLevelFromDetails(detailArr, bandSince, covidPeriod, { onlyAccepted });
  const opt = travelItem ? travelItem.options.find(o => o.id === levelInfo.optionId) : null;
  return {
    eligibleCount, ineligibleCount, totalCount: eligibleCount + ineligibleCount,
    eligibleDays, ineligibleDays,
    acceptedCount, pendingCount, rejectedCount,
    levelOptionId: levelInfo.optionId,
    levelLabel: opt ? opt.label : '',
    levelScore: opt ? opt.score : 0,
  };
}

// 渲染「可多列」的細項輸入群組 — 每列含名稱 + 發生年月 + 刪除鈕
// className: 每個 name input 的 class(如 'emp-detail' 'bonus-detail' 'emp-cert-detail' 'bonus-cert-detail')
// dataAttrs: 其他要掛的 data-* 屬性字串片段(例:'data-detail-item="stamp"' 等)
// values:    {name, occurredAt}[] (可空)
// placeholder: name 欄位 placeholder 文字
// disabled:  整組是否停用
// itemId:    用於驗證規則('cert' 特例);也會以 data-item-id 存在 add 按鈕上,讓新列的驗證能辨識
// bandSince: 當前 Band 起始年月,用於驗證
// isCert:    是否為 cert 類(只有 placeholder 月份範例會略有差異)
function renderDetailMultiInputs(className, dataAttrs, values, placeholder, disabled, itemId, bandSince, levelOptions) {
  const arr = values && values.length > 0 ? values : [{ name: '', occurredAt: '', weight: '' }];
  const disAttr = disabled ? 'disabled' : '';
  const isIpp = itemId === 'ipp';
  // isListing 應該看 item 是否 listingMode,不是看 levelOptions(countListingMode 項目也是 listing 但沒 levelOptions)
  const itemDefForListing = EXTRA_CONTRIBUTION_ITEMS.find(i => i.id === itemId);
  const isListing = !!(itemDefForListing && itemDefForListing.listingMode);
  // levelOptions 控制「是否渲染 level 下拉」(countListingMode 不渲染)
  const rowAttrs = dataAttrs;
  const rows = arr.map(d => {
    const err = disabled ? null : validateOccurredAt(itemId, d.occurredAt, bandSince);
    const showErr = err && (d.name || d.occurredAt);
    let ippTag = '';
    if (isIpp && d.name && normalizeYearMonth(d.occurredAt)) {
      const inBand = isIppInBandPeriod(d.occurredAt, bandSince);
      const w = parseFloat(d.weight);
      const hasValidWeight = isFinite(w) && w > 0 && w <= 1;
      if (!inBand) {
        ippTag = '<span class="ipp-row-tag ipp-row-tag-out">ⓘ 期間外 · 僅統計</span>';
      } else if (hasValidWeight) {
        ippTag = '<span class="ipp-row-tag ipp-row-tag-in">✓ 計入加分</span>';
      } else {
        ippTag = '<span class="ipp-row-tag ipp-row-tag-warn">⚠ 期間內 · 待填掛名人數</span>';
      }
    }
    const peopleN = (() => {
      const w = parseFloat(d.weight);
      if (!isFinite(w) || w <= 0) return '';
      return String(Math.max(1, Math.round(1 / w)));
    })();
    const weightField = isIpp ? `
      <input type="number" class="${className}-weight" ${rowAttrs} ${disAttr}
             value="${escapeHtml(peopleN)}"
             min="1" step="1" placeholder="掛名人數" title="本筆 IPP 共幾人共掛(獨自 = 1、3 人共掛填 3、13 人填 13)">
    ` : '';
    // listing-mode level 下拉(countListingMode 時 levelOptions=null,不渲染)
    const levelField = (isListing && levelOptions) ? `
      <select class="${className}-level" ${rowAttrs} ${disAttr} title="本筆等級">
        <option value="" ${!d.level ? 'selected' : ''}>-- 等級 --</option>
        ${levelOptions.map(o => `
          <option value="${escapeHtml(o.id)}" ${d.level === o.id ? 'selected' : ''}>${escapeHtml(o.label)}</option>
        `).join('')}
      </select>
    ` : '';
    return `
    <div class="detail-multi-row">
      ${levelField}
      <input type="text" class="${className}" ${rowAttrs} value="${escapeHtml(d.name)}" placeholder="${escapeHtml(placeholder)}" ${disAttr}>
      <input type="month" class="${className}-ym" ${rowAttrs} value="${escapeHtml(d.occurredAt)}" ${disAttr} title="發生年月 (YYYY-MM)">
      ${weightField}
      <button type="button" class="detail-row-remove" data-action="detail-row-remove" title="刪除此列" ${disAttr}>✕</button>
    </div>
    ${ippTag ? `<div class="detail-row-tag">${ippTag}</div>` : ''}
    ${showErr ? `<div class="detail-row-err">⚠ ${escapeHtml(err)}</div>` : ''}
    `;
  }).join('');
  // 把 levelOptions 序列化到 add 按鈕讓動態新列也能渲染下拉
  const levelOptionsJson = (isListing && levelOptions) ? escapeHtml(JSON.stringify(levelOptions)) : '';
  return `
    <div class="detail-multi" data-item-id="${escapeHtml(itemId || '')}"${isListing ? ' data-listing="1"' : ''}>
      ${rows}
      <button type="button" class="detail-row-add" data-action="detail-row-add" data-class="${className}" data-attrs="${escapeHtml(dataAttrs)}" data-placeholder="${escapeHtml(placeholder)}" data-is-ipp="${isIpp ? '1' : ''}" data-level-options="${levelOptionsJson}" ${disAttr}>+ 新增一列</button>
    </div>
  `;
}

// 渲染 Travel Support 專用的「多段出差」輸入(跟 detail-multi-row 復用 CSS 但欄位不同)
// values: { name, startDate, endDate }[]
// disabled: 整組是否停用
function renderTravelDetailInputs(values, disabled, bandSince, covidPeriod) {
  const arr = values && values.length > 0 ? values : [{ name: '', startDate: '', endDate: '' }];
  const disAttr = disabled ? 'disabled' : '';
  const rows = arr.map(d => {
    const days = calcTravelDays(d.startDate, d.endDate);
    // 期間判定 tag(只有當至少 name 有填或日期有填時才顯示)
    let tag = '';
    if (!disabled && (d.name || d.startDate || d.endDate)) {
      if (!d.startDate || !d.endDate) {
        tag = '<span class="ipp-row-tag ipp-row-tag-warn">⚠ 起訖日期不全</span>';
      } else if (days <= 0) {
        tag = '<span class="ipp-row-tag ipp-row-tag-warn">⚠ 回台日須 ≥ 出發日</span>';
      } else {
        const eligible = isTravelEligible(d.startDate, d.endDate, bandSince, covidPeriod);
        if (eligible) {
          tag = `<span class="ipp-row-tag ipp-row-tag-in">✓ 符合條件 · ${days} 天</span>`;
        } else {
          const sYM = ymdToYearMonth(d.startDate);
          const cp = covidPeriod || {};
          let reason = '不符計分條件';
          if (isFutureDate(d.startDate) || isFutureDate(d.endDate)) reason = '未來日期不可填';
          else if (!bandSince) reason = '請先填寫上方「當前 Band 起始年月」';
          else if (!cp.startYYYYMM || !cp.endYYYYMM) reason = '管理員未設定疫情期間';
          else if (compareYearMonth(sYM, bandSince) < 0) reason = '出發日早於 Band 起始';
          else if (compareYearMonth(sYM, cp.startYYYYMM) < 0) reason = '早於疫情期間';
          else if (compareYearMonth(sYM, cp.endYYYYMM) > 0) reason = '晚於疫情期間';
          tag = `<span class="ipp-row-tag ipp-row-tag-warn">⚠ ${escapeHtml(reason)} · 不可提交(${days} 天)</span>`;
        }
      }
    }
    return `
      <div class="detail-multi-row travel-multi-row">
        <input type="text" class="emp-travel-name" value="${escapeHtml(d.name || '')}" placeholder="出差地 / 簡述" ${disAttr}>
        <input type="date" class="emp-travel-start" value="${escapeHtml(d.startDate || '')}" ${disAttr} title="出發日">
        <span style="color:var(--ink-muted);font-family:'JetBrains Mono',monospace;font-size:12px;align-self:center;">→</span>
        <input type="date" class="emp-travel-end" value="${escapeHtml(d.endDate || '')}" ${disAttr} title="回台日">
        <button type="button" class="detail-row-remove" data-action="detail-row-remove" title="刪除此列" ${disAttr}>✕</button>
      </div>
      ${tag ? `<div class="detail-row-tag">${tag}</div>` : ''}
    `;
  }).join('');
  return `
    <div class="detail-multi" data-item-id="travel">
      ${rows}
      <button type="button" class="detail-row-add" data-action="detail-row-add" data-class="emp-travel" data-attrs="" data-placeholder="出差地 / 簡述" data-is-travel="1" ${disAttr}>+ 新增一段出差</button>
    </div>
  `;
}

// =========================================================================
// INIT
// =========================================================================
(async function init() {
  try {
    const sdkReady = await waitForFirebaseSDK();
    if (!sdkReady) {
      throw new Error('Firebase SDK 載入逾時 — 請檢查網路或防火牆是否擋住 gstatic.com');
    }
    initFirebase();
  } catch (e) {
    document.getElementById('app').innerHTML = `<div style="padding:60px;text-align:center;color:#8b2e1f;font-family:sans-serif;"><h2>無法連線到 Firebase</h2><p style="font-size:16px;margin:20px 0;">${e.message}</p><p style="color:#888;margin-top:20px;font-size:13px;">請開 F12 主控台看詳細錯誤,或聯繫管理者</p></div>`;
    console.error('Firebase 初始化失敗', e);
    return;
  }
  state = await loadState();
  // 檢查 URL 是否帶 ?emp=員工ID,有的話直接進員工填寫頁
  const params = new URLSearchParams(window.location.search);
  const empId = params.get('emp');
  if (empId) {
    const emp = state.employees.find(e => e.id === empId);
    if (emp) {
      view = { mode: 'employee_form', payload: { empId } };
    }
  }
  render();
  // 設定頁面右下角版本號(載入完成後顯示)
  const vb = document.getElementById('versionBadge');
  if (vb) vb.textContent = 'v.' + APP_VERSION;
  // 啟動即時同步監聽
  startRealtimeSync();
})();
</script>
</body>
</html>
