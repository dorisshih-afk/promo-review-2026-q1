const ADMIN_TABS = [
  { id: 'stats', label: '評分統計' },
  { id: 'bonus', label: 'Extra Contribution' },
  { id: 'review', label: '自填審核' },
  { id: 'employees', label: '員工管理' },
  { id: 'managers', label: '主管管理' },
  { id: 'dimensions', label: '評分維度' },
  { id: 'settings', label: '系統設定' }
];

function renderAdmin() {
  const tab = view.payload?.tab || 'stats';
  return `
    <div class="tabs">
      ${ADMIN_TABS.map(t => `
        <button class="tab ${t.id === tab ? 'active' : ''}" data-action="admin-tab" data-tab="${t.id}">${t.label}</button>
      `).join('')}
    </div>
    ${renderAdminTab(tab)}
  `;
}

function renderAdminTab(tab) {
  if (tab === 'stats') return renderStatsTab();
  if (tab === 'bonus') return renderBonusTab();
  if (tab === 'review') return renderReviewTab();
  if (tab === 'employees') return renderEmployeesTab();
  if (tab === 'managers') return renderManagersTab();
  if (tab === 'dimensions') return renderDimensionsTab();
  if (tab === 'settings') return renderSettingsTab();
}

function renderStatsTab() {
  const totalEmps = state.employees.length;
  const totalMgrs = state.managers.length;
  // 兩個獨立開關,預設皆關(= 原本的 'raw' 模式)
  const trimMode = !!view.payload?.trimMode;
  const bonusMode = !!view.payload?.bonusMode;
  const techSplit = !!view.payload?.techSplit;

  // 應評分數 = 每位員工 × 該員工的可評主管數
  let expectedReviews = 0;
  state.employees.forEach(e => {
    expectedReviews += eligibleManagers(e).length;
  });
  let completedReviews = 0;
  state.employees.forEach(e => {
    eligibleManagers(e).forEach(m => {
      if (computeManagerTotal(e.id, m.id) !== null) completedReviews++;
    });
  });
  const completion = expectedReviews > 0 ? (completedReviews / expectedReviews * 100) : 0;

  // ranking
  const rows = state.employees.map(e => {
    const raw = computeEmployeeAverage(e.id);
    const trimmed = computeEmployeeAverageTrimmed(e.id);
    const bonus = getEmployeeBonus(e.id).score || 0;
    const eligibleMgrCount = eligibleManagers(e).length;
    const row = {
      emp: e,
      rawAvg: raw.avg,
      trimmedAvg: trimmed.avg,
      bonus,
      count: trimMode ? trimmed.count : raw.count,
      trimmedAny: trimMode ? trimmed.trimmedAny : false,
      eligibleMgrCount,
    };
    row.avg = computeScoreByMode(row, trimMode, bonusMode);
    return row;
  }).sort((a, b) => {
    if (a.avg === null && b.avg === null) return 0;
    if (a.avg === null) return 1;
    if (b.avg === null) return -1;
    return b.avg - a.avg;
  });

  // 升遷資格統計(一律用「不含加分」的 base,和 table row 的 disqualified 判斷一致)
  let qualifiedCount = 0;
  let disqualifiedCount = 0;
  let unscoredCount = 0;
  rows.forEach(r => {
    const judgeBase = computeJudgeBase(r, trimMode);
    const dimAvg = judgeBase !== null && state.dimensions.length > 0 ? judgeBase / state.dimensions.length : null;
    if (dimAvg === null) unscoredCount++;
    else if (dimAvg < 4) disqualifiedCount++;
    else qualifiedCount++;
  });

  return `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">員工人數</div>
        <div class="value">${totalEmps}</div>
      </div>
      <div class="stat-card">
        <div class="label">完成評分</div>
        <div class="value accent">${completedReviews}<span style="font-size:18px;color:var(--ink-muted);"> / ${expectedReviews}</span></div>
        <div class="delta">完成率 ${completion.toFixed(1)}%</div>
      </div>
      <div class="stat-card">
        <div class="label">符合升遷資格</div>
        <div class="value" style="color:var(--green);">${qualifiedCount}<span style="font-size:18px;color:var(--ink-muted);"> / ${totalEmps}</span></div>
        <div class="delta">單項平均 ≥ 4.0</div>
      </div>
      <div class="stat-card">
        <div class="label">不符資格</div>
        <div class="value" style="color:var(--accent);">${disqualifiedCount}</div>
        <div class="delta">${unscoredCount > 0 ? `(另有 ${unscoredCount} 位尚未完成評分)` : '單項平均 < 4.0'}</div>
      </div>
    </div>

    <div class="section-header">
      <h3>員工評分排名</h3>
      <div class="meta">同職等分組排名 · 可展開查看各主管詳細評分</div>
    </div>

    <div class="mode-switcher">
      <div class="mode-switcher-label">排名模式</div>
      <div class="mode-toggles">
        <button class="mode-toggle ${trimMode ? 'on' : ''}" data-action="toggle-trim-mode" title="對每個維度,當該維度評分人數 ≥ 5 時,自動去除最高與最低分後再平均">
          <span class="toggle-indicator">${trimMode ? '✓' : ''}</span>去頭去尾
        </button>
        <button class="mode-toggle ${bonusMode ? 'on' : ''}" data-action="toggle-bonus-mode" title="加上 Extra Contribution 加分(管理者於後台設定)">
          <span class="toggle-indicator">${bonusMode ? '✓' : ''}</span>含加分
        </button>
        <button class="mode-toggle ${techSplit ? 'on' : ''}" data-action="toggle-tech-split" title="將 BIOS+EC 與 Driver(SA) 分開排名,仍按 Band 分組">
          <span class="toggle-indicator">${techSplit ? '✓' : ''}</span>技術分組
        </button>
      </div>
      <div class="mode-switcher-desc">
        ${(!trimMode && !bonusMode) ? '※ 原始平均:各主管的所有評分皆計入,未做任何排除、未含加分' : ''}
        ${( trimMode && !bonusMode) ? '※ 去頭去尾:對每個維度,當該維度評分人數 ≥ 5 時,自動去除最高與最低分後再平均' : ''}
        ${(!trimMode &&  bonusMode) ? '※ 原始 + 加分(90/10):排名分數 = 原始平均 × 0.9 + Extra Contribution × 0.1' : ''}
        ${( trimMode &&  bonusMode) ? '※ 去頭去尾 + 加分(90/10):排名分數 = 去頭去尾平均 × 0.9 + Extra Contribution × 0.1' : ''}
      </div>
    </div>

    ${rows.length === 0 ? '<div class="empty">尚無員工資料</div>' : (() => {
      // 子渲染:一張排名表(給定一組 rows 和標題)
      const renderRankTable = (tableRows, subtitle) => {
        const sorted = [...tableRows].sort((a, b) => {
          if (a.avg === null && b.avg === null) return 0;
          if (a.avg === null) return 1;
          if (b.avg === null) return -1;
          return b.avg - a.avg;
        });
        return `
          ${subtitle ? `<div style="font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:var(--ink-soft);margin:14px 0 6px;padding:4px 8px;background:rgba(139,46,31,0.04);border-left:2px solid var(--accent-soft);">${escapeHtml(subtitle)} · ${sorted.length} 位</div>` : ''}
          <table class="results">
            <thead>
              <tr>
                <th style="width:40px;">名次</th>
                <th>員工</th>
                <th>英文名</th>
                <th style="width:70px;">技術</th>
                <th>單位</th>
                <th class="num">${bonusMode ? '加分後總分' : '平均總分'}</th>
                <th class="num">平均單項</th>
                <th class="num" style="width:60px;">加分</th>
                <th class="num" style="width:90px;" title="員工自填的 IPP 數量(總數,以及期間內/期間外的拆分)">IPP 數<br><span style="font-weight:400;font-size:9px;color:var(--ink-muted);text-transform:none;letter-spacing:0;">總 / 內·外</span></th>
                <th class="num">評分人數</th>
                <th style="width:90px;"></th>
              </tr>
            </thead>
            <tbody>
              ${sorted.map((r, i) => {
                const detailId = 'detail_' + r.emp.id;
                const judgeBase = computeJudgeBase(r, trimMode);
                const dimAvgForJudge = judgeBase !== null && state.dimensions.length > 0 ? judgeBase / state.dimensions.length : null;
                const disqualified = dimAvgForJudge !== null && dimAvgForJudge < 4;
                // IPP 數量(僅顯示,不影響排序)— 只算員工自填的 itemDetails.ipp
                const ippSub = getEmployeeSubmission(r.emp.id);
                const ippDetails = normalizeDetail(ippSub.data?.itemDetails?.ipp);
                const ippSum = ippDetails.length > 0 ? summarizeIpp(ippDetails, r.emp.bandSinceYYYYMM, { onlyAccepted: true }) : null;
                return `
                  <tr class="${disqualified ? 'disqualified-row' : ''}">
                    <td class="mono" style="color:var(--ink-muted);">${(i+1).toString().padStart(2,'0')}</td>
                    <td class="name">${escapeHtml(r.emp.name)}${disqualified ? '<span class="disqualified-tag">不符資格</span>' : ''}</td>
                    <td style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft);">${escapeHtml(r.emp.enName || '')}</td>
                    <td><span class="tech-tag">${escapeHtml(getEmployeeTech(r.emp))}</span></td>
                    <td style="color:var(--ink-muted);">${escapeHtml(displayDept(r.emp.dept))}</td>
                    <td class="num score-cell">${fmt(r.avg, 2)}${r.trimmedAny && trimMode ? '<span class="trim-tag">已排除</span>' : ''}${bonusMode && r.bonus > 0 ? '<span class="bonus-tag" title="加分項已縮為 10%(原 +' + r.bonus + ' → 實際貢獻 +' + (r.bonus * 0.1).toFixed(2) + ')">+' + r.bonus + '×10%</span>' : ''}</td>
                    <td class="num ${disqualified ? 'disqualified-num' : ''}">${fmt(dimAvgForJudge, 2)}</td>
                    <td class="num" style="color:${r.bonus > 0 ? 'var(--gold)' : 'var(--ink-muted)'};font-weight:${r.bonus > 0 ? '600' : '400'};">${r.bonus > 0 ? '+' + r.bonus : '—'}</td>
                    <td class="num" title="${ippSum ? `期間內 ${ippSum.inCount} 筆 · 期間外 ${ippSum.outCount} 筆` : '員工未填 IPP'}" style="font-family:'JetBrains Mono',monospace;font-size:12px;color:${ippSum && ippSum.totalCount > 0 ? 'var(--ink)' : 'var(--ink-muted)'};">
                      ${ippSum && ippSum.totalCount > 0
                        ? `<b>${ippSum.totalCount}</b><br><span style="color:var(--ink-muted);font-size:10px;font-weight:400;">${ippSum.inCount}內 / ${ippSum.outCount}外</span>`
                        : '—'}
                    </td>
                    <td class="num">${r.count} / ${r.eligibleMgrCount}</td>
                    <td><button class="detail-toggle" data-action="toggle-detail" data-target="${detailId}">展開</button></td>
                  </tr>
                  <tr class="detail-row hidden" id="${detailId}">
                    <td colspan="11"><div class="detail-content">${renderEmpDetail(r.emp)}</div></td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        `;
      };

      // group by current band
      const bandGroups = {};
      rows.forEach(r => {
        const b = r.emp.currentBand ?? '未設定';
        if (!bandGroups[b]) bandGroups[b] = [];
        bandGroups[b].push(r);
      });
      const sortedBands = Object.keys(bandGroups).sort((a, b) => {
        if (a === '未設定') return 1;
        if (b === '未設定') return -1;
        return Number(b) - Number(a);
      });
      return sortedBands.map(band => {
        const groupRows = bandGroups[band];
        const targetBand = band !== '未設定' ? Number(band) + 1 : '—';
        let tablesHtml;
        if (!techSplit) {
          tablesHtml = renderRankTable(groupRows, null);
        } else {
          // 按技術組切:bios_ec → driver → other(other 只有在有員工時才顯示)
          const buckets = { bios_ec: [], driver: [], other: [] };
          groupRows.forEach(r => { buckets[getEmployeeTechGroup(r.emp)].push(r); });
          const order = ['bios_ec', 'driver', 'other'];
          tablesHtml = order
            .filter(key => buckets[key].length > 0)
            .map(key => renderRankTable(buckets[key], TECH_GROUP_LABELS[key]))
            .join('');
        }
        return `
          <div class="band-group">
            <div class="band-header">
              <div class="band-title">
                <span class="band-from">Band ${band}</span>
                <span class="band-arrow">→</span>
                <span class="band-to">Band ${targetBand}</span>
              </div>
              <div class="band-meta">${groupRows.length} 位候選人${techSplit ? ' · 已依技術分組' : ''}</div>
            </div>
            ${tablesHtml}
          </div>
        `;
      }).join('');
    })()}

    <div style="margin-top:24px;display:flex;gap:10px;">
      <button class="btn secondary" data-action="export-csv">匯出 CSV</button>
      <button class="btn secondary" data-action="export-detail-csv">匯出明細 CSV</button>
    </div>
  `;
}

function renderEmpDetail(emp) {
  const trimMode = view.payload?.trimMode || false;
  const hideUnscored = !!view.payload?.hideUnscored;

  const totalsByMgr = state.managers.map(m => {
    const scores = getManagerScoreForEmployee(emp.id, m.id);
    const total = computeManagerTotal(emp.id, m.id);
    const cannotReview = !canManagerReview(m, emp);
    return { mgr: m, scores, total, cannotReview };
  });

  // 取得每維度的詳細統計(含排除資訊)
  const dimStats = computeDimensionStats(emp.id);

  // 哪些主管在哪些維度被排除(依模式決定是否顯示排除)
  const isExcluded = (mgrId, dimId) => {
    if (!trimMode) return false;
    return dimStats[dimId]?.excludedMgrs?.includes(mgrId);
  };

  if (state.dimensions.length === 0) return '<div class="empty" style="padding:20px;">尚未設定評分維度</div>';

  // 對每個有效主管計算「按目前模式」的總分
  const computeMgrDisplayTotal = (t) => {
    if (t.cannotReview || t.total === null) return null;
    if (!trimMode) return t.total;
    // trim mode: 只計入未被排除的維度
    let sum = 0, count = 0;
    state.dimensions.forEach(d => {
      if (isExcluded(t.mgr.id, d.id)) return;
      if (typeof t.scores[d.id] === 'number') { sum += t.scores[d.id]; count++; }
    });
    return count > 0 ? sum : null;  // 在 trim 模式下,若該主管所有維度都被排除則為 null
  };

  // 加總所有調整後維度平均 = 員工總分
  const summaryTotal = trimMode
    ? state.dimensions.reduce((acc, d) => acc + (dimStats[d.id]?.trimmedAvg || 0), 0)
    : state.dimensions.reduce((acc, d) => acc + (dimStats[d.id]?.rawAvg || 0), 0);

  // group dimensions
  const groups = {};
  state.dimensions.forEach(d => {
    const g = d.group || '其他';
    if (!groups[g]) groups[g] = [];
    groups[g].push(d);
  });
  const groupNames = Object.keys(groups);

  // 「無評分權」的主管一律不顯示(沒資格評、沒資訊價值,只占版面)
  const reviewable = totalsByMgr.filter(t => !t.cannotReview);
  // 依開關過濾「有權但還沒評」的主管列
  const hiddenCount = hideUnscored
    ? reviewable.filter(t => t.total === null).length
    : 0;
  const visibleMgrs = hideUnscored
    ? reviewable.filter(t => t.total !== null)
    : reviewable;

  return `
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:8px;">
      <h4 style="margin:0;">${escapeHtml(emp.name)} · 各主管評分明細 ${trimMode ? '<span class="trim-tag">排除最高最低模式</span>' : ''}</h4>
      <label style="display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);cursor:pointer;letter-spacing:0.04em;">
        <input type="checkbox" data-action="toggle-hide-unscored" ${hideUnscored ? 'checked' : ''} style="cursor:pointer;">
        隱藏未評分主管${hideUnscored && hiddenCount > 0 ? ` <span style="color:var(--ink-muted);">(已隱藏 ${hiddenCount} 位)</span>` : ''}
      </label>
    </div>
    <table class="detail-table">
      <thead>
        <tr>
          <th rowspan="2" style="vertical-align:bottom;">主管</th>
          ${groupNames.map(g => `<th colspan="${groups[g].length}" style="text-align:center;border-bottom:1px solid var(--line-soft);">${escapeHtml(g)}</th>`).join('')}
          <th rowspan="2" class="num" style="vertical-align:bottom;">總分</th>
        </tr>
        <tr>
          ${groupNames.map(g => groups[g].map(d => `<th class="num" style="font-size:9px;">${escapeHtml(d.name)}</th>`).join('')).join('')}
        </tr>
      </thead>
      <tbody>
        ${visibleMgrs.map(t => {
          if (t.cannotReview) {
            return `
              <tr style="opacity:0.45;">
                <td>${escapeHtml(t.mgr.name)} <span style="font-family:'JetBrains Mono',monospace;font-size:9px;background:var(--ink-muted);color:var(--bg-paper);padding:1px 6px;letter-spacing:0.1em;">無評分權</span></td>
                ${state.dimensions.map(() => `<td class="num">—</td>`).join('')}
                <td class="num">—</td>
              </tr>
            `;
          }
          const displayTotal = computeMgrDisplayTotal(t);
          return `
            <tr>
              <td>${escapeHtml(t.mgr.name)}</td>
              ${state.dimensions.map(d => {
                const v = t.scores[d.id];
                if (typeof v !== 'number') return `<td class="num">—</td>`;
                if (isExcluded(t.mgr.id, d.id)) {
                  return `<td class="num" style="color:var(--ink-muted);text-decoration:line-through;background:rgba(176,141,58,0.08);" title="本維度最高/最低分,已排除">${fmt(v, 1)}</td>`;
                }
                return `<td class="num">${fmt(v, 1)}</td>`;
              }).join('')}
              <td class="num">${fmt(displayTotal, 2)}</td>
            </tr>
          `;
        }).join('')}
        <tr class="summary-row">
          <td>${trimMode ? '調整後平均' : '原始平均'}</td>
          ${state.dimensions.map(d => {
            const stat = dimStats[d.id];
            if (!stat || stat.rawAvg === null) return `<td class="num">—</td>`;
            return `<td class="num">${fmt(trimMode ? stat.trimmedAvg : stat.rawAvg, 2)}</td>`;
          }).join('')}
          <td class="num">${fmt(summaryTotal, 2)}</td>
        </tr>
        ${trimMode ? `
          <tr style="opacity:0.6;">
            <td style="font-size:11px;color:var(--ink-muted);">原始平均(對照)</td>
            ${state.dimensions.map(d => {
              const stat = dimStats[d.id];
              if (!stat || stat.rawAvg === null) return `<td class="num" style="font-size:11px;">—</td>`;
              return `<td class="num" style="font-size:11px;color:var(--ink-muted);">${fmt(stat.rawAvg, 2)}</td>`;
            }).join('')}
            <td class="num" style="font-size:11px;color:var(--ink-muted);">${fmt(state.dimensions.reduce((acc, d) => acc + (dimStats[d.id]?.rawAvg || 0), 0), 2)}</td>
          </tr>
        ` : ''}
      </tbody>
    </table>
    ${renderEmpBonusForAdmin(emp)}
  `;
}

// Admin 端「展開明細」用的加分明細區塊
// 跟 renderEmpBonusForReviewer 不同:這裡顯示分數(主管端會被擋,但管理者要看)
function renderEmpBonusForAdmin(emp) {
  const sub = getEmployeeSubmission(emp.id);
  const bonus = getEmployeeBonus(emp.id);  // 實際採用的(管理員代填或審核後)
  const data = sub.data || {};
  const status = sub.status;
  // 狀態 badge (跟 reviewer 端用同一套樣式)
  let badgeBg, badgeColor, badgeText;
  if (!sub || (!data.items && !data.itemDetails)) {
    badgeBg = 'transparent'; badgeColor = 'var(--ink-muted)'; badgeText = '— 員工尚未填寫';
  } else if (status === 'draft') {
    badgeBg = 'rgba(176,141,58,0.15)'; badgeColor = 'var(--gold)'; badgeText = '草稿 · 員工編輯中';
  } else if (status === 'submitted') {
    badgeBg = 'rgba(139,46,31,0.12)'; badgeColor = 'var(--accent)'; badgeText = '已提交 · 待審核';
  } else if (status === 'reviewed') {
    badgeBg = 'rgba(74,107,58,0.15)'; badgeColor = 'var(--green)'; badgeText = '已審核';
  } else {
    badgeBg = 'transparent'; badgeColor = 'var(--ink-muted)'; badgeText = '—';
  }

  // 把員工填的內容(原始)整理出來,按 EXTRA_CONTRIBUTION_ITEMS 順序
  const empLines = [];
  EXTRA_CONTRIBUTION_ITEMS.forEach(item => {
    const sel = data.items?.[item.id];
    // Listing-mode 特例:每筆細項各自有等級 + 審核狀態(顯示分數)
    if (item.listingMode) {
      const noneFlag = !!data.itemNoneFlags?.[item.id];
      const detailArr = migrateListedDetails(item, sub, data);
      if (noneFlag && detailArr.length === 0) {
        empLines.push(`
          <div style="padding:10px 0;border-bottom:1px solid var(--line-soft);">
            <div style="font-size:13px;color:var(--ink);">
              <b>${escapeHtml(item.name)}</b>
              <span style="color:var(--ink-soft);margin-left:6px;">— 員工已確認本項無可加分</span>
              <span style="color:var(--ink-muted);font-family:'JetBrains Mono',monospace;font-size:11px;margin-left:6px;">不加分</span>
            </div>
          </div>
        `);
        return;
      }
      if (detailArr.length === 0) return;
      const summary = summarizeListedItem(item, detailArr, { bandSince: emp.bandSinceYYYYMM });
      const rowsHtml = detailArr.map(d => {
        const opt = item.options.find(o => o.id === d.level);
        const optLabel = item.countListingMode ? '' : (opt ? opt.label : '(未設等級)');
        const optScore = opt ? opt.score : 0;
        const dec = d.reviewDecision || 'pending';
        let decBadge;
        if (dec === 'accepted') decBadge = '<span style="color:var(--green);font-family:\'JetBrains Mono\',monospace;font-size:10px;letter-spacing:0.06em;">✓ 已接受</span>';
        else if (dec === 'rejected') decBadge = '<span style="color:var(--accent);font-family:\'JetBrains Mono\',monospace;font-size:10px;letter-spacing:0.06em;">✗ 已拒</span>';
        else decBadge = '<span style="color:var(--ink-muted);font-family:\'JetBrains Mono\',monospace;font-size:10px;letter-spacing:0.06em;">⋯ 待審</span>';
        return `<div style="font-size:11px;color:var(--ink-soft);padding-left:14px;margin-top:2px;">
          • ${escapeHtml(d.name)}
          <span style="color:var(--ink-muted);font-family:'JetBrains Mono',monospace;">${
            item.reviewerScoring
              ? ((typeof d.reviewerScore === 'number' ? '+' + d.reviewerScore + ' 分' : '(尚未填分)') + (d.occurredAt ? ' · ' + escapeHtml(d.occurredAt) : ''))
              : item.countListingMode
                ? (d.occurredAt ? escapeHtml(d.occurredAt) : '')
                : escapeHtml(optLabel) + ' (+' + optScore + ')' + (d.occurredAt ? ' · ' + escapeHtml(d.occurredAt) : '')
          }</span>
          <span style="margin-left:6px;">${decBadge}</span>
        </div>`;
      }).join('');
      empLines.push(`
        <div style="padding:10px 0;border-bottom:1px solid var(--line-soft);">
          <div style="font-size:13px;color:var(--ink);">
            <b>${escapeHtml(item.name)}</b>
            <span style="color:var(--ink-soft);margin-left:6px;">— 列舉 ${detailArr.length} 筆</span>
            ${summary.acceptedScore > 0 ? `<span style="color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:11px;margin-left:6px;font-weight:600;">+${summary.acceptedScore}(已接受 ${summary.acceptedCount} 筆)</span>` : ''}
          </div>
          ${rowsHtml}
        </div>
      `);
      return;
    }
    // IPP 特例:即使 items.ipp 沒設(權重 < 0.1),只要 itemDetails.ipp 有東西也要顯示
    if (item.id === 'ipp') {
      const detailArr = normalizeDetail(data.itemDetails?.ipp);
      if (detailArr.length === 0) return;
      const summary = summarizeIpp(detailArr, emp.bandSinceYYYYMM, { onlyAccepted: true });
      const review = sub.reviewedItems?.ipp;
      const levelText = summary.totalCount === 0
        ? '無'
        : (summary.levelLabel || '無 (期間內權重不足 0.1)');
      const rowsHtml = detailArr.map(d => {
        const inBand = isIppInBandPeriod(d.occurredAt, emp.bandSinceYYYYMM);
        const tagColor = inBand ? 'var(--green)' : 'var(--gold)';
        const tagText = inBand ? '✓ 期間內' : 'ⓘ 期間外';
        const w = d.weight ? formatIppWeightDisplay(d.weight) : '未填掛名人數';
        return `<div style="font-size:11px;color:var(--ink-soft);padding-left:14px;margin-top:2px;">
          • ${escapeHtml(d.name)}
          ${d.occurredAt ? `<span style="color:var(--ink-muted);font-family:'JetBrains Mono',monospace;">(${escapeHtml(d.occurredAt)})</span>` : ''}
          <span style="color:var(--ink-muted);font-family:'JetBrains Mono',monospace;font-size:10px;">· ${w}</span>
          <span style="color:${tagColor};font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.06em;margin-left:4px;">${tagText}</span>
        </div>`;
      }).join('');
      const reviewBadge = renderReviewStatusInline(review, item);
      empLines.push(`
        <div style="padding:10px 0;border-bottom:1px solid var(--line-soft);">
          <div style="font-size:13px;color:var(--ink);">
            <b>${escapeHtml(item.name)}</b>
            <span style="color:var(--ink-soft);margin-left:6px;">— 自動判定:${escapeHtml(levelText)}</span>
            ${summary.levelScore > 0 ? `<span style="color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:11px;margin-left:6px;font-weight:600;">+${summary.levelScore}</span>` : ''}
            ${reviewBadge}
          </div>
          <div style="font-size:11px;color:var(--ink-muted);padding-left:14px;margin-top:3px;font-family:'JetBrains Mono',monospace;letter-spacing:0.04em;">
            期間內 ${summary.inCount} 筆(權重 ${summary.inWeight}) · 期間外 ${summary.outCount} 筆(權重 ${summary.outWeight}) · 總 ${summary.totalCount} 筆
          </div>
          ${rowsHtml}
        </div>
      `);
      return;
    }
    // Travel 特例:同 IPP,但顯示分數
    if (item.id === 'travel') {
      const travelArr = normalizeTravelDetail(data.itemDetails?.travel);
      if (travelArr.length === 0) return;
      const cp = state.covidPeriod || {};
      const summary = summarizeTravel(travelArr, emp.bandSinceYYYYMM, cp);
      const review = sub.reviewedItems?.travel;
      const levelText = summary.totalCount === 0
        ? '無'
        : (summary.levelLabel || `無 (合計 ${summary.eligibleDays} 天 < 30)`);
      const rowsHtml = travelArr.map(d => {
        const days = calcTravelDays(d.startDate, d.endDate);
        const eligible = days > 0 && isTravelEligible(d.startDate, d.endDate, emp.bandSinceYYYYMM, cp);
        const tagColor = eligible ? 'var(--green)' : 'var(--gold)';
        const tagText = eligible ? `✓ 計入(${days} 天)` : (days > 0 ? `ⓘ 不計入(${days} 天)` : '⚠ 日期不全');
        const dateStr = (d.startDate && d.endDate) ? `${d.startDate} → ${d.endDate}` : '日期未填齊';
        return `<div style="font-size:11px;color:var(--ink-soft);padding-left:14px;margin-top:2px;">
          • ${escapeHtml(d.name || '(未命名段)')}
          <span style="color:var(--ink-muted);font-family:'JetBrains Mono',monospace;">${escapeHtml(dateStr)}</span>
          <span style="color:${tagColor};font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.06em;margin-left:4px;">${tagText}</span>
        </div>`;
      }).join('');
      empLines.push(`
        <div style="padding:10px 0;border-bottom:1px solid var(--line-soft);">
          <div style="font-size:13px;color:var(--ink);">
            <b>${escapeHtml(item.name)}</b>
            <span style="color:var(--ink-soft);margin-left:6px;">— 自動判定:${escapeHtml(levelText)}</span>
            ${summary.levelScore > 0 ? `<span style="color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:11px;margin-left:6px;font-weight:600;">+${summary.levelScore}</span>` : ''}
            ${renderReviewStatusInline(review, item)}
          </div>
          <div style="font-size:11px;color:var(--ink-muted);padding-left:14px;margin-top:3px;font-family:'JetBrains Mono',monospace;letter-spacing:0.04em;">
            計入 ${summary.eligibleCount} 段(${summary.eligibleDays} 天) · 不計入 ${summary.ineligibleCount} 段(${summary.ineligibleDays} 天) · 總 ${summary.totalCount} 段
          </div>
          ${rowsHtml}
        </div>
      `);
      return;
    }
    if (item.type === 'single') {
      if (!sel || sel === 'none') return;
      const opt = item.options.find(o => o.id === sel);
      if (!opt) return;
      const review = sub.reviewedItems?.[item.id];
      const detailArr = normalizeDetail(data.itemDetails?.[item.id]);
      const detailHtml = detailArr.length > 0
        ? detailArr.map(d => `<div style="font-size:11px;color:var(--ink-soft);padding-left:14px;margin-top:2px;">• ${escapeHtml(d.name)}${d.occurredAt ? ` <span style="color:var(--ink-muted);font-family:'JetBrains Mono',monospace;">(${escapeHtml(d.occurredAt)})</span>` : ''}</div>`).join('')
        : '<div style="font-size:11px;color:var(--ink-muted);padding-left:14px;margin-top:2px;font-style:italic;">(未填具體說明)</div>';
      empLines.push(`
        <div style="padding:10px 0;border-bottom:1px solid var(--line-soft);">
          <div style="font-size:13px;color:var(--ink);">
            <b>${escapeHtml(item.name)}</b>
            <span style="color:var(--ink-soft);margin-left:6px;">— ${escapeHtml(opt.label)}</span>
            ${opt.score > 0 ? `<span style="color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:11px;margin-left:6px;font-weight:600;">+${opt.score}</span>` : ''}
            ${renderReviewStatusInline(review, item)}
          </div>
          ${detailHtml}
        </div>
      `);
    } else {
      // multi (cert)
      const arr = Array.isArray(sel) ? sel : [];
      if (arr.length === 0) return;
      const certHtml = arr.map(optId => {
        const opt = item.options.find(o => o.id === optId);
        if (!opt) return '';
        const review = sub.reviewedCertItems?.[optId];
        const detailArr = normalizeDetail(data.certDetails?.[optId]);
        const detailLine = detailArr.length > 0
          ? detailArr.map(d => `${escapeHtml(d.name)}${d.occurredAt ? ` (${escapeHtml(d.occurredAt)})` : ''}`).join(' / ')
          : '(未填具體說明)';
        return `
          <div style="font-size:12px;color:var(--ink-soft);padding-left:14px;margin-top:3px;">
            • <b>${escapeHtml(opt.label)}</b>
            ${opt.score > 0 ? `<span style="color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:10px;margin-left:4px;font-weight:600;">+${opt.score}</span>` : ''}
            <span style="color:var(--ink-muted);">— ${escapeHtml(detailLine)}</span>
            ${renderReviewStatusInline(review, null)}
          </div>
        `;
      }).join('');
      empLines.push(`
        <div style="padding:10px 0;border-bottom:1px solid var(--line-soft);">
          <div style="font-size:13px;color:var(--ink);"><b>${escapeHtml(item.name)}</b> <span style="color:var(--ink-muted);">(${arr.length} 項)</span></div>
          ${certHtml}
        </div>
      `);
    }
  });
  // Others
  if ((data.others || 0) > 0 || (data.othersNote || '').trim()) {
    const review = sub.reviewedItems?.others;
    const note = (data.othersNote || '').trim() || '(未填說明)';
    empLines.push(`
      <div style="padding:10px 0;border-bottom:1px solid var(--line-soft);">
        <div style="font-size:13px;color:var(--ink);">
          <b>Others</b>
          <span style="color:var(--ink-soft);margin-left:6px;">— 其他特殊貢獻</span>
          ${(data.others || 0) > 0 ? `<span style="color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:11px;margin-left:6px;font-weight:600;">+${data.others}</span>` : ''}
          ${renderReviewStatusInline(review, null)}
        </div>
        <div style="font-size:11px;color:var(--ink-soft);padding-left:14px;margin-top:2px;">• ${escapeHtml(note)}</div>
      </div>
    `);
  }

  const isEmpty = empLines.length === 0;

  return `
    <div style="margin-top:18px;background:var(--bg);border:1px solid var(--line-soft);padding:16px 20px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:${isEmpty ? '0' : '8px'};flex-wrap:wrap;gap:8px;">
        <div style="display:flex;align-items:baseline;gap:14px;">
          <div style="font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.16em;color:var(--ink-muted);">
            員工自填 · Extra Contribution
          </div>
          ${bonus.score > 0 ? `<div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gold);letter-spacing:0.04em;">實際採用 +${bonus.score}</div>` : ''}
        </div>
        <div style="display:inline-flex;align-items:center;padding:3px 10px;background:${badgeBg};color:${badgeColor};font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.08em;">
          ${badgeText}
        </div>
      </div>
      ${isEmpty
        ? '<div style="font-size:11px;color:var(--ink-muted);font-style:italic;">員工未透過自填連結提交任何加分項目;若管理者另外代填,實際採用值會顯示於右上。</div>'
        : empLines.join('')}
    </div>
  `;
}

// 內聯顯示審核狀態 tag(供 admin/reviewer 共用,但 admin 版本可額外顯示分數)
function renderReviewStatusInline(review, item) {
  if (review === 'accepted') return '<span style="color:var(--green);font-family:\'JetBrains Mono\',monospace;font-size:10px;letter-spacing:0.06em;margin-left:6px;">✓ 接受</span>';
  if (review === 'rejected') return '<span style="color:var(--accent);font-family:\'JetBrains Mono\',monospace;font-size:10px;letter-spacing:0.06em;margin-left:6px;">✗ 拒絕</span>';
  if (review && typeof review === 'object' && review.adjustedTo && item) {
    const adj = item.options.find(o => o.id === review.adjustedTo);
    return `<span style="color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.06em;margin-left:6px;">↔ 已調整為 ${escapeHtml(adj ? adj.label : '')}</span>`;
  }
  if (review === 'pending') {
    return '<span style="color:var(--ink-muted);font-family:\'JetBrains Mono\',monospace;font-size:10px;letter-spacing:0.06em;margin-left:6px;">⋯ 待審</span>';
  }
  return '';
}

                        <div class="bonus-item-control">
                          <div style="display:flex;gap:10px;align-items:center;">
                            <input type="number" step="0.1" min="0" max="20" value="${data.others || 0}" data-bonus-emp="${e.id}" data-others="score" class="bonus-input" style="width:80px;text-align:center;">
                            <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-muted);">分</span>
                            <input type="text" value="${escapeHtml(data.othersNote || '')}" placeholder="說明(例: 特殊專案貢獻)" data-bonus-emp="${e.id}" data-others="note" class="bonus-input" style="flex:1;font-size:13px;">
                          </div>
                        </div>
                      </div>

                      ${bonus.breakdown.length > 0 ? `
                        <div class="bonus-summary">
                          <div style="font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--ink-muted);margin-bottom:8px;">加分明細</div>
                          ${bonus.breakdown.map(b => `
                            <div style="padding:6px 0;font-size:13px;border-bottom:1px dashed var(--line-soft);">
                              <div style="display:flex;justify-content:space-between;">
                                <span><b>${escapeHtml(b.itemName)}</b>: ${escapeHtml(b.label)}</span>
                                <span style="font-family:'JetBrains Mono',monospace;color:var(--gold);font-weight:600;">+${b.score}</span>
                              </div>
                              ${b.detail ? `<div style="font-size:12px;color:var(--ink-soft);margin-top:2px;padding-left:12px;border-left:2px solid var(--gold);">${escapeHtml(b.detail)}</div>` : ''}
                            </div>
                          `).join('')}
                          <div style="display:flex;justify-content:space-between;padding-top:10px;margin-top:8px;border-top:1px solid var(--line-soft);font-family:'Fraunces',serif;font-size:18px;">
                            <span>合計</span>
                            <span style="color:var(--gold);font-weight:600;">+${bonus.score}</span>
                          </div>
                        </div>
                      ` : ''}

                      <div style="margin-top:16px;display:flex;justify-content:flex-end;gap:10px;">
                        <button class="btn secondary small" data-action="reset-bonus-emp" data-id="${e.id}">清除此員工加分</button>
                        <button class="btn small" data-action="save-bonus-emp" data-id="${e.id}">儲存</button>
                      </div>
                    </div>
                  ` : ''}
                </div>
              `;
            }).join('')}
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function renderReviewTab() {
  // 找出有提交資料的員工
  const submissions = state.empSubmissions || {};
  const reviewingEmpId = view.payload?.reviewingEmp || null;

  // 列出所有員工依狀態分類
  const submitted = [];
  const reviewed = [];
  const draft = [];
  const noSubmission = [];
  state.employees.forEach(e => {
    const sub = submissions[e.id];
    if (!sub || sub.status === 'draft') {
      if (sub && sub.data && Object.keys(sub.data.items || {}).length > 0) {
        draft.push(e);
      } else {
        noSubmission.push(e);
      }
    } else if (sub.status === 'submitted') {
      submitted.push(e);
    } else if (sub.status === 'reviewed') {
      reviewed.push(e);
    }
  });

  // 如果在審核某個員工,顯示審核介面
  if (reviewingEmpId) {
    return renderReviewDetail(reviewingEmpId);
  }

  return `
    <div class="admin-section">
      <h3>員工自填審核</h3>
      <div style="font-size:13px;color:var(--ink-soft);line-height:1.7;margin-bottom:18px;">
        員工從專屬連結提交的 Extra Contribution 申請,在此審核每一項。<br>
        <span style="color:var(--ink-muted);font-size:12px;">審核完成後,系統會自動把通過的項目套用到「評分統計 → 加分後」模式中。</span>
      </div>

      <div class="stats-grid" style="grid-template-columns:repeat(4, 1fr);">
        <div class="stat-card">
          <div class="label">待審核</div>
          <div class="value" style="color:var(--gold);">${submitted.length}</div>
        </div>
        <div class="stat-card">
          <div class="label">已審核</div>
          <div class="value" style="color:var(--green);">${reviewed.length}</div>
        </div>
        <div class="stat-card">
          <div class="label">草稿中</div>
          <div class="value" style="color:var(--ink-muted);">${draft.length}</div>
        </div>
        <div class="stat-card">
          <div class="label">尚未填寫</div>
          <div class="value" style="color:var(--ink-muted);">${noSubmission.length}</div>
        </div>
      </div>

      ${submitted.length > 0 ? `
        <div style="margin-top:24px;">
          <h4 style="font-family:'Fraunces',serif;font-size:18px;margin-bottom:10px;color:var(--gold);">⏳ 待審核(${submitted.length})</h4>
          ${submitted.map(e => renderEmpSubmissionRow(e, 'submitted')).join('')}
        </div>
      ` : ''}

      ${reviewed.length > 0 ? `
        <div style="margin-top:24px;">
          <h4 style="font-family:'Fraunces',serif;font-size:18px;margin-bottom:10px;color:var(--green);">✓ 已審核(${reviewed.length})</h4>
          ${reviewed.map(e => renderEmpSubmissionRow(e, 'reviewed')).join('')}
        </div>
      ` : ''}

      ${draft.length > 0 ? `
        <div style="margin-top:24px;">
          <h4 style="font-family:'Fraunces',serif;font-size:18px;margin-bottom:10px;color:var(--ink-muted);">📝 員工編輯中(${draft.length})</h4>
          ${draft.map(e => renderEmpSubmissionRow(e, 'draft')).join('')}
        </div>
      ` : ''}

      ${noSubmission.length > 0 ? `
        <div style="margin-top:24px;">
          <h4 style="font-family:'Fraunces',serif;font-size:18px;margin-bottom:10px;color:var(--ink-muted);">— 尚未填寫(${noSubmission.length})</h4>
          <div style="font-size:12px;color:var(--ink-muted);margin-bottom:10px;">提醒這些員工填寫,或可在 Extra Contribution 頁直接代填</div>
          ${noSubmission.map(e => `
            <div class="link-row" style="opacity:0.6;">
              <div class="link-info">
                <div style="font-family:'Fraunces',serif;font-size:14px;">${escapeHtml(e.name)} <span style="color:var(--ink-muted);font-size:12px;font-family:'JetBrains Mono',monospace;">${escapeHtml(e.enName || '')}</span></div>
              </div>
            </div>
          `).join('')}
        </div>
      ` : ''}
    </div>
  `;
}

function renderEmpSubmissionRow(emp, status) {
  const sub = getEmployeeSubmission(emp.id);
  // 計算員工提交的總分
  let appliedTotal = 0;
  let itemCount = 0;
  EXTRA_CONTRIBUTION_ITEMS.forEach(item => {
    const sel = sub.data?.items?.[item.id];
    if (item.type === 'single') {
      if (!sel || sel === 'none') return;
      const opt = item.options.find(o => o.id === sel);
      if (opt) { appliedTotal += opt.score; itemCount++; }
    } else {
      const arr = Array.isArray(sel) ? sel : [];
      arr.forEach(optId => {
        const opt = item.options.find(o => o.id === optId);
        if (opt) { appliedTotal += opt.score; itemCount++; }
      });
    }
  });
  if (sub.data?.others > 0) { appliedTotal += sub.data.others; itemCount++; }

  // reviewed 模式:顯示實際加分
  let actualBonus = null;
  if (status === 'reviewed') {
    actualBonus = getEmployeeBonus(emp.id).score;
  }

  return `
    <div class="link-row" style="background:var(--bg);">
      <div class="link-info">
        <div style="font-family:'Fraunces',serif;font-size:15px;font-weight:500;">
          ${escapeHtml(emp.name)}
          <span style="color:var(--ink-muted);font-size:12px;font-family:'JetBrains Mono',monospace;margin-left:6px;">${escapeHtml(emp.enName || '')}</span>
          <span class="tech-tag" style="margin-left:6px;">${escapeHtml(getEmployeeTech(emp))}</span>
          <span style="color:var(--ink-muted);font-size:12px;margin-left:6px;">Band ${emp.currentBand} → ${emp.currentBand + 1}</span>
        </div>
        <div style="font-size:12px;color:var(--ink-muted);margin-top:4px;font-family:'JetBrains Mono',monospace;">
          申請 ${itemCount} 項 · 申請總分 ${appliedTotal.toFixed(1)}
          ${actualBonus !== null ? ` · <span style="color:var(--green);font-weight:600;">實際加分 +${actualBonus}</span>` : ''}
          ${sub.submittedAt ? ` · 提交於 ${new Date(sub.submittedAt).toLocaleString('zh-TW')}` : ''}
        </div>
      </div>
      <div style="display:flex;gap:8px;">
        ${status === 'submitted' ? `<button class="btn small" data-action="open-review" data-id="${emp.id}">開始審核</button>` : ''}
        ${status === 'reviewed' ? `<button class="btn secondary small" data-action="open-review" data-id="${emp.id}">查看 / 重新審核</button>` : ''}
        ${status === 'draft' ? `<button class="btn secondary small" data-action="open-review" data-id="${emp.id}">查看草稿</button>` : ''}
        ${status === 'draft' ? `<button class="btn danger small" data-action="delete-submission" data-id="${emp.id}">刪除草稿</button>` : ''}
        ${status !== 'draft' ? `<button class="btn danger small" data-action="reopen-submission" data-id="${emp.id}">退回給員工</button>` : ''}
      </div>
    </div>
  `;
}

function renderReviewDetail(empId) {
  const emp = state.employees.find(e => e.id === empId);
  if (!emp) return '<div class="empty">找不到員工</div>';
  const sub = getEmployeeSubmission(empId);
  const data = sub.data || {};
  const isDraft = sub.status === 'draft';
  const isReviewed = sub.status === 'reviewed';

  // 計算當下審核狀態下的加分(尚未存入 extraBonus 之前的預覽)
  let previewBonus = 0;
  EXTRA_CONTRIBUTION_ITEMS.forEach(item => {
    if (item.listingMode) {
      const arr = migrateListedDetails(item, sub, data);
      // IPP 特例:只算 accepted 細項 weight 加總對應等級
      if (item.ippMode) {
        const { optionId } = computeIppLevelFromDetails(arr, emp.bandSinceYYYYMM, { onlyAccepted: true });
        const opt = item.options.find(o => o.id === optionId);
        if (opt) previewBonus += opt.score;
        return;
      }
      // Travel 特例:只算 accepted 段天數加總對應等級
      if (item.travelMode) {
        const travelArr = normalizeTravelDetail(data.itemDetails?.travel);
        const { optionId } = computeTravelLevelFromDetails(travelArr, emp.bandSinceYYYYMM, state.covidPeriod || {}, { onlyAccepted: true });
        const opt = item.options.find(o => o.id === optionId);
        if (opt) previewBonus += opt.score;
        return;
      }
      const summary = summarizeListedItem(item, arr, { bandSince: emp.bandSinceYYYYMM });
      previewBonus += summary.acceptedScore;
      return;
    }
    const sel = data.items?.[item.id];
    if (item.type === 'single') {
      if (!sel || sel === 'none') return;
      const review = sub.reviewedItems?.[item.id];
      if (review === 'accepted') {
        const opt = item.options.find(o => o.id === sel);
        if (opt) previewBonus += opt.score;
      } else if (review && typeof review === 'object' && review.adjustedTo) {
        const opt = item.options.find(o => o.id === review.adjustedTo);
        if (opt) previewBonus += opt.score;
      }
    } else {
      const arr = Array.isArray(sel) ? sel : [];
      arr.forEach(optId => {
        const review = sub.reviewedCertItems?.[optId];
        if (review === 'accepted') {
          const opt = item.options.find(o => o.id === optId);
          if (opt) previewBonus += opt.score;
        }
      });
    }
  });
  if (sub.reviewedItems?.others === 'accepted') previewBonus += Number(data.others) || 0;

  // 統計待審項目
  let pendingCount = 0;
  Object.values(sub.reviewedItems || {}).forEach(v => { if (v === 'pending') pendingCount++; });
  Object.values(sub.reviewedCertItems || {}).forEach(v => { if (v === 'pending') pendingCount++; });

  return `
    <div style="margin-bottom:18px;">
      <button class="btn secondary small" data-action="close-review">← 回到審核列表</button>
    </div>

    <div class="admin-section">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid var(--line);padding-bottom:14px;margin-bottom:18px;">
        <div>
          <h3 style="margin-bottom:4px;">${escapeHtml(emp.name)} · Extra Contribution 審核</h3>
          <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-muted);letter-spacing:0.06em;">
            ${escapeHtml(emp.enName || '')} · Band ${emp.currentBand} → ${emp.currentBand + 1} · ${escapeHtml(getEmployeeTech(emp))}
            ${emp.bandSinceYYYYMM ? ` · Band 起始:${escapeHtml(emp.bandSinceYYYYMM)}` : ' · <span style="color:var(--accent);">⚠ 未填 Band 起始年月</span>'}
          </div>
        </div>
        <div style="text-align:right;">
          <div style="font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--ink-muted);">${isDraft ? '員工申請中(尚未提交)' : '目前累計加分'}</div>
          <div style="font-family:'Fraunces',serif;font-size:28px;font-weight:600;color:${isDraft ? 'var(--ink-muted)' : 'var(--gold)'};">${isDraft ? '—' : '+' + previewBonus.toFixed(1)}</div>
          ${!isDraft && pendingCount > 0 ? `<div style="font-size:11px;color:var(--accent);margin-top:4px;">尚有 ${pendingCount} 項待審</div>` : ''}
        </div>
      </div>

      ${isDraft ? `
        <div style="background:rgba(176,141,58,0.08);border-left:3px solid var(--gold);padding:12px 16px;margin-bottom:18px;font-size:13px;color:var(--ink-soft);line-height:1.6;">
          <b>⚠ 員工尚未提交</b> — 此頁面顯示員工目前的草稿內容(可能還會修改)。<br>
          <span style="color:var(--ink-muted);font-size:12px;">員工提交後狀態會變為「待審核」,屆時才能進行審核操作。</span>
        </div>
      ` : `
        <div style="display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;">
          <button class="btn secondary small" data-action="bulk-review" data-empid="${empId}" data-action-type="accept-all">全部接受</button>
          <button class="btn secondary small" data-action="bulk-review" data-empid="${empId}" data-action-type="reject-all">全部拒絕</button>
          <div style="flex:1;"></div>
          ${isReviewed ? `<span style="font-size:12px;color:var(--green);font-family:'JetBrains Mono',monospace;align-self:center;">✓ 已完成審核</span>` : ''}
          <button class="btn" data-action="finalize-review" data-id="${empId}">完成審核(套用加分)</button>
        </div>
      `}

      <div class="form-items">
        ${EXTRA_CONTRIBUTION_ITEMS.map(item => renderReviewItemRow(emp, item, sub, isDraft)).join('')}

        ${(Number(data.others) || 0) > 0 ? renderReviewOthersRow(emp, sub, isDraft) : ''}
      </div>
    </div>
  `;
}

function renderReviewItemRow(emp, item, sub, isDraft = false) {
  const data = sub.data || {};
  const sel = data.items?.[item.id];

  // === Listing-mode(STAMP 等):每筆細項獨立 ✓/✗ 按鈕 ===
  if (item.listingMode) {
    const noneFlag = !!data.itemNoneFlags?.[item.id];
    const detailArr = migrateListedDetails(item, sub, data);
    // 員工明確勾「本項無可列舉」→ 顯示為不可審核的資訊列(沒 ✓/✗ 按鈕)
    if (noneFlag && detailArr.length === 0) {
      return `
        <div class="form-item-row">
          <div class="form-item-name">
            ${escapeHtml(item.name)}
            <div style="font-size:12px;color:var(--ink-soft);font-weight:400;margin-top:6px;">
              員工已明確表態:<b>本項無可加分</b>
            </div>
          </div>
          <div class="form-item-control">
            <div style="font-size:11px;color:var(--ink-muted);font-style:italic;">無細項可審核 · +0</div>
          </div>
        </div>
      `;
    }
    if (detailArr.length === 0) return '';
    const summary = summarizeListedItem(item, detailArr, { bandSince: emp.bandSinceYYYYMM });  // 不 preview,純看實際 accepted
    const rowsHtml = detailArr.map((d, idx) => {
      const opt = item.options.find(o => o.id === d.level);
      const optLabel = item.countListingMode ? '' : (opt ? opt.label : '(未設等級)');
      const optScore = opt ? opt.score : 0;
      const dec = d.reviewDecision || 'pending';
      let decBadge;
      if (dec === 'accepted') decBadge = '<span style="color:var(--green);font-family:\'JetBrains Mono\',monospace;font-size:10px;letter-spacing:0.06em;">✓ 接受</span>';
      else if (dec === 'rejected') decBadge = '<span style="color:var(--accent);font-family:\'JetBrains Mono\',monospace;font-size:10px;letter-spacing:0.06em;">✗ 拒絕</span>';
      else decBadge = '<span style="color:var(--ink-muted);font-family:\'JetBrains Mono\',monospace;font-size:10px;letter-spacing:0.06em;">⋯ 待審</span>';
      const dateStr = d.occurredAt ? d.occurredAt : '(未填月份)';
      const curReviewerScore = (typeof d.reviewerScore === 'number' && isFinite(d.reviewerScore)) ? d.reviewerScore : '';
      // IPP 特例:顯示 weight + 期間 tag
      let ippExtra = '';
      if (item.ippMode) {
        const w = parseFloat(d.weight);
        const hasValidW = isFinite(w) && w > 0 && w <= 1;
        const inBand = isIppInBandPeriod(d.occurredAt, emp.bandSinceYYYYMM);
        const peopleDisp = hasValidW ? formatIppWeightDisplay(d.weight) : '未填掛名人數';
        let tag = '';
        if (!d.occurredAt) tag = '<span style="color:var(--accent);font-family:\'JetBrains Mono\',monospace;font-size:10px;margin-left:6px;">⚠ 未填月份</span>';
        else if (!inBand) tag = '<span style="color:var(--gold);font-family:\'JetBrains Mono\',monospace;font-size:10px;margin-left:6px;">ⓘ 期間外</span>';
        else if (hasValidW) tag = '<span style="color:var(--green);font-family:\'JetBrains Mono\',monospace;font-size:10px;margin-left:6px;">✓ 計入</span>';
        else tag = '<span style="color:var(--accent);font-family:\'JetBrains Mono\',monospace;font-size:10px;margin-left:6px;">⚠ 缺權重</span>';
        ippExtra = `<span style="color:var(--ink-muted);font-family:'JetBrains Mono',monospace;font-size:11px;margin-left:6px;">${escapeHtml(peopleDisp)}</span>${tag}`;
      }
      // Travel 特例:顯示 startDate → endDate + 天數 + 期間 tag
      let travelExtra = '';
      let travelDateStr = dateStr;
      if (item.travelMode) {
        const days = calcTravelDays(d.startDate, d.endDate);
        travelDateStr = (d.startDate && d.endDate) ? `${d.startDate} → ${d.endDate}` : '日期未填齊';
        const eligible = isTravelEligible(d.startDate, d.endDate, emp.bandSinceYYYYMM, state.covidPeriod || {});
        let tag = '';
        if (eligible) tag = `<span style="color:var(--green);font-family:'JetBrains Mono',monospace;font-size:10px;margin-left:6px;">✓ 計入(${days} 天)</span>`;
        else tag = `<span style="color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:10px;margin-left:6px;">⚠ 不計入(${days} 天)</span>`;
        travelExtra = tag;
      }
      return `
        <div class="listed-review-row" style="display:flex;align-items:center;gap:10px;padding:8px 10px;margin-top:6px;background:var(--bg);border-left:3px solid ${dec === 'accepted' ? 'var(--green)' : (dec === 'rejected' ? 'var(--accent)' : 'var(--line-soft)')};">
          <div style="flex:1;min-width:0;">
            <div style="font-size:13px;color:var(--ink);">
              <b>${escapeHtml(d.name || '(未命名)')}</b>
              ${item.countListingMode || item.reviewerScoring || item.ippMode || item.travelMode ? '' : `<span style="color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:11px;margin-left:6px;">${escapeHtml(optLabel)} (+${optScore})</span>`}
              ${item.reviewerScoring && curReviewerScore !== '' && dec !== 'rejected' ? `<span style="color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:11px;margin-left:6px;">+${curReviewerScore} 分</span>` : ''}
              ${ippExtra}${travelExtra}
            </div>
            <div style="font-size:11px;color:var(--ink-muted);font-family:'JetBrains Mono',monospace;margin-top:2px;">${escapeHtml(travelDateStr)} · ${decBadge}</div>
          </div>
          ${isDraft ? '' : `
            <div style="display:flex;gap:4px;flex-shrink:0;align-items:center;">
              ${item.reviewerScoring ? `
                <input type="number" class="reviewer-score-input" data-empid="${emp.id}" data-itemid="${item.id}" data-rowidx="${idx}" value="${escapeHtml(String(curReviewerScore))}" min="0" step="0.1" placeholder="分數" style="width:70px;background:var(--bg);border:1px solid var(--line-soft);padding:5px 8px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink);" title="主管填分">
              ` : ''}
              <button class="review-btn ${dec === 'accepted' ? 'active accept' : ''}" data-action="set-listed-review" data-empid="${emp.id}" data-itemid="${item.id}" data-rowidx="${idx}" data-decision="accepted">✓</button>
              <button class="review-btn ${dec === 'rejected' ? 'active reject' : ''}" data-action="set-listed-review" data-empid="${emp.id}" data-itemid="${item.id}" data-rowidx="${idx}" data-decision="rejected">✗</button>
            </div>
          `}
        </div>
      `;
    }).join('');
    return `
      <div class="form-item-row">
        <div class="form-item-name">
          ${escapeHtml(item.name)}
          <div style="font-size:12px;color:var(--ink-soft);font-weight:400;margin-top:6px;">
            員工列舉 <b>${detailArr.length}</b> 筆 — 已接受 ${summary.acceptedCount} 筆 (+${summary.acceptedScore})
            ${summary.pendingCount > 0 ? ` · 待審 ${summary.pendingCount} 筆` : ''}
            ${summary.rejectedCount > 0 ? ` · 已拒 ${summary.rejectedCount} 筆` : ''}
          </div>
          ${item.note ? `<div style="font-size:11px;color:var(--ink-muted);margin-top:4px;">${escapeHtml(item.note)}</div>` : ''}
        </div>
        <div class="form-item-control" style="flex-direction:column;align-items:stretch;gap:0;">
          ${isDraft ? '<div style="font-size:11px;color:var(--ink-muted);font-style:italic;">員工尚未提交,無法審核</div>' : ''}
          ${rowsHtml}
          ${!isDraft && summary.pendingCount > 0 ? `
            <div style="display:flex;gap:6px;margin-top:8px;">
              <button class="btn secondary small" data-action="bulk-listed-review" data-empid="${emp.id}" data-itemid="${item.id}" data-decision="accepted">本項全部接受</button>
              <button class="btn secondary small" data-action="bulk-listed-review" data-empid="${emp.id}" data-itemid="${item.id}" data-decision="rejected">本項全部拒絕</button>
            </div>
          ` : ''}
        </div>
      </div>
    `;
  }

  // === IPP 特例:即使 items.ipp 沒設(權重 < 0.1 但保底另算)也要顯示 ===
  if (item.id === 'ipp') {
    const detailArr = normalizeDetail(data.itemDetails?.ipp);
    if (detailArr.length === 0) return '';  // 真的完全沒填
    const summary = summarizeIpp(detailArr, emp.bandSinceYYYYMM, { onlyAccepted: true });
    const review = sub.reviewedItems?.ipp || 'pending';
    const isAdjusted = typeof review === 'object' && review.adjustedTo;
    const adjustedToId = isAdjusted ? review.adjustedTo : null;
    // 自動判定 label
    const levelText = summary.totalCount === 0
      ? '無'
      : (summary.levelLabel || '無 (期間內權重不足保底)');
    // 把每筆 IPP 列出來,含期間 tag 和權重
    const linesHtml = detailArr.map(d => {
      const inBand = isIppInBandPeriod(d.occurredAt, emp.bandSinceYYYYMM);
      const w = parseFloat(d.weight);
      const hasValidWeight = isFinite(w) && w > 0 && w <= 1;
      let tag;
      if (!d.occurredAt) {
        tag = '<span style="color:var(--accent);font-family:\'JetBrains Mono\',monospace;font-size:10px;margin-left:4px;">⚠ 未填月份</span>';
      } else if (!inBand) {
        tag = '<span style="color:var(--gold);font-family:\'JetBrains Mono\',monospace;font-size:10px;letter-spacing:0.06em;margin-left:4px;">ⓘ 期間外</span>';
      } else if (hasValidWeight) {
        tag = '<span style="color:var(--green);font-family:\'JetBrains Mono\',monospace;font-size:10px;letter-spacing:0.06em;margin-left:4px;">✓ 計入</span>';
      } else {
        tag = '<span style="color:var(--accent);font-family:\'JetBrains Mono\',monospace;font-size:10px;letter-spacing:0.06em;margin-left:4px;">⚠ 缺權重</span>';
      }
      const monthHtml = d.occurredAt
        ? `<span style="color:var(--ink-muted);font-family:'JetBrains Mono',monospace;">(${escapeHtml(d.occurredAt)})</span>`
        : '';
      const weightHtml = `<span style="color:var(--ink-muted);font-family:'JetBrains Mono',monospace;font-size:10px;margin-left:4px;">· ${d.weight !== undefined && d.weight !== '' ? escapeHtml(formatIppWeightDisplay(d.weight)) : '未填掛名人數'}</span>`;
      return `<div style="margin-top:2px;">${escapeHtml(d.name)} ${monthHtml}${weightHtml}${tag}</div>`;
    }).join('');

    return `
      <div class="form-item-row ${!isDraft ? renderItemReviewClass(review) : ''}">
        <div class="form-item-name">
          ${escapeHtml(item.name)}
          <div style="font-size:12px;color:var(--ink-soft);font-weight:400;margin-top:6px;">
            自動判定: <b>${escapeHtml(levelText)}</b>
            ${summary.levelScore > 0 ? `<span style="color:var(--gold);">(+${summary.levelScore})</span>` : '<span style="color:var(--ink-muted);">(不加分)</span>'}
          </div>
          <div style="font-size:11px;color:var(--ink-muted);margin-top:4px;font-family:'JetBrains Mono',monospace;letter-spacing:0.04em;">
            期間內 ${summary.inCount} 筆(權重 ${summary.inWeight}) · 期間外 ${summary.outCount} 筆(權重 ${summary.outWeight}) · 總 ${summary.totalCount} 筆
          </div>
          <div style="font-size:11px;color:var(--ink-soft);margin-top:6px;padding-left:10px;border-left:2px solid var(--gold);">
            ${linesHtml}
          </div>
        </div>
        <div class="form-item-control">
          ${isDraft ? '<div style="font-size:11px;color:var(--ink-muted);font-style:italic;">員工尚未提交,無法審核</div>' : `
            <div style="display:flex;gap:6px;flex-wrap:wrap;">
              <button class="review-btn ${review === 'accepted' ? 'active accept' : ''}" data-action="set-review" data-empid="${emp.id}" data-itemid="${item.id}" data-decision="accepted">✓ 接受</button>
              <button class="review-btn ${review === 'rejected' ? 'active reject' : ''}" data-action="set-review" data-empid="${emp.id}" data-itemid="${item.id}" data-decision="rejected">✗ 拒絕</button>
              <select class="review-adjust ${isAdjusted ? 'active adjusted' : ''}" data-empid="${emp.id}" data-itemid="${item.id}">
                <option value="">↔ 調整為...</option>
                ${item.options.filter(o => o.id !== 'none' && o.id !== sel).map(o => `
                  <option value="${o.id}" ${adjustedToId === o.id ? 'selected' : ''}>${escapeHtml(o.label)} (+${o.score})</option>
                `).join('')}
              </select>
            </div>
            ${review === 'pending' ? '<div style="font-size:11px;color:var(--ink-muted);margin-top:6px;">⋯ 待您決定</div>' : ''}
          `}
        </div>
      </div>
    `;
  }

  // === Travel 特例:即使 items.travel 沒設(總天數 < 30)也要顯示供主管參考 ===
  if (item.id === 'travel') {
    const travelArr = normalizeTravelDetail(data.itemDetails?.travel);
    if (travelArr.length === 0) return '';
    const cp = state.covidPeriod || {};
    const summary = summarizeTravel(travelArr, emp.bandSinceYYYYMM, cp);
    const review = sub.reviewedItems?.travel || 'pending';
    const isAdjusted = typeof review === 'object' && review.adjustedTo;
    const adjustedToId = isAdjusted ? review.adjustedTo : null;
    const levelText = summary.totalCount === 0
      ? '無'
      : (summary.levelLabel || `無 (合計 ${summary.eligibleDays} 天 < 30)`);
    const linesHtml = travelArr.map(d => {
      const days = calcTravelDays(d.startDate, d.endDate);
      const eligible = days > 0 && isTravelEligible(d.startDate, d.endDate, emp.bandSinceYYYYMM, cp);
      let tag;
      if (!d.startDate || !d.endDate) {
        tag = '<span style="color:var(--accent);font-family:\'JetBrains Mono\',monospace;font-size:10px;letter-spacing:0.06em;margin-left:4px;">⚠ 日期不全</span>';
      } else if (days <= 0) {
        tag = '<span style="color:var(--accent);font-family:\'JetBrains Mono\',monospace;font-size:10px;letter-spacing:0.06em;margin-left:4px;">⚠ 回台日 < 出發日</span>';
      } else if (eligible) {
        tag = `<span style="color:var(--green);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.06em;margin-left:4px;">✓ 計入(${days} 天)</span>`;
      } else {
        // 細分原因
        const sYM = ymdToYearMonth(d.startDate);
        const eYM = ymdToYearMonth(d.endDate);
        let reason = '不符';
        if (emp.bandSinceYYYYMM && compareYearMonth(sYM, emp.bandSinceYYYYMM) < 0) reason = '早於 Band 起始';
        else if (cp.startYYYYMM && compareYearMonth(sYM, cp.startYYYYMM) < 0) reason = '早於疫情期間';
        else if (cp.endYYYYMM && compareYearMonth(eYM, cp.endYYYYMM) > 0) reason = '晚於疫情期間';
        else if (!cp.startYYYYMM || !cp.endYYYYMM) reason = '管理員未設定疫情期間';
        tag = `<span style="color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.06em;margin-left:4px;">⚠ ${escapeHtml(reason)} · 不可提交(${days} 天)</span>`;
      }
      const dateStr = (d.startDate && d.endDate) ? `${d.startDate} → ${d.endDate}` : '日期未填齊';
      return `<div style="margin-top:2px;">${escapeHtml(d.name || '(未命名段)')} <span style="color:var(--ink-muted);font-family:'JetBrains Mono',monospace;font-size:11px;">${escapeHtml(dateStr)}</span>${tag}</div>`;
    }).join('');

    return `
      <div class="form-item-row ${!isDraft ? renderItemReviewClass(review) : ''}">
        <div class="form-item-name">
          ${escapeHtml(item.name)}
          <div style="font-size:12px;color:var(--ink-soft);font-weight:400;margin-top:6px;">
            自動判定: <b>${escapeHtml(levelText)}</b>
            ${summary.levelScore > 0 ? `<span style="color:var(--gold);">(+${summary.levelScore})</span>` : '<span style="color:var(--ink-muted);">(不加分)</span>'}
          </div>
          <div style="font-size:11px;color:var(--ink-muted);margin-top:4px;font-family:'JetBrains Mono',monospace;letter-spacing:0.04em;">
            計入 ${summary.eligibleCount} 段(${summary.eligibleDays} 天) · 不計入 ${summary.ineligibleCount} 段(${summary.ineligibleDays} 天) · 總 ${summary.totalCount} 段
          </div>
          <div style="font-size:11px;color:var(--ink-soft);margin-top:6px;padding-left:10px;border-left:2px solid var(--gold);">
            ${linesHtml}
          </div>
        </div>
        <div class="form-item-control">
          ${isDraft ? '<div style="font-size:11px;color:var(--ink-muted);font-style:italic;">員工尚未提交,無法審核</div>' : `
            <div style="display:flex;gap:6px;flex-wrap:wrap;">
              <button class="review-btn ${review === 'accepted' ? 'active accept' : ''}" data-action="set-review" data-empid="${emp.id}" data-itemid="${item.id}" data-decision="accepted">✓ 接受</button>
              <button class="review-btn ${review === 'rejected' ? 'active reject' : ''}" data-action="set-review" data-empid="${emp.id}" data-itemid="${item.id}" data-decision="rejected">✗ 拒絕</button>
              <select class="review-adjust ${isAdjusted ? 'active adjusted' : ''}" data-empid="${emp.id}" data-itemid="${item.id}">
                <option value="">↔ 調整為...</option>
                ${item.options.filter(o => o.id !== 'none' && o.id !== summary.levelOptionId).map(o => `
                  <option value="${o.id}" ${adjustedToId === o.id ? 'selected' : ''}>${escapeHtml(o.label)} (+${o.score})</option>
                `).join('')}
              </select>
            </div>
            ${review === 'pending' ? '<div style="font-size:11px;color:var(--ink-muted);margin-top:6px;">⋯ 待您決定</div>' : ''}
          `}
        </div>
      </div>
    `;
  }

  if (item.type === 'single') {
    if (!sel || sel === 'none') return '';  // 員工沒選
    const opt = item.options.find(o => o.id === sel);
    if (!opt) return '';
    const review = sub.reviewedItems?.[item.id] || 'pending';
    const detailArr = normalizeDetail(data.itemDetails?.[item.id]);
    const isAdjusted = typeof review === 'object' && review.adjustedTo;
    const adjustedToId = isAdjusted ? review.adjustedTo : null;

    return `
      <div class="form-item-row ${!isDraft ? renderItemReviewClass(review) : ''}">
        <div class="form-item-name">
          ${escapeHtml(item.name)}
          <div style="font-size:12px;color:var(--ink-soft);font-weight:400;margin-top:6px;">
            員工申請: <b>${escapeHtml(opt.label)}</b> <span style="color:var(--gold);">(+${opt.score})</span>
          </div>
          ${detailArr.length > 0
            ? `<div style="font-size:11px;color:var(--ink-muted);margin-top:4px;padding-left:10px;border-left:2px solid var(--gold);">${detailArr.map(d => escapeHtml(d.name) + (d.occurredAt ? ` <span style="color:var(--ink-muted);font-family:'JetBrains Mono',monospace;">(${escapeHtml(d.occurredAt)})</span>` : ' <span style="color:var(--accent);">⚠ 未填月份</span>')).join('<br>')}</div>`
            : '<div style="font-size:11px;color:var(--accent);margin-top:4px;">⚠ 員工未填具體說明</div>'}
        </div>
        <div class="form-item-control">
          ${isDraft ? '<div style="font-size:11px;color:var(--ink-muted);font-style:italic;">員工尚未提交,無法審核</div>' : `
            <div style="display:flex;gap:6px;flex-wrap:wrap;">
              <button class="review-btn ${review === 'accepted' ? 'active accept' : ''}" data-action="set-review" data-empid="${emp.id}" data-itemid="${item.id}" data-decision="accepted">✓ 接受</button>
              <button class="review-btn ${review === 'rejected' ? 'active reject' : ''}" data-action="set-review" data-empid="${emp.id}" data-itemid="${item.id}" data-decision="rejected">✗ 拒絕</button>
              <select class="review-adjust ${isAdjusted ? 'active adjusted' : ''}" data-empid="${emp.id}" data-itemid="${item.id}">
                <option value="">↔ 調整為...</option>
                ${item.options.filter(o => o.id !== 'none' && o.id !== sel).map(o => `
                  <option value="${o.id}" ${adjustedToId === o.id ? 'selected' : ''}>${escapeHtml(o.label)} (+${o.score})</option>
                `).join('')}
              </select>
            </div>
            ${review === 'pending' ? '<div style="font-size:11px;color:var(--ink-muted);margin-top:6px;">⋯ 待您決定</div>' : ''}
          `}
        </div>
      </div>
    `;
  } else {
    // multi (Certification)
    const arr = Array.isArray(sel) ? sel : [];
    if (arr.length === 0) return '';
    return `
      <div class="form-item-row">
        <div class="form-item-name">
          ${escapeHtml(item.name)}
          <div style="font-size:11px;color:var(--ink-muted);font-weight:400;margin-top:2px;">員工申請 ${arr.length} 張證照</div>
        </div>
        <div class="form-item-control">
          <div class="bonus-multi-list">
            ${arr.map(optId => {
              const opt = item.options.find(o => o.id === optId);
              if (!opt) return '';
              const review = sub.reviewedCertItems?.[optId] || 'pending';
              const certDetailArr = normalizeDetail(data.certDetails?.[optId]);
              return `
                <div class="bonus-multi-row ${!isDraft ? renderItemReviewClass(review) : ''}" style="grid-template-columns:1fr;gap:6px;padding:8px;border:1px solid var(--line-soft);">
                  <div>
                    <b>${escapeHtml(opt.label)}</b> <span style="color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:11px;">+${opt.score}</span>
                    ${certDetailArr.length > 0
                      ? `<span style="color:var(--ink-soft);margin-left:8px;font-size:12px;">— ${certDetailArr.map(d => escapeHtml(d.name) + (d.occurredAt ? ` (${escapeHtml(d.occurredAt)})` : '')).join(' / ')}</span>`
                      : '<span style="color:var(--accent);margin-left:8px;font-size:11px;">⚠ 無具體說明</span>'}
                  </div>
                  ${isDraft ? '' : `
                    <div style="display:flex;gap:6px;">
                      <button class="review-btn small ${review === 'accepted' ? 'active accept' : ''}" data-action="set-cert-review" data-empid="${emp.id}" data-optid="${optId}" data-decision="accepted">✓ 接受</button>
                      <button class="review-btn small ${review === 'rejected' ? 'active reject' : ''}" data-action="set-cert-review" data-empid="${emp.id}" data-optid="${optId}" data-decision="rejected">✗ 拒絕</button>
                    </div>
                  `}
                </div>
              `;
            }).join('')}
          </div>
        </div>
      </div>
    `;
  }
}

function renderEmployeesTab() {
  // group by band
  const bandGroups = {};
  state.employees.forEach(e => {
    const b = e.currentBand ?? '未設定';
    if (!bandGroups[b]) bandGroups[b] = [];
    bandGroups[b].push(e);
  });
  const sortedBands = Object.keys(bandGroups).sort((a, b) => {
    if (a === '未設定') return 1;
    if (b === '未設定') return -1;
    return Number(b) - Number(a);
  });

  return `
    <div class="admin-section">
      <h3>新增員工</h3>
      <div class="add-form" style="grid-template-columns: 1fr 1fr 2fr 100px auto;">
        <input type="text" id="newEmpName" placeholder="中文姓名">
        <input type="text" id="newEmpEnName" placeholder="英文名(例:Allen.Lee)">
        <input type="text" id="newEmpDept" placeholder="部門(需含括號 ex. ...(Wilbur))">
        <select id="newEmpBand">
          <option value="">目前職等</option>
          <option value="3">Band 3</option>
          <option value="4">Band 4</option>
          <option value="5">Band 5</option>
          <option value="6">Band 6</option>
          <option value="7">Band 7</option>
          <option value="8">Band 8</option>
          <option value="9">Band 9</option>
        </select>
        <button class="btn" data-action="add-employee">新增</button>
      </div>
      <div style="font-size:12px;color:var(--ink-muted);margin-bottom:18px;font-family:'JetBrains Mono',monospace;letter-spacing:0.06em;">
        ※ 部門名稱請保留括號內的主管識別字(例:臺北軟體設計一部(Wilbur)),系統會根據此括號自動規避主管。
      </div>
      ${state.employees.length === 0 ? '<div class="empty">尚未建立任何員工</div>' :
        sortedBands.map(band => {
          const targetBand = band !== '未設定' ? Number(band) + 1 : '—';
          return `
            <div style="margin-top:18px;">
              <div style="font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:var(--ink-muted);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--line-soft);">
                Band ${band} → Band ${targetBand} · ${bandGroups[band].length} 位
              </div>
              ${bandGroups[band].map(e => `
                <div class="list-row">
                  <div class="info">
                    <div class="primary">${escapeHtml(e.name)} <span style="color:var(--ink-soft);font-size:13px;font-family:'JetBrains Mono',monospace;margin-left:8px;">${escapeHtml(e.enName || '')}</span> <span style="color:var(--ink-muted);font-size:12px;font-family:'JetBrains Mono',monospace;margin-left:8px;">${escapeHtml(e.id)}</span></div>
                    <div class="secondary">${escapeHtml(displayDept(e.dept))}</div>
                    <div style="margin-top:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                      <span style="font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--ink-muted);">Band 起始</span>
                      <input type="month" class="emp-admin-band-since" data-emp-id="${e.id}" value="${escapeHtml(normalizeYearMonth(e.bandSinceYYYYMM))}" placeholder="YYYY-MM" style="background:var(--bg);border:1px solid var(--line-soft);padding:4px 8px;font-family:'JetBrains Mono',monospace;font-size:12px;min-width:140px;">
                      <button class="btn small secondary" data-action="save-emp-band-since" data-id="${e.id}">儲存</button>
                      ${!normalizeYearMonth(e.bandSinceYYYYMM) ? '<span style="font-size:11px;color:var(--accent);">⚠ 尚未設定</span>' : ''}
                    </div>
                  </div>
                  <button class="btn danger small" data-action="del-employee" data-id="${e.id}">刪除</button>
                </div>
              `).join('')}
            </div>
          `;
        }).join('')
      }
    </div>
  `;
}

  return `
    <div class="admin-section">

      <div class="field">

        </div>
      </div>

        }

    </div>
  `;
}
